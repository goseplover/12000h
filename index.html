    ctx.save();
    drawOwlFrontNew(bird);
    
    if (bird.caughtPrey) {
        drawOwlPrey(bird);
    }
    
    ctx.restore();
}

function drawOwlFrontNew(bird) {
  const baseSize = 20;
  const birdSize = baseSize * bird.size;
  let bodyDiameter, headRadius, bodyRadius;
  
  if (bird.name === "雕鸮") {
    headRadius = birdSize * 0.4 * 1.2;
    bodyDiameter = headRadius * 1.1 * 2;
    bodyRadius = bodyDiameter / 2;
  } else if (bird.name === "短耳鸮") {
    // 修改：将短耳鸮的头部增大至与身体一样
    // 先计算身体半径
    bodyRadius = birdSize * 0.4 * 1.3;
    bodyDiameter = bodyRadius * 2;
    // 头部半径与身体半径相同
    headRadius = bodyRadius;
  } else {
    bodyDiameter = birdSize * 0.8 * 1.2;
    headRadius = bodyDiameter / 2 * 0.8 * 1.2;
    bodyRadius = bodyDiameter / 2;
  }
  
  // 计算基础翅膀高度
  let wingHeight = bodyDiameter * 0.25 * 2;
  const wingLength = bodyDiameter * 3 * 0.5;
  
  // 修改：短耳鸮的翅膀高度减少1/5
  if (bird.name === "短耳鸮") {
    wingHeight = wingHeight * 0.8; // 减少1/5，即原来的80%
  }
  
  ctx.save();
  const x = bird.x;
  const y = bird.y;
  
  let bodyCenterX = x;
  let bodyCenterY = y;
  let headCenterX = x;
  let headCenterY;
  
  if (bird.name === "雕鸮") {
    headCenterY = y;
  } else if (bird.name === "短耳鸮") {
    headCenterY = y;
    bodyCenterY = y;
  } else {
    headCenterY = y - bodyRadius * 0.3;
    bodyCenterY = y;
  }
  
  // 绘制身体
  if (bird.name === "雕鸮") {
    ctx.fillStyle = "#666666";
  } else if (bird.name === "短耳鸮") {
    ctx.fillStyle = "#FFFFFF";
  } else {
    ctx.fillStyle = bird.type.bodyColor;
  }
  
  ctx.beginPath();
  ctx.arc(bodyCenterX, bodyCenterY, bodyRadius, 0, Math.PI * 2);
  ctx.fill();
  
  // 绘制翅膀
  ctx.fillStyle = bird.type.wingColor;
  const leftWingX = bodyCenterX - bodyRadius - wingLength;
  const leftWingY = bodyCenterY - bodyRadius + (bird.wingOffset || 0) * bodyDiameter;
  ctx.fillRect(leftWingX, leftWingY, wingLength, wingHeight);
  
  const rightWingX = bodyCenterX + bodyRadius;
  const rightWingY = bodyCenterY - bodyRadius + (bird.wingOffset || 0) * bodyDiameter;
  ctx.fillRect(rightWingX, rightWingY, wingLength, wingHeight);
  
  // 绘制头部
  ctx.fillStyle = bird.type.headColor;
  ctx.beginPath();
  ctx.arc(headCenterX, headCenterY, headRadius, 0, Math.PI * 2);
  ctx.fill();
  
  // 修改：重新计算眼睛半径（基于缩小1/4后的头部半径）
  const originalEyeRadius = headRadius * 0.2 * 1.2;
  const smallEyeRadius = originalEyeRadius * 0.75; // 缩小1/4
  
  const eyeSpacing = headRadius * 0.4;
  const eyeY = headCenterY - headRadius * 0.1;
  
// === 短耳鸮的眼睛和眼周矩形效果（在白色覆盖层之前）===
if (bird.name === "短耳鸮" && bird.type.blackEyeRing) {
  // 修改：使用新的头部半径计算黑色眼环
  const outerRadius = headRadius * 1.15 * 1.2;
  const innerRadius = headRadius * 0.8;
  const headGradient = ctx.createRadialGradient(
    headCenterX, headCenterY, innerRadius * 0.5,
    headCenterX, headCenterY, outerRadius
  );
  // 修改：降低白色渐变的透明度
  headGradient.addColorStop(0, 'rgba(255, 255, 255, 0.60)'); // 降低到60%透明度
  headGradient.addColorStop(0.4, 'rgba(240, 240, 240, 0.50)'); // 降低到50%透明度
  headGradient.addColorStop(0.8, 'rgba(220, 220, 220, 0.40)'); // 降低到40%透明度
  headGradient.addColorStop(1, 'rgba(200, 200, 200, 0.30)'); // 降低到30%透明度
  ctx.fillStyle = headGradient;
  ctx.beginPath();
  ctx.arc(headCenterX, headCenterY, outerRadius, 0, Math.PI * 2);
  ctx.fill();
  
  // 绘制黄色眼睛
  ctx.fillStyle = bird.type.eyeColor; // #FFFF99 黄色
  ctx.beginPath();
  ctx.arc(headCenterX - eyeSpacing, eyeY, smallEyeRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headCenterX + eyeSpacing, eyeY, smallEyeRadius, 0, Math.PI * 2);
  ctx.fill();
}
  
  // === 雕鸮的眼睛（在白色覆盖层之前）===
  if (bird.name === "雕鸮") {
    // 修改：使用缩小后的眼睛半径
    ctx.fillStyle = bird.type.eyeColor;
    ctx.beginPath();
    ctx.arc(headCenterX - eyeSpacing, eyeY, smallEyeRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headCenterX + eyeSpacing, eyeY, smallEyeRadius, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // === 喙部（在白色覆盖层之前）===
  ctx.fillStyle = "#8B4513";
  const beakWidth = originalEyeRadius * 1.5; // 使用原始眼睛半径计算喙部大小
  const beakHeight = originalEyeRadius * 1.2; // 使用原始眼睛半径计算喙部大小
  const beakY = headCenterY + originalEyeRadius * 0.5; // 使用原始眼睛半径计算喙部位置
  ctx.beginPath();
  ctx.moveTo(headCenterX - beakWidth/2, beakY);
  ctx.lineTo(headCenterX + beakWidth/2, beakY);
  ctx.lineTo(headCenterX, beakY + beakHeight);
  ctx.closePath();
  ctx.fill();
  
  // 雕鸮的耳簇羽
  if (bird.name === "雕鸮") {
    const earLength = headRadius * 0.8;
    const earWidth = headRadius * 0.3;
    
    ctx.save();
    ctx.translate(headCenterX, headCenterY - headRadius * 0.5);
    ctx.rotate(-Math.PI/4);
    ctx.fillStyle = bird.type.headColor;
    ctx.beginPath();
    ctx.ellipse(0, -earLength/2, earWidth/2, earLength/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    
    ctx.save();
    ctx.translate(headCenterX, headCenterY - headRadius * 0.5);
    ctx.rotate(Math.PI/4);
    ctx.fillStyle = bird.type.headColor;
    ctx.beginPath();
    ctx.ellipse(0, -earLength/2, earWidth/2, earLength/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  // === 短耳鸮的眼睛（在白色覆盖层之前）===
  if (bird.name === "短耳鸮") {
    // 修改：使用缩小后的眼睛半径
    ctx.fillStyle = bird.type.eyeColor;
    ctx.beginPath();
    ctx.arc(headCenterX - eyeSpacing, eyeY, smallEyeRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headCenterX + eyeSpacing, eyeY, smallEyeRadius, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // === 为雕鸮和短耳鸮的正面脸部添加30%透明度的#FCFCFC覆盖层（覆盖头部和翅膀）===
  if (bird.name === "雕鸮" || bird.name === "短耳鸮") {
    // 保存当前绘图状态
    ctx.save();
    
    // 1. 首先绘制翅膀的覆盖层
    ctx.fillStyle = 'rgba(252, 252, 252, 0.3)';
    
    // 左侧翅膀覆盖
    ctx.fillRect(leftWingX, leftWingY, wingLength, wingHeight);
    
    // 右侧翅膀覆盖
    ctx.fillRect(rightWingX, rightWingY, wingLength, wingHeight);
    
    // 2. 然后绘制头部的覆盖层
    const overlayGradient = ctx.createRadialGradient(
      headCenterX, headCenterY, headRadius * 0.5,
      headCenterX, headCenterY, headRadius
    );
    
    if (bird.name === "雕鸮") {
      overlayGradient.addColorStop(0, 'rgba(252, 252, 252, 0.25)');
      overlayGradient.addColorStop(0.7, 'rgba(252, 252, 252, 0.30)');
      overlayGradient.addColorStop(1, 'rgba(252, 252, 252, 0.35)');
    } else {
      overlayGradient.addColorStop(0, 'rgba(252, 252, 252, 0.20)');
      overlayGradient.addColorStop(0.7, 'rgba(252, 252, 252, 0.25)');
      overlayGradient.addColorStop(1, 'rgba(252, 252, 252, 0.30)');
    }
    
    ctx.fillStyle = overlayGradient;
    ctx.beginPath();
    ctx.arc(headCenterX, headCenterY, headRadius, 0, Math.PI * 2);
    ctx.fill();
    
    // 恢复绘图状态
    ctx.restore();
  }
  
  ctx.restore();
}

function drawOwlPrey(bird) {
    if (!bird.caughtPrey) return;
    
    ctx.save();
    const prey = bird.caughtPrey;
    const preyX = bird.x + (bird.direction === 1 ? 30 : -30);
    const preyY = bird.y + 20;
    
    if (prey.type === "mouse") {
        ctx.fillStyle = "#D3D3D3";
        const bodyWidth = 10;
        const bodyHeight = 6;
        ctx.beginPath();
        ctx.ellipse(preyX, preyY, bodyWidth/2, bodyHeight/2, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = "#D3D3D3";
        const headSize = 4;
        ctx.beginPath();
        ctx.moveTo(preyX + bodyWidth/2, preyY);
        ctx.lineTo(preyX + bodyWidth/2 + headSize, preyY - headSize/2);
        ctx.lineTo(preyX + bodyWidth/2 + headSize, preyY + headSize/2);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = "#000000";
        ctx.beginPath();
        ctx.arc(preyX + bodyWidth/2 + headSize/2, preyY - headSize/4, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(preyX + bodyWidth/2 + headSize/2, preyY + headSize/4, 1, 0, Math.PI * 2);
        ctx.fill();
    } else if (prey.type === "hedgehog") {
        ctx.fillStyle = "#A0522D";
        const bodySize = 8;
        ctx.beginPath();
        ctx.arc(preyX, preyY, bodySize, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = "#A0522D";
        ctx.beginPath();
        ctx.moveTo(preyX + bodySize, preyY);
        ctx.lineTo(preyX + bodySize * 1.5, preyY - bodySize * 0.5);
        ctx.lineTo(preyX + bodySize * 1.5, preyY + bodySize * 0.5);
        ctx.closePath();
        ctx.fill();
        
        ctx.strokeStyle = "#8B4513";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        for (let i = 0; i < 24; i++) {
            const angle = (i / 24) * Math.PI * 2;
            const length = 3 + Math.random() * 1.5;
            const startX = preyX + Math.cos(angle) * bodySize;
            const startY = preyY + Math.sin(angle) * bodySize;
            const endX = preyX + Math.cos(angle) * (bodySize + length);
            const endY = preyY + Math.sin(angle) * (bodySize + length);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }
        
        ctx.fillStyle = "#000000";
        ctx.beginPath();
        ctx.arc(preyX + bodySize * 1.2, preyY - bodySize * 0.2, 1, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = "#000000";
        ctx.beginPath();
        ctx.arc(preyX + bodySize * 1.5, preyY, 0.8, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.restore();
}

function drawOwl(bird) {

function drawPerchingWoodpeckerOrHeron(bird) {
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    const bodySize = birdSize;
    
    ctx.save();
    
    let beakDirection = 1;
    if (bird.targetTree && bird.targetTree.side === 'right') {
        beakDirection = -1;
    }
    
    let bodyColor = bird.type.bodyColor;
    let headColor = bird.type.headColor || '#000000';
    let wingColor = bird.type.wingColor || '#000000';
    let tailColor = bird.type.tailColor || "#000000";
    
    if (bird.name === "夜鹭" && bird.isNight) {
        bodyColor = bird.nightBodyColor || "#808080";
        headColor = bird.nightBodyColor || "#808080";
        wingColor = bird.nightWingColor || "#4682B4";
        tailColor = bird.nightBodyColor || "#808080";
    }
    
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.ellipse(bird.x, bird.y, bodySize/3, bodySize/2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = headColor;
    const headSize = bodySize * 0.4;
    const headY = bird.y - bodySize/2 - headSize/2;
    const headX = bird.x + (bird.headOffsetX || 0);
    
    ctx.beginPath();
    ctx.arc(headX, headY, headSize/2, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = bird.type.color || '#000000';
    ctx.beginPath();
    
    let beakLength = 8;
    let beakHeight = 5;
    
    if (bird.name === "夜鹭") {
        beakLength = 24;
        beakHeight = 6;
    } else if (bird.name === "啄木鸟" && bird.doubleBeak) {
        beakLength = 8;
        beakHeight = 5;
    }
    
    const beakStartX = headX + (headSize/2 * beakDirection);
    const beakStartY = headY;
    const beakEndX = beakStartX + beakLength * beakDirection + (bird.headOffsetX || 0);
    
    ctx.moveTo(beakStartX, beakStartY);
    ctx.lineTo(beakEndX, beakStartY);
    ctx.lineTo(beakStartX, beakStartY + beakHeight);
    ctx.closePath();
    ctx.fill();
    
    const eyeColor = bird.type.eyeColor || '#000000';
    const eyeX = headX + headSize/4 * beakDirection;
    const eyeY = headY - headSize/8;
    
    if (bird.whiteEyeRing) {
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, (3 * (bird.whiteEyeRingThick || 1)), 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.fillStyle = eyeColor;
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, 2, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = wingColor;
    const wingWidth = bodySize/8;
    const wingHeight = bodySize/3;
    const wingY = bird.y - wingHeight/2;
    
    if (bird.name === "夜鹭") {
        if (beakDirection === 1) {
            ctx.fillRect(
                bird.x - bodySize/3 - wingWidth/2,
                wingY,
                wingWidth,
                wingHeight
            );
        } else {
            ctx.fillRect(
                bird.x + bodySize/3 - wingWidth/2,
                wingY,
                wingWidth,
                wingHeight
            );
        }
    } else {
        if (bird.targetTree.side === 'left') {
            ctx.fillRect(
                bird.x + bodySize/2 - wingWidth/2,
                wingY,
                wingWidth,
                wingHeight
            );
        } else {
            ctx.fillRect(
                bird.x - bodySize/2 - wingWidth/2,
                wingY,
                wingWidth,
                wingHeight
            );
        }
    }
    
    ctx.fillStyle = tailColor;
    const tailStartX = bird.x;
    const tailStartY = bird.y + bodySize/2;
    const tailHeight = bodySize/4;
    const tailWidth = bodySize/3;
    
    ctx.beginPath();
    ctx.moveTo(tailStartX - tailWidth/2, tailStartY);
    ctx.lineTo(tailStartX + tailWidth/2, tailStartY);
    ctx.lineTo(tailStartX, tailStartY + tailHeight);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
}

function drawRiceBallBird(bird) {
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    const bodySize = birdSize;
    
    ctx.save();
    
    let riceBallColor;
    let dotColor = "#000000";
    let eyeRingColor = "#FFFFFF";
    let topSquareColor = "#FF8C00";
    
    if (bird.name === "戴菊") {
        riceBallColor = "#90EE90";
    }
    
    ctx.fillStyle = riceBallColor;
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bodySize/2, 0, Math.PI * 2);
    ctx.fill();
    
    const highlightGradient = ctx.createRadialGradient(
        bird.x - bodySize/4, bird.y - bodySize/4, 0,
        bird.x, bird.y, bodySize
    );
    highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
    highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
    
    ctx.fillStyle = highlightGradient;
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bodySize/2, 0, Math.PI * 2);
    ctx.fill();
    
    const eyeSpacing = bodySize * 0.4;
    const leftEyeX = bird.x - eyeSpacing/2;
    const rightEyeX = bird.x + eyeSpacing/2;
    const eyeY = bird.y - bodySize/6;
    const mouthX = bird.x;
    const mouthY = bird.y + bodySize/6;
    
    const eyeRadius = 0.25;
    const mouthRadius = 0.25;
    
    if (bird.name === "戴菊") {
        ctx.fillStyle = eyeRingColor;
        ctx.beginPath();
        ctx.arc(leftEyeX, eyeY, eyeRadius + 0.125, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rightEyeX, eyeY, eyeRadius + 0.125, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = dotColor;
        ctx.beginPath();
        ctx.arc(leftEyeX, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rightEyeX, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(mouthX, mouthY, mouthRadius, 0, Math.PI * 2);
        ctx.fill();
        
        const squareSize = bodySize * 0.3;
        ctx.fillStyle = topSquareColor;
        
        const roundRect = (x, y, width, height, radius) => {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        };
        
        roundRect(bird.x - squareSize/2, bird.y - bodySize/2 - squareSize/2, squareSize, squareSize, 2);
    }
    
    ctx.fillStyle = riceBallColor;
    const tailWidth = bodySize * 0.15;
    const tailHeight = bodySize * 0.2;
    const tailX = bird.x + bodySize/2 - tailWidth/2;
    const tailY = bird.y + bodySize/2 - tailHeight/2;
    
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(tailX + tailWidth, tailY);
    ctx.lineTo(tailX + tailWidth/2, tailY + tailHeight);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
}
function drawWoodcock(bird) {
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    const direction = bird.direction; // 1=向右，-1=向左

    ctx.save();

    // 身体（椭圆）
    ctx.fillStyle = bird.type.bodyColor; // #5A422E
    ctx.beginPath();
    ctx.ellipse(bird.x, bird.y, birdSize * 0.45, birdSize * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // 头部（圆形，位于身体前方）
    const headRadius = birdSize * 0.25;
    const headX = bird.x + direction * (birdSize * 0.4);
    const headY = bird.y - birdSize * 0.1;
    ctx.fillStyle = bird.type.headColor;
    ctx.beginPath();
    ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
    ctx.fill();

    // 长嘴（黑色矩形，四倍长）
    const beakLength = 8 * 4;          // 4倍长
    const beakWidth = 3;
    const beakStartX = headX + direction * (headRadius * 0.6);
    const beakStartY = headY;
    ctx.fillStyle = "#000000";
    ctx.fillRect(beakStartX, beakStartY - beakWidth/2, beakLength * direction, beakWidth);

    // 眼睛（半径加大，浅棕色眼圈）
    const eyeRadius = 3;               // 原2 → 加大
    const eyeX = headX + direction * (headRadius * 0.3);
    const eyeY = headY - headRadius * 0.2;
    ctx.fillStyle = "#D2B48C";         // 浅棕色眼圈
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeRadius + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeRadius, 0, Math.PI * 2);
    ctx.fill();

    // 翅膀（位置在身体侧面，方向与身体朝向一致）
    // 翅膀绘制为矩形，根据飞行方向放在身体后上方
    const wingWidth = birdSize * 0.4;
    const wingHeight = birdSize * 0.3;
    const wingX = bird.x - direction * (birdSize * 0.3);
    const wingY = bird.y - birdSize * 0.15;
    ctx.fillStyle = bird.type.wingColor;
    ctx.fillRect(wingX, wingY, wingWidth * direction, wingHeight); // 注意direction影响矩形方向

    // 尾巴（可选，短三角形）
    ctx.fillStyle = bird.type.tailColor;
    const tailLength = 8;
    const tailStartX = bird.x - direction * (birdSize * 0.5);
    const tailStartY = bird.y - birdSize * 0.05;
    ctx.beginPath();
    ctx.moveTo(tailStartX, tailStartY);
    ctx.lineTo(tailStartX - direction * tailLength, tailStartY - tailLength/2);
    ctx.lineTo(tailStartX - direction * tailLength, tailStartY + tailLength/2);
    ctx.closePath();
    ctx.fill();

    // 背上戴菊（大小0.5倍麻雀，朝向与丘鹬相同）
    const wrenSize = baseSize * 0.5;
    const wrenX = bird.x;
    const wrenY = bird.y - birdSize * 0.4;
    ctx.fillStyle = "#90EE90";
    ctx.beginPath();
    ctx.arc(wrenX, wrenY, wrenSize/2, 0, Math.PI * 2);
    ctx.fill();
    // 头顶橙色方块
    ctx.fillStyle = "#FF8C00";
    const squareSize = wrenSize/2;
    ctx.fillRect(wrenX - squareSize/2, wrenY - wrenSize/2 - squareSize/2, squareSize, squareSize);
    // 眼睛
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(wrenX + wrenSize/6, wrenY - wrenSize/4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(wrenX - wrenSize/6, wrenY - wrenSize/4, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

  // === 白色条纹（虚线效果，每2像素白，间隔2像素灰）===
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.PI/4); // 旋转45°
  ctx.strokeStyle = "#FFFFFF";
  ctx.lineWidth = 2;
  ctx.setLineDash([2, 2]); // 虚线模式：线段长2，间隔2

  const offsets = [-R/2, 0, R/2]; // 三条条纹的垂直偏移

    const maxX = Math.sqrt(R*R - offsetY*offsetY);
    if (maxX > 0) {
      ctx.beginPath();
      ctx.moveTo(-maxX, offsetY);
      ctx.lineTo(maxX, offsetY);
      ctx.stroke();
    }
  });

  ctx.setLineDash([]); // 恢复实线

  // 头部 - 灰色（覆盖部分条纹）
  ctx.fillStyle = "#808080";

function drawParadiseFlycatcher(bird) {
    const baseSize = 20;
    let birdSize = baseSize * bird.size;
    const bodyRadius = birdSize / 2;
    const headRadius = bodyRadius * 0.5; // 头部半径
    const bodyX = bird.x;
    const bodyY = bird.y;

    ctx.save();

    // 身体 - 白色
    ctx.fillStyle = bird.type.bodyColor;
    ctx.beginPath();
    ctx.arc(bodyX, bodyY, bodyRadius, 0, Math.PI * 2);
    ctx.fill();

    // 头部位置：根据方向位于身体一侧
    let headX, headY;
    if (bird.direction > 0) { // 向右飞，头部在身体右侧
        headX = bodyX + bodyRadius * 0.7;
        headY = bodyY - bodyRadius * 0.3;
    } else { // 向左飞，头部在身体左侧
        headX = bodyX - bodyRadius * 0.7;
        headY = bodyY - bodyRadius * 0.3;
    }

    // 头部 - 黑色
    ctx.fillStyle = bird.type.headColor;
    ctx.beginPath();
    ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
    ctx.fill();

    // 嘴 - 绿色
    ctx.fillStyle = bird.type.beakColor || "#00FF00";
    const beakLength = 8;
    const beakHeight = 4;
    const beakBaseX = headX + (bird.direction > 0 ? headRadius * 0.5 : -headRadius * 0.5);
    const beakBaseY = headY;

    ctx.beginPath();
    if (bird.direction > 0) {
        ctx.moveTo(beakBaseX, beakBaseY);
        ctx.lineTo(beakBaseX + beakLength, beakBaseY);
        ctx.lineTo(beakBaseX, beakBaseY + beakHeight);
    } else {
        ctx.moveTo(beakBaseX, beakBaseY);
        ctx.lineTo(beakBaseX - beakLength, beakBaseY);
        ctx.lineTo(beakBaseX, beakBaseY + beakHeight);
    }
    ctx.closePath();
    ctx.fill();

    // 眼睛 - 白眼圈 + 黑眼珠
    const eyeOffsetX = bird.direction > 0 ? headRadius * 0.3 : -headRadius * 0.3;
    const eyeX = headX + eyeOffsetX;
    const eyeY = headY - headRadius * 0.1;

    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, 2, 0, Math.PI * 2);
    ctx.fill();

    // 翅膀（大小翻倍、向后移半个头、下移半个头直径）
    const wingWidth = bodyRadius * 1.6;      // 原 0.8 翻倍
    const wingHeight = bodyRadius * 1.0;     // 原 0.5 翻倍
    // 翅膀基础水平位置（居中于身体）
    let wingX = bodyX - wingWidth / 2;
    // 根据飞行方向向后移半个头直径（向尾巴方向移动）
    const tailDir = bird.direction > 0 ? -1 : 1;
    wingX += tailDir * headRadius;
    // 翅膀垂直位置：先上移一个头直径，再下移半个头直径（最终上移半个头直径）
    const wingY = bodyY - bodyRadius * 1.6 + headRadius;

    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(wingX, wingY, wingWidth, wingHeight);

// ========== 尾巴绘制（基于翅膀末端轨迹）==========
if (bird.tailHistory && bird.tailHistory.length > 1) {
    const points = bird.tailHistory;
    const spacing = 4;          // 两条尾巴之间的垂直间距
    const lineWidth = 2;

    // 直接使用原始点（不再镜像）
    const upperPoints = [];
    const lowerPoints = [];
    for (let i = 0; i < points.length; i++) {
        const p = points[i];
        // 计算切线方向
        let dx = 0, dy = 0;
        if (i === 0 && points.length > 1) {
            dx = points[1].x - p.x;
            dy = points[1].y - p.y;
        } else if (i === points.length - 1 && i > 0) {
            dx = p.x - points[i-1].x;
            dy = p.y - points[i-1].y;
        } else if (i > 0 && i < points.length - 1) {
            dx = points[i+1].x - points[i-1].x;
            dy = points[i+1].y - points[i-1].y;
        }
        const len = Math.hypot(dx, dy);
        if (len > 0.01) {
            const perpX = -dy / len;
            const perpY = dx / len;
            upperPoints.push({ x: p.x + perpX * spacing, y: p.y + perpY * spacing });
            lowerPoints.push({ x: p.x - perpX * spacing, y: p.y - perpY * spacing });
        } else {
            upperPoints.push(p);
            lowerPoints.push(p);
        }
    }

    // 绘制上尾巴曲线
    ctx.beginPath();
    ctx.moveTo(upperPoints[0].x, upperPoints[0].y);
    for (let i = 1; i < upperPoints.length; i++) {
        ctx.lineTo(upperPoints[i].x, upperPoints[i].y);
    }
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = lineWidth;
    ctx.stroke();

    // 绘制下尾巴曲线
    ctx.beginPath();
    ctx.moveTo(lowerPoints[0].x, lowerPoints[0].y);
    for (let i = 1; i < lowerPoints.length; i++) {
        ctx.lineTo(lowerPoints[i].x, lowerPoints[i].y);
    }
    ctx.stroke();

    // 填充两条曲线之间的区域（形成飘带状）
    ctx.beginPath();
    for (let i = 0; i < upperPoints.length; i++) {
        ctx.lineTo(upperPoints[i].x, upperPoints[i].y);
    }
    for (let i = lowerPoints.length - 1; i >= 0; i--) {
        ctx.lineTo(lowerPoints[i].x, lowerPoints[i].y);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.fill();
} else {
    // 后备尾巴：简单绘制两条直线
    const tailStartX = bodyX + (bird.direction > 0 ? -bodyRadius : bodyRadius);
    const tailStartY = bodyY - headRadius;
    const tailLength = 30;
    const tailSpacing = 4;

    ctx.beginPath();
    ctx.moveTo(tailStartX, tailStartY - tailSpacing);
    ctx.lineTo(tailStartX + (bird.direction > 0 ? -tailLength : tailLength), tailStartY - tailSpacing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tailStartX, tailStartY + tailSpacing);
    ctx.lineTo(tailStartX + (bird.direction > 0 ? -tailLength : tailLength), tailStartY + tailSpacing);
    ctx.stroke();
}
    ctx.restore();
}

  const chestY = bird.y - bodySize/2 + headSize/2 + headSize/4; // 头部下方
  const chestWidth = headSize * 0.7;
  const chestHeight = headSize * 0.5;
  
  ctx.fillStyle = '#FF4500'; // 橘红色
  ctx.beginPath();
  ctx.ellipse(chestX, chestY, chestWidth/2, chestHeight/2, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 喙 - 黑色
  ctx.fillStyle = bird.type.beakColor || '#000000';
  const beakStartX = bird.x + bodySize/2 - headSize/2 + headSize/2;
  const beakStartY = bird.y - bodySize/2 + headSize/2;
  const beakLength = 4;
  const beakHeight = 3;
  ctx.beginPath();
  ctx.moveTo(beakStartX, beakStartY);
  ctx.lineTo(beakStartX + beakLength, beakStartY);
  ctx.lineTo(beakStartX, beakStartY + beakHeight);
  ctx.closePath();
  ctx.fill();
  
  // 眼睛 - 黑眼白眼圈
  const eyeX = bird.x + bodySize/2 - headSize/2 + headSize/4;
  const eyeY = bird.y - bodySize/2 + headSize/3;
  
  // 白眼圈
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  
  // 黑眼珠
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.arc(eyeX, eyeY, 1.5, 0, Math.PI * 2);
  ctx.fill();
  
  // 翅膀 - 深灰色
  ctx.fillStyle = bird.type.wingColor; // '#707070'
  ctx.fillRect(
    bird.x - bodySize/4 - headSize/2,
    bird.y - bodySize/2,
    bodySize/2,
    bodySize/3
  );
  
  // 尾巴 - 深灰色
  ctx.fillStyle = bird.type.tailColor; // '#707070'
  const tailStartX = bird.x - bodySize/2;
  const tailStartY = bird.y - bodySize/8;
  const tailHeight = bodySize/4;
  ctx.beginPath();
  ctx.moveTo(tailStartX, tailStartY);
  ctx.lineTo(tailStartX - 8, tailStartY - tailHeight/2);
  ctx.lineTo(tailStartX - 8, tailStartY + tailHeight/2);
  ctx.lineTo(tailStartX, tailStartY);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

function drawMouseInClaws(bird) {
    ctx.save();
    
    const clawOffsetX = 20;
    const clawOffsetY = 15;
    
    let mouseX = bird.x + clawOffsetX;
    let mouseY = bird.y + clawOffsetY;
    
    if (bird.mouseSwingAngle !== undefined) {
        bird.mouseSwingAngle += bird.mouseSwingSpeed || 0.05;
    }
    
    const swingOffset = Math.sin(bird.mouseSwingAngle || 0) * 3;
    mouseX += swingOffset;
    mouseY += Math.abs(swingOffset) * 0.5;
    
    ctx.fillStyle = "#D3D3D3";
    const bodyWidth = 12;
    const bodyHeight = 8;
    ctx.beginPath();
    ctx.ellipse(mouseX, mouseY, bodyWidth/2, bodyHeight/2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = "#D3D3D3";
    const headSize = 6;
    let headX, headY;
    
    headX = mouseX + bodyWidth/2;
    headY = mouseY;
    
    ctx.save();
    ctx.translate(headX, headY);
    ctx.rotate(swingOffset * 0.1);
    
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(headSize, -headSize/2);
    ctx.lineTo(headSize, headSize/2);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = "#000000";
    const eyeX = headSize/2;
    ctx.beginPath();
    ctx.arc(eyeX, -headSize/4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeX, headSize/4, 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
    
    ctx.save();
    ctx.translate(mouseX, mouseY);
    
    let tailStartX, tailStartY;
    tailStartX = -bodyWidth/2;
    tailStartY = 0;
    
    const tailLength = 15;
    const tailAngle = swingOffset * 0.2;
    
    let tailEndX, tailEndY;
    tailEndX = tailStartX - Math.cos(tailAngle) * tailLength;
    tailEndY = tailStartY + Math.sin(tailAngle) * tailLength;
    
    ctx.strokeStyle = "#D3D3D3";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(tailStartX, tailStartY);
    ctx.lineTo(tailEndX, tailEndY);
    ctx.stroke();
    
    ctx.restore();
    ctx.restore();
}

function generateRareBird() {
  const isNightMode = gameMode === 'night' || (gameMode === 'normal' && !isDaytime);
  let availableRareBirds = RARE_BIRDS.filter(birdKey => {
    const birdType = BIRD_TYPES[birdKey];
    if (!birdType) return false; // 添加保护性检查
    
    // 小红头只在白天出现
    if (birdKey === 'RED_HEADED') {
      return !isNightMode;
    }
    // 红胸姬鹟只在白天出现
    if (birdKey === 'RED_BREASTED_FLYCATCHER') {
      return !isNightMode;
    }
    
    if (birdType.isNocturnal || birdType.canAppearAtNight) {
      return isNightMode;
    }
    return !isNightMode;
  });
  
  if (availableRareBirds.length === 0) {
    if (isNightMode) {
      availableRareBirds = ['OWL'];
    } else {
      // 确保白天可用的稀有鸟类包含所有白天鸟类，包括小红头和红胸姬鹟
      availableRareBirds = ['KENTISH_PLOVER', 'MINIVET', 'GOLDCREST', 'LITTLEGREBE', 'LONGTAILED_FINCH', 'ROBIN', 'RED_HEADED', 'RED_BREASTED_FLYCATCHER'];
    }
  }
  
  const capturedRareBirds = availableRareBirds.filter(birdKey => {
    const birdName = BIRD_TYPES[birdKey]?.name;
    return birdName && capturedBirds[birdName] && capturedBirds[birdName] > 0;
  });
  
  const uncapturedRareBirds = availableRareBirds.filter(birdKey => {
    const birdName = BIRD_TYPES[birdKey]?.name;
    return birdName && (!capturedBirds[birdName] || capturedBirds[birdName] === 0);
  });
  
  let randomBirdKey;
  if (uncapturedRareBirds.length > 0) {
    randomBirdKey = uncapturedRareBirds[Math.floor(Math.random() * uncapturedRareBirds.length)];
  } else {
    randomBirdKey = availableRareBirds[Math.floor(Math.random() * availableRareBirds.length)];
  }
  
  // 确保 randomBirdKey 有对应的处理
  switch (randomBirdKey) {
    case 'KENTISH_PLOVER':
      generateKentishPlover(false);
      showSpecialAlert("稀有鸟类出现：金眶鸻！");
      break;
          case 'WHITE_CROWNED_PENDULINE_TIT':
      generateWhiteCrownedPendulineTit(false);
      showSpecialAlert("稀有鸟类出现：白冠攀雀！");
      break;
          case 'PARADISE_FLYCATCHER':
      generateParadiseFlycatcher(false);
      showSpecialAlert("稀有鸟类出现：寿带！");
      break;
    case 'MINIVET':
      generateMinivetRare(false);
      showSpecialAlert("稀有鸟类出现：山椒鸟！");
      break;
    case 'GOLDCREST':
      generateGoldcrest(false);
      showSpecialAlert("稀有鸟类出现：戴菊！");
      break;
    case 'OWL':
      generateOwlRare(false);
      showSpecialAlert("稀有鸟类出现：长耳鸮！");
      break;
    case 'LITTLEGREBE':
      generateLittleGrebe(false);
      showSpecialAlert("稀有鸟类出现：小北！");
      break;
    case 'LONGTAILED_FINCH':
      generateLongtailedFinchRare(false);
      showSpecialAlert("稀有鸟类出现：长尾雀！");
      break;
    case 'ROBIN':
      generateRobinRare(false);
      showSpecialAlert("稀有鸟类出现：罗宾！");
      break;
    case 'RED_HEADED':
      generateRedHeaded(false);
      showSpecialAlert("稀有鸟类出现：小红头！");
      break;
    case 'RED_BREASTED_FLYCATCHER':
      generateRedBreastedFlycatcher(false);
      showSpecialAlert("稀有鸟类出现：红胸姬鹟！");
      break;
    default:
      console.log("未处理的稀有鸟类键:", randomBirdKey);
      // 默认生成一个已知的稀有鸟类
      generateKentishPlover(false);
      showSpecialAlert("稀有鸟类出现：金眶鸻！");
      break;
  }
}

// 生成宏伟水渠（成对站在石头顶部，执行乌鹟式动作）
function generateMagnificentStream(countStats = true) {
    if (!stones || stones.length === 0) {
        console.warn("没有石头，宏伟水渠生成失败");
        return;
    }

    const targetStone = stones[Math.floor(Math.random() * stones.length)];
    // 石头顶部坐标：圆心 y 减去半高即为顶部，再向上偏移 3 像素确保站在上方
    const stoneTopY = targetStone.y - targetStone.height / 2 - 3;
    const stoneTopX = targetStone.x;

    // 为雄鸟和雌鸟生成不同停靠点（水平偏移）
    let maleTargetX = stoneTopX + (Math.random() - 0.5) * 15;
    let femaleTargetX = stoneTopX + (Math.random() - 0.5) * 15;
    const targetY = stoneTopY;

    // 确保两鸟间距足够
    const minDistance = 30;
    if (Math.abs(maleTargetX - femaleTargetX) < minDistance) {
        if (maleTargetX < stoneTopX) {
            maleTargetX -= minDistance / 2;
            femaleTargetX += minDistance / 2;
        } else {
            maleTargetX += minDistance / 2;
            femaleTargetX -= minDistance / 2;
        }
    }

    const fromLeft = Math.random() > 0.5;
    const groupId = nextGroupId++;
    birdGroupInfo[groupId] = { birds: [] };

    // 雌鸟（立即起飞）

// 宏伟水渠的更新函数（站在石头顶部，执行乌鹟式动作）
// 宏伟水渠的更新函数（成对出现在石头上，执行乌鹟式动作）
function updateMagnificentStream(bird, deltaTime) {
  console.log(`[宏伟水渠] ${bird.name} 状态: ${bird.state}, 计时: ${bird.stateTime}, 目标: (${bird.targetX}, ${bird.targetY})`);
    // 猛禽惊吓检测
    let raptorNearby = false;
    for (let otherBird of birds) {
        if ((otherBird.name === "游隼" || otherBird.name === "红隼" || otherBird.name === "黑翅鸢") &&
            otherBird.state !== 'fleeing') {
            const dx = otherBird.x - bird.x;
            const dy = otherBird.y - bird.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 500) {
                raptorNearby = true;
                break;
            }
        }
    }
    if (raptorNearby && bird.state !== 'fleeingFromRaptor' && bird.state !== 'flyingAway') {
        bird.state = 'fleeingFromRaptor';
        bird.stateTime = 0;
        bird.speed = 3.5;
        bird.direction = Math.random() > 0.5 ? 1 : -1;
        return;
    }

    bird.stateTime += deltaTime;

    switch (bird.state) {
        case 'waiting':
            if (bird.stateTime >= bird.flyDelay) {
                bird.state = 'flyingToStone';
                bird.stateTime = 0;
                // 确保目标位置存在
                if (bird.targetX === undefined) {
                    bird.targetX = bird.x;
                    bird.targetY = bird.y;
                }
            }
            break;

        case 'flyingToStone':
            {
                const dx = bird.targetX - bird.x;
                const dy = bird.targetY - bird.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 15) {
                    bird.x = bird.targetX;
                    bird.y = bird.targetY;
                    bird.state = 'perching';
                    bird.stateTime = 0;
                    bird.speed = 0;
                    bird.direction = (bird.targetX - bird.x) > 0 ? 1 : -1;
                } else {
                    const step = Math.min(bird.speed, dist);
                    bird.x += (dx / dist) * step;
                    bird.y += (dy / dist) * step;
                    bird.direction = dx > 0 ? 1 : -1;
                }
            }
            break;

case 'perching':
    // 确保 perchTime 存在且为正数
    if (bird.perchTime === undefined || bird.perchTime <= 0) {
        bird.perchTime = 5000;  // 默认 5 秒
        console.warn(`[${bird.name}] perchTime 缺失，设为默认值 5000`);
    }
    
    // 调试：每秒打印一次站立进度（避免刷屏）
    const currentSecond = Math.floor(bird.stateTime / 1000);
    const prevSecond = Math.floor((bird.stateTime - deltaTime) / 1000);
    if (currentSecond !== prevSecond) {
        console.log(`[${bird.name}] 站立 ${currentSecond} 秒，目标 ${bird.perchTime / 1000} 秒后起飞`);
    }
    
    // 判断站立时间是否达到 perchTime
    if (bird.stateTime >= bird.perchTime) {
        console.log(`[${bird.name}] 站立结束（${bird.stateTime}ms >= ${bird.perchTime}ms），开始起飞！`);
        
        // 初始化起飞参数
        bird.flyUpStartX = bird.x;
        bird.flyUpStartY = bird.y;
        bird.flyUpTargetX = bird.x + Math.cos(bird.flyUpAngle) * bird.flyUpDistance;
        bird.flyUpTargetY = bird.y - Math.sin(Math.abs(bird.flyUpAngle)) * bird.flyUpDistance;
        
        // 确保头部朝向与飞起方向一致
        if ((bird.flyUpTargetX - bird.x) * bird.direction < 0) {
            bird.direction *= -1;
        }
        
        bird.state = 'flyingUp';
        bird.stateTime = 0;
        bird.isFlyingUp = true;
    }
    break;

        case 'flyingUp':
            const flyUpDuration = 500;
            const flyUpProgress = Math.min(bird.stateTime / flyUpDuration, 1);
            const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
            const easeProgress = easeOutCubic(flyUpProgress);
            bird.x = bird.flyUpStartX + (bird.flyUpTargetX - bird.flyUpStartX) * easeProgress;
            const parabolaHeight = 15;
            const yProgress = flyUpProgress;
            const parabolaOffset = 4 * parabolaHeight * yProgress * (1 - yProgress);
            bird.y = bird.flyUpStartY - (bird.flyUpStartY - bird.flyUpTargetY) * easeProgress - parabolaOffset;
            if (flyUpProgress >= 1) {
                bird.state = 'hovering';
                bird.stateTime = 0;
                bird.hoverTotalTime = 3000;
                bird.hoverCenterX = bird.x;
                bird.hoverCenterY = bird.y;
                bird.hoverStartTime = gameTime;
                bird.hoverShakeTimer = 0;
                bird.hoverShakeDuration = 100 + Math.random() * 200;
                bird.hoverShakeX = 0;
                bird.hoverShakeY = 0;
                bird.hoverTargetShakeX = (Math.random() - 0.5) * 4;
                bird.hoverTargetShakeY = (Math.random() - 0.5) * 2;
            }
            break;

        case 'hovering':
            const hoverElapsed = gameTime - bird.hoverStartTime;
            const hoverProgress = hoverElapsed / bird.hoverTotalTime;
            if (hoverProgress < 1) {
                bird.hoverShakeTimer += deltaTime;
                if (bird.hoverShakeTimer >= bird.hoverShakeDuration) {
                    bird.hoverShakeTimer = 0;
                    bird.hoverShakeDuration = 100 + Math.random() * 200;
                    bird.hoverTargetShakeX = (Math.random() - 0.5) * 4;
                    bird.hoverTargetShakeY = (Math.random() - 0.5) * 2;
                }
                const shakeProgress = bird.hoverShakeTimer / bird.hoverShakeDuration;
                const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                const easeProgress = easeInOut(Math.min(shakeProgress, 1));
                bird.hoverShakeX += (bird.hoverTargetShakeX - bird.hoverShakeX) * 0.1;
                bird.hoverShakeY += (bird.hoverTargetShakeY - bird.hoverShakeY) * 0.1;
                bird.x = bird.hoverCenterX + bird.hoverShakeX;
                bird.y = bird.hoverCenterY + bird.hoverShakeY;
            } else {
                bird.state = 'flyingBack';
                bird.stateTime = 0;
                bird.flyBackStartX = bird.x;
                bird.flyBackStartY = bird.y;
            }
            break;

        case 'flyingBack':
            const flyBackDuration = 800;
            const flyBackProgress = Math.min(bird.stateTime / flyBackDuration, 1);
            const easeInOutProgress = flyBackProgress < 0.5 ? 2 * flyBackProgress * flyBackProgress : 1 - Math.pow(-2 * flyBackProgress + 2, 2) / 2;
            bird.x = bird.flyBackStartX + (bird.originalX - bird.flyBackStartX) * easeInOutProgress;
            bird.y = bird.flyBackStartY + (bird.originalY - bird.flyBackStartY) * easeInOutProgress;
            if (flyBackProgress >= 1) {
                bird.flyUpCount++;
                if (bird.flyUpCount < bird.maxFlyUpCount) {
                    bird.state = 'perching';
                    bird.stateTime = 0;
                    bird.perchTime = 1000 + Math.random() * 1000;
                } else {
                    bird.state = 'perchingAfterFlight';
                    bird.stateTime = 0;
                }
            }
            break;

        case 'perchingAfterFlight':
            if (bird.stateTime > bird.finalPerchTime) {
                // 成对飞走逻辑：检查伴侣是否已经飞走
                const group = birdGroupInfo[bird.groupId];
                if (group) {
                    const mate = group.birds.find(b => b !== bird);
                    if (mate && mate.state === 'flyingAway') {
                        // 伴侣已飞走，自己也飞走
                        bird.state = 'flyingAway';
                        bird.stateTime = 0;
                        bird.flyAwaySpeed = 1.5 + Math.random() * 0.5;
                        bird.flyAwayDirection = bird.x < GAME_WIDTH / 2 ? 1 : -1;
                        bird.direction = bird.flyAwayDirection;
                    } else if (mate && mate.state !== 'flyingAway' && bird.isMale) {
                        // 雄鸟等待雌鸟先飞
                        // 不立即飞走，继续等待
                    } else {
                        // 没有伴侣或伴侣已消失，直接飞走
                        bird.state = 'flyingAway';
                        bird.stateTime = 0;
                        bird.flyAwaySpeed = 1.5 + Math.random() * 0.5;
                        bird.flyAwayDirection = bird.x < GAME_WIDTH / 2 ? 1 : -1;
                        bird.direction = bird.flyAwayDirection;
                    }
                } else {
                    bird.state = 'flyingAway';
                    bird.stateTime = 0;
                    bird.flyAwaySpeed = 1.5 + Math.random() * 0.5;
                    bird.flyAwayDirection = bird.x < GAME_WIDTH / 2 ? 1 : -1;
                    bird.direction = bird.flyAwayDirection;
                }
            }
            break;

        case 'flyingAway':
            bird.x += bird.flyAwaySpeed * bird.flyAwayDirection;
            bird.y -= 0.3;
            if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;

        case 'fleeingFromRaptor':
            bird.x += bird.direction * bird.speed;
            bird.y -= 0.3;
            if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
    }
}

        const dayDuration = DAY_NIGHT_CYCLE_DURATION;

        let intensity = 0;
        if (currentDayTime < oneMinute) {
            intensity = 0.3 * (1 - currentDayTime / oneMinute);

            const timeLeft = dayDuration - currentDayTime;
            intensity = 0.3 * (1 - timeLeft / oneMinute);
        } else {
            intensity = 0;
        }
        
        goldenFilter.style.backgroundColor = `rgba(255, 215, 0, ${intensity})`;
        isGoldenFilterActive = intensity > 0.01;
    } else {

        isGoldenFilterActive = false;
    }
}

        // 原代码写的是 direction = -1，这会让它向左飞。
        // 应该是保持当前朝向，或者随机选一个。
        // 这里暂时保持原样，或者修复它。
        // 假设向上飞时保持之前的朝向
        // bird.direction = bird.direction; 
        
        bird.headAngle = 0; // 向上飞时水平
        bird.bodyFlipped = false; // 取消翻转
      } else {
        // 继续俯冲
        // 计算相对于行进方向的角度
        // 使用 abs(diveDx) 确保角度始终指向“前方”
        const diveAngle = Math.atan2(diveDy, Math.abs(diveDx));
        
        // 移动逻辑保持使用真实的 diveDx, diveDy
        // 或者使用 angle * direction ? 
        // 最简单的是：
        const moveAngle = Math.atan2(diveDy, diveDx);
        bird.x += Math.cos(moveAngle) * bird.speed;
        bird.y += Math.sin(moveAngle) * bird.speed;
        
        // 头部朝向俯冲方向（相对于身体）
        bird.headAngle = diveAngle;
      }
      break;
      
    case 'caughtFish':
      // 捉到鱼后向上飞
      if (bird.stateTime < 600) {
        // 向上飞半个芦苇高
        bird.y -= bird.speed;
        
        // 计算鱼的正确位置（在嘴尖）
        const beakLength = 8 * bird.beakLengthMultiplier; // 嘴的实际长度
        const fishDistance = beakLength + bird.caughtFish.size/2; // 鱼应该在嘴尖外一点
        
        // 计算鱼相对于翠鸟身体中心的位置
        // 注意：鱼的横向垂直于嘴，所以需要旋转90度
        const angleForFish = bird.headAngle + Math.PI/2;
        
        // 鱼的偏移量（从翠鸟身体中心到鱼的中心）
        bird.fishOffsetX = Math.cos(bird.headAngle) * fishDistance;
        bird.fishOffsetY = Math.sin(bird.headAngle) * fishDistance;
        
        // 鱼自身的角度（横向垂直于嘴）
        bird.fishAngle = angleForFish;
      } else {
        // 向上飞后飞走
        bird.state = 'flyingAway';
        bird.speed = 2.5;
        bird.direction = Math.random() > 0.5 ? 1 : -1;
        bird.facingDirection = bird.direction; // 面向飞行方向
        bird.headAngle = 0; // 水平飞行
        bird.bodyFlipped = (bird.facingDirection === -1);
      }
      break;
      
    case 'flyingAway':
      // 正常飞离画面
      bird.x += bird.direction * bird.speed;
      bird.headAngle = 0; // 水平飞行
      
      if (bird.x < -100 || bird.x > GAME_WIDTH + 100) {
        // 飞出画面，移除
        birds.splice(birds.indexOf(bird), 1);
      }
      break;
      
case 'fleeingFromRaptor':
  // 受惊吓飞走，但保持原有的鱼位置
  bird.x += bird.direction * bird.speed;
  bird.headAngle = 0; // 水平飞行
  bird.bodyFlipped = (bird.direction === -1);
  
  // 更新鱼的位置（保持原有逻辑）
  if (bird.caughtFish) {
    // 计算嘴尖的全局位置
    const beakLength = 10 * bird.beakLengthMultiplier;
    const localBeakTipX = bird.direction === 1 ? beakLength : -beakLength;
    const globalBeakTipX = bird.x + localBeakTipX;
    const globalBeakTipY = bird.y;
    
    // 鱼的位置应该在嘴里面一点
    const fishDistance = -bird.caughtFish.size/3; // 负值表示向里（向翠鸟头部方向）
    const fishX = globalBeakTipX + Math.cos(bird.headAngle) * fishDistance;
    const fishY = globalBeakTipY + Math.sin(bird.headAngle) * fishDistance;
    
    bird.fishOffsetX = fishX - bird.x;
    bird.fishOffsetY = fishY - bird.y;
    bird.fishAngle = bird.headAngle + Math.PI/2;
  }
  
  if (bird.x < -100 || bird.x > GAME_WIDTH + 100) {
    // 飞出画面，移除
    birds.splice(birds.indexOf(bird), 1);
  }
  break;
  }
  
  // 更新身体翻转状态
  // 当面向左边时，身体需要翻转
  if (bird.state !== 'fleeingFromRaptor' && bird.state !== 'flyingAway') {
    bird.bodyFlipped = (bird.facingDirection === -1);
  }
}

// 修改翠鸟绘制函数，实现整体左右翻转
function drawKingfisher(bird) {
  const baseSize = 20;
  const birdSize = baseSize * bird.size;
  
  ctx.save();
  
  // 翠鸟的特殊处理：内部翻转逻辑移除，依赖全局翻转
  // if (bird.bodyFlipped) { ... } REMOVED
  
  // 绘制身体
  ctx.fillStyle = bird.type.bodyColor; // 橙色身体
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, birdSize/2, 0, Math.PI * 2);
  ctx.fill();
  
  // 保存画布状态，准备绘制头部
  ctx.save();
  
  // 平移画布到头部位置
  const headX = bird.x + birdSize/2 - (birdSize * 0.5)/2;
  const headY = bird.y - birdSize/2 + (birdSize * 0.5)/2;
  ctx.translate(headX, headY);
  
  // 根据头部角度旋转画布（头和嘴一起旋转）
  ctx.rotate(bird.headAngle);
  
  // 绘制头部（在旋转后的坐标系中绘制）
  ctx.fillStyle = bird.type.headColor; // 青色头部
  ctx.beginPath();
  ctx.arc(0, 0, (birdSize * 0.5)/2, 0, Math.PI * 2);
  ctx.fill();
  
  // 绘制长嘴
  const beakLength = 8 * bird.beakLengthMultiplier;
  const beakHeight = 3;
  
  ctx.fillStyle = bird.type.beakColor; // 黑色嘴
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(beakLength, 0);
  ctx.lineTo(0, beakHeight);
  ctx.closePath();
  ctx.fill();
  
  // 绘制眼睛和橙色眼圈
  const eyeX = (birdSize * 0.5)/4;
  const eyeY = 0;
  
  // 橙色眼圈
  ctx.fillStyle = bird.type.eyeRingColor;
  ctx.beginPath();
  ctx.arc(eyeX, eyeY, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // 黑色眼睛
  ctx.fillStyle = bird.type.eyeColor;
  ctx.beginPath();
  ctx.arc(eyeX, eyeY, 2, 0, Math.PI * 2);
  ctx.fill();
  
  // 恢复画布状态
  ctx.restore();
  
  // 绘制翅膀
  ctx.fillStyle = bird.type.wingColor; // 蓝色翅膀
  ctx.fillRect(
    bird.x - birdSize/4 - (birdSize * 0.5)/2,
    bird.y - birdSize/2,
    birdSize/2,
    birdSize/3
  );
  
  // 绘制尾部
  ctx.fillStyle = bird.type.tailColor; // 青色尾部
  const tailStartX = bird.x - birdSize/2;
  const tailStartY = bird.y - birdSize/8;
  const tailHeight = birdSize/4;
  
  ctx.beginPath();
  ctx.moveTo(tailStartX, tailStartY);
  ctx.lineTo(tailStartX - 8, tailStartY - tailHeight/2);
  ctx.lineTo(tailStartX - 8, tailStartY + tailHeight/2);
  ctx.lineTo(tailStartX, tailStartY);
  ctx.closePath();
  ctx.fill();
  
  // 如果捉到鱼，绘制鱼
  if (bird.hasCaughtFish && bird.caughtFish) {
    ctx.save();
    
    // 计算鱼的正确位置
    // 首先计算嘴尖的位置（头部位置 + 嘴长）
    const headX = bird.x + birdSize/2 - (birdSize * 0.5)/2;
    const headY = bird.y - birdSize/2 + (birdSize * 0.5)/2;
    
    // 嘴尖在旋转坐标系中的位置
    const beakTipX = Math.cos(bird.headAngle) * beakLength;
    const beakTipY = Math.sin(bird.headAngle) * beakLength;
    
    // 鱼的位置应该在嘴里面一点，不是嘴尖
    const fishDistance = -bird.caughtFish.size/4; // 负值表示向里（向翠鸟头部方向）
    
    // 直接使用全局坐标（假设面朝右），全局翻转会自动处理面朝左的情况
    // 嘴尖在旋转坐标系中的位置（相对于头部中心）
    // 注意：我们需要先旋转再平移，或者直接计算旋转后的坐标
    // 这里我们直接在头部中心的基础上，加上旋转后的向量
    
    // 头部中心坐标
    const headCenterX = bird.x + birdSize/2 - (birdSize * 0.5)/2;
    const headCenterY = bird.y - birdSize/2 + (birdSize * 0.5)/2;
    
    // 鱼在嘴上的位置（相对于头部中心）
    // 嘴长是 beakLength
    // 鱼在嘴上的距离是 beakLength + fishDistance (从头中心算起吗？)
    // 之前的 beakTipX 是嘴尖。
    // 让我们重新计算：
    // 嘴是从 (0,0) 画到 (beakLength, 0) （在头部局部坐标系中）
    // 鱼应该在 (beakLength + fishDistance, 0) （在头部局部坐标系中）
    
    const fishLocalX = beakLength + fishDistance;
    const fishLocalY = 0;
    
    // 将局部坐标转换为全局坐标（考虑 headAngle）
    const fishGlobalX = headCenterX + Math.cos(bird.headAngle) * fishLocalX - Math.sin(bird.headAngle) * fishLocalY;
    const fishGlobalY = headCenterY + Math.sin(bird.headAngle) * fishLocalX + Math.cos(bird.headAngle) * fishLocalY;
    
    let fishAngle = bird.headAngle + Math.PI/2;
    
    ctx.translate(fishGlobalX, fishGlobalY);
    ctx.rotate(fishAngle);
    
    // 绘制鱼身
    ctx.fillStyle = bird.caughtFish.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.caughtFish.size/2, bird.caughtFish.size/4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 绘制鱼尾
    ctx.beginPath();
    ctx.moveTo(-bird.caughtFish.size/3, 0);
    ctx.lineTo(-bird.caughtFish.size/2, -bird.caughtFish.size/4);
    ctx.lineTo(-bird.caughtFish.size/2, bird.caughtFish.size/4);
    ctx.closePath();
    ctx.fill();
    
    // 绘制鱼眼
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(bird.caughtFish.size/4, 0, 1, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
  }
  
  ctx.restore();
}

// 修改蓝翡翠生成函数，从较低高度水平飞入
function generateBlueKingfisher(countStats = false) {
  const blueFisherType = BIRD_TYPES.BLUEFISHER;
  
  if (countStats) {
    appearedBirds[blueFisherType.name] = (appearedBirds[blueFisherType.name] || 0) + 1;
    updateTextStats();
  }
  
  const perchPoint = getDeadTreePerchPoint();
  
  if (!perchPoint) {
    console.log("蓝翡翠生成失败：无法获取枯树停靠点");
    showSpecialAlert("无法找到合适的停靠点，蓝翡翠生成失败");
    return null;
  }
  
  const fromLeft = Math.random() > 0.5;
  const startX = fromLeft ? -50 : GAME_WIDTH + 50;
  const startY = perchPoint.y + Math.random() * 100 - 50;
  
  // 设置更长的停留时间：10-25秒
  const stayDuration = 10000 + Math.random() * 15000; // 10-25秒
  
  const bird = {
    type: blueFisherType,
    name: blueFisherType.name,
    x: startX,
    y: startY,
    size: blueFisherType.size,
    speed: 2.0,
    direction: fromLeft ? 1 : -1,
    state: 'flyingToDeadTree',
    stateTime: 0,
    targetX: perchPoint.x,
    targetY: perchPoint.y,
    perchPoint: perchPoint,
    
    headAngle: 0,
    facingDirection: fromLeft ? 1 : -1,
    
    // 关键：确保计时器有初始值
    turnTimer: 0,
    turnInterval: 3000 + Math.random() * 5000, // 3-8秒
    
    stayTimer: 0,
    stayDuration: stayDuration, // 10-25秒
    
    diveTargetX: 0,
    diveTargetY: 0,
    hasDived: false,
    hasCaughtFish: false,
    caughtFish: null,
    fishOffsetX: 0,
    fishOffsetY: 0,
    fishAngle: 0,
    beakLengthMultiplier: blueFisherType.beakLengthMultiplier,
    
    isVulnerableToRaptors: true,
    noStats: !countStats,
    isBlueKingfisher: true,
    
    bodyFlipped: false
  };
  
  birds.push(bird);
  
  console.log(`生成蓝翡翠: 停留时间 ${stayDuration.toFixed(0)}ms, 换向间隔 ${bird.turnInterval.toFixed(0)}ms`);
  return bird;
}

function getValidDeadTreePerchPoint() {
  if (!deadTree || !deadTree.branchPoints || deadTree.branchPoints.length === 0) {
    return null;
  }
  
  // 过滤出有效的降落点（深度>=2，不是末端点）
  const validPoints = deadTree.branchPoints.filter(point => {
    // 深度足够，不是末端
    if (point.depth < 2) return false;
    
    // 检查点是否在屏幕内
    if (point.x < 50 || point.x > GAME_WIDTH - 50 || 
        point.y < 50 || point.y > GAME_HEIGHT - 50) {
      return false;
    }
    
    return true;
  });
  
  if (validPoints.length === 0) {
    return null;
  }
  
  // 随机选择一个有效点
  const randomPoint = validPoints[Math.floor(Math.random() * validPoints.length)];
  
  // 在分支点周围添加随机偏移，避免精确吸附
  const offsetX = (Math.random() * 15 - 7.5); // -7.5到7.5的随机偏移
  const offsetY = (Math.random() * 10 - 5);   // -5到5的随机偏移
  
  return {
    x: randomPoint.x + offsetX,
    y: randomPoint.y + offsetY,
    originalPoint: randomPoint
  };
}

function updateBlueKingfisher(bird, deltaTime) {
  if (isNaN(bird.x) || isNaN(bird.y) || !isFinite(bird.x) || !isFinite(bird.y)) {
    const index = birds.indexOf(bird);
    if (index !== -1) birds.splice(index, 1);
    return;
}
  bird.stateTime += deltaTime;
  
  // 检查是否有猛禽靠近
  let raptorNearby = false;
  for (let otherBird of birds) {
    if ((otherBird.name === "游隼" || otherBird.name === "红隼" || otherBird.name === "黑翅鸢") && 
        otherBird.state !== 'fleeing') {
      const dx = otherBird.x - bird.x;
      const dy = otherBird.y - bird.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (distance < 1000) {
        raptorNearby = true;
        break;
      }
    }
  }
  
  // 如果猛禽靠近且蓝翡翠不在逃跑状态，立即开始逃跑
  if (raptorNearby && bird.state !== 'fleeingFromRaptor' && bird.state !== 'flyingAway') {
    bird.state = 'fleeingFromRaptor';
    bird.stateTime = 0;
    bird.speed = 3.5;
    bird.direction = Math.random() > 0.5 ? 1 : -1;
    bird.facingDirection = bird.direction;
    bird.headAngle = 0;
    bird.bodyFlipped = (bird.facingDirection === -1);
    console.log("蓝翡翠被猛禽惊吓，开始逃跑");
    return;
  }
  
  switch (bird.state) {
    case 'flyingToDeadTree':
      // 飞向枯树 - 计算距离
      const dx = bird.targetX - bird.x;
      const dy = bird.targetY - bird.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (isNaN(bird.targetX) || isNaN(bird.targetY)) {
    bird.state = 'flyingAway';
    bird.speed = 2.5;
    bird.direction = Math.random() > 0.5 ? 1 : -1;
    break;
}
      if (distance < 5) {
        // 到达目标位置，切换到停留状态
        bird.state = 'perchingOnDeadTree';
        bird.stateTime = 0;
        bird.speed = 0;
        bird.x = bird.targetX;
        bird.y = bird.targetY;
        
        // 到达枯树后，头和嘴斜向下45度
        bird.headAngle = Math.PI/4;
        
        // 关键修复：初始化计时器，确保它们有初始值
        if (bird.turnTimer === undefined) bird.turnTimer = 0;
        if (bird.stayTimer === undefined) bird.stayTimer = 0;
        if (bird.turnInterval === undefined) bird.turnInterval = 3000 + Math.random() * 5000; // 3-8秒
        if (bird.stayDuration === undefined) bird.stayDuration = 10000 + Math.random() * 15000; // 10-25秒
        
        console.log(`蓝翡翠降落到枯树: (${bird.x.toFixed(1)}, ${bird.y.toFixed(1)}), 停留时间: ${bird.stayDuration}ms`);
      } else {
        // 向目标移动
        bird.x += (dx / distance) * bird.speed;
        bird.y += (dy / distance) * bird.speed;
        bird.headAngle = Math.atan2(dy, Math.abs(dx));
      }
      break;
      
    case 'perchingOnDeadTree':
      // 关键修复：确保计时器存在并正确更新
      if (bird.turnTimer === undefined) bird.turnTimer = 0;
      if (bird.stayTimer === undefined) bird.stayTimer = 0;
      if (bird.turnInterval === undefined) bird.turnInterval = 3000 + Math.random() * 5000;
      if (bird.stayDuration === undefined) bird.stayDuration = 10000 + Math.random() * 15000;
      
      // 更新计时器 - deltaTime 是毫秒
      bird.turnTimer += deltaTime;
      bird.stayTimer += deltaTime;
      
      // 调试信息：每500ms输出一次计时器状态
      if (Math.floor(bird.stateTime / 500) > Math.floor((bird.stateTime - deltaTime) / 500)) {
        console.log(`蓝翡翠停留: turnTimer=${bird.turnTimer.toFixed(0)}/${bird.turnInterval.toFixed(0)}, stayTimer=${bird.stayTimer.toFixed(0)}/${bird.stayDuration.toFixed(0)}`);
      }
      
      // 检查是否需要换向
      if (bird.turnTimer >= bird.turnInterval) {
        // 水平换向
        bird.facingDirection *= -1;
        bird.direction = bird.facingDirection;
        bird.bodyFlipped = (bird.facingDirection === -1);
        
        // 重置换向计时器，但保留超出部分的时间
        bird.turnTimer = bird.turnTimer - bird.turnInterval;
        
        // 设置新的随机换向间隔
        bird.turnInterval = 3000 + Math.random() * 5000;
        
        console.log(`蓝翡翠换向: ${bird.facingDirection > 0 ? '向右' : '向左'}, 新间隔: ${bird.turnInterval.toFixed(0)}ms`);
      }
      
      // 检查停留时间是否结束
      if (bird.stayTimer >= bird.stayDuration) {
        // 停留时间结束，开始俯冲捉鱼
        bird.state = 'divingForFish';
        bird.stateTime = 0;
        
        // 设置俯冲目标（水面位置）
        bird.diveTargetX = bird.x + (bird.facingDirection > 0 ? 100 : -100);
        bird.diveTargetY = reedZone ? (reedZone.y + reedZone.height - 10) : GAME_HEIGHT - 50;
        bird.speed = bird.type.diveSpeed || 3.0;
        
        console.log(`蓝翡翠开始俯冲: 目标 (${bird.diveTargetX.toFixed(1)}, ${bird.diveTargetY.toFixed(1)}), 停留了 ${bird.stayTimer.toFixed(0)}ms`);
      }
      break;
      
    case 'divingForFish':
      // 俯冲捉鱼
      const diveDx = bird.diveTargetX - bird.x;
      const diveDy = bird.diveTargetY - bird.y;
      const diveDistance = Math.sqrt(diveDx * diveDx + diveDy * diveDy);
      
      // 更新朝向：根据俯冲方向设置
      bird.direction = diveDx > 0 ? 1 : -1;
      
      if (diveDistance < 10 || bird.stateTime > 2000) {
        // 到达水面，捉到鱼
        bird.state = 'caughtFish';
        bird.stateTime = 0;
        bird.hasCaughtFish = true;
        
        // 创建鱼对象
        bird.caughtFish = {
          x: 0,
          y: 0,
          size: bird.type.fishSize,
          color: bird.type.fishColor,
          angle: Math.PI/2 // 鱼横向垂直于嘴
        };
        
        // 向上飞起
        bird.speed = 2.0;
        bird.headAngle = 0;
        bird.bodyFlipped = false;
        
        console.log("蓝翡翠捉到鱼");
      } else {
        // 继续俯冲
        const diveAngle = Math.atan2(diveDy, Math.abs(diveDx));
        const moveAngle = Math.atan2(diveDy, diveDx);
        bird.x += Math.cos(moveAngle) * bird.speed;
        bird.y += Math.sin(moveAngle) * bird.speed;
        
        // 头部朝向俯冲方向
        bird.headAngle = diveAngle;
      }
      break;
      
    case 'caughtFish':
      // 捉到鱼后向上飞
      if (bird.stateTime < 600) {
        // 向上飞
        bird.y -= bird.speed;
        
        // 计算鱼的位置（在嘴尖）
        const beakLength = 8 * bird.beakLengthMultiplier;
        const fishDistance = beakLength + bird.caughtFish.size/2;
        const angleForFish = bird.headAngle + Math.PI/2;
        
        // 鱼的偏移量
        bird.fishOffsetX = Math.cos(bird.headAngle) * fishDistance;
        bird.fishOffsetY = Math.sin(bird.headAngle) * fishDistance;
        
        // 鱼自身的角度
        bird.fishAngle = angleForFish;
      } else {
        // 向上飞后飞走
        bird.state = 'flyingAway';
        bird.speed = 2.5;
        bird.direction = Math.random() > 0.5 ? 1 : -1;
        bird.facingDirection = bird.direction;
        bird.headAngle = 0;
        bird.bodyFlipped = (bird.facingDirection === -1);
        
        console.log("蓝翡翠带着鱼飞走");
      }
      break;
      
    case 'flyingAway':
      // 正常飞离画面
      bird.x += bird.direction * bird.speed;
      bird.headAngle = 0;
      
      if (bird.x < -100 || bird.x > GAME_WIDTH + 100) {
        // 飞出画面，移除
        const index = birds.indexOf(bird);
        if (index > -1) {
          birds.splice(index, 1);
          console.log("蓝翡翠飞出屏幕");
        }
      }
