// ===== 红胸姬鹟更新函数（与乌鹟类似，但目标为枯树）=====
function updateRedBreastedFlycatcher(bird, deltaTime) {
  bird.stateTime += deltaTime;
  
  // 检查是否有猛禽靠近（惊吓条件）
  let raptorNearby = false;
  for (let otherBird of birds) {
    if ((otherBird.name === "游隼" || otherBird.name === "红隼" || otherBird.name === "黑翅鸢") && 
        otherBird.state !== 'fleeing') {
      const dx = otherBird.x - bird.x;
      const dy = otherBird.y - bird.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      // 如果猛禽在1000像素范围内
      if (distance < 1000) {
        raptorNearby = true;
        break;
      }
    }
  }
  
  // 如果猛禽靠近且红胸姬鹟不在逃跑状态，立即开始逃跑
  if (raptorNearby && bird.state !== 'fleeingFromRaptor' && bird.state !== 'flyingAway') {
    bird.state = 'fleeingFromRaptor';
    bird.stateTime = 0;
    bird.speed = 3.5; // 惊吓逃跑速度更快
    bird.direction = Math.random() > 0.5 ? 1 : -1; // 随机方向逃跑
    return;
  }
  
  switch (bird.state) {
    case 'perching':
      // 站立在枯树顶部
      if (bird.stateTime > bird.perchTime) {
        // 站立时间结束，开始飞起
        bird.state = 'flyingUp';
        bird.stateTime = 0;
        bird.flyUpStartX = bird.x;
        bird.flyUpStartY = bird.y;
        // 飞起目标点：斜上方
        bird.flyUpTargetX = bird.x + Math.cos(bird.flyUpAngle) * bird.flyUpDistance;
        bird.flyUpTargetY = bird.y - Math.sin(Math.abs(bird.flyUpAngle)) * bird.flyUpDistance;
        // 确保方向正确：飞起方向与头部朝向一致
        if ((bird.flyUpTargetX - bird.x) * bird.direction < 0) {
          bird.direction *= -1; // 如果方向不一致，调整头部朝向
        }
      }
      break;
      
    case 'flyingUp':
      // 斜上飞起 - 使用抛物线轨迹
      const flyUpDuration = 500; // 500ms
      const flyUpProgress = Math.min(bird.stateTime / flyUpDuration, 1);
      
      // 使用缓动函数
      const easeOutCubic = function(t) { return 1 - Math.pow(1 - t, 3); };
      const easeProgress = easeOutCubic(flyUpProgress);
      
      // 计算当前位置
      bird.x = bird.flyUpStartX + (bird.flyUpTargetX - bird.flyUpStartX) * easeProgress;
      
      // Y轴使用抛物线轨迹（先快后慢）
      const parabolaHeight = 15; // 抛物线高度
      const yProgress = flyUpProgress;
      const parabolaOffset = 4 * parabolaHeight * yProgress * (1 - yProgress);
      bird.y = bird.flyUpStartY - (bird.flyUpStartY - bird.flyUpTargetY) * easeProgress - parabolaOffset;
      
      if (flyUpProgress >= 1) {
        bird.state = 'hovering';
        bird.stateTime = 0;
        bird.hoverTime = 200 + Math.random() * 300; // 200-500ms悬停
      }
      break;
      
    case 'hovering':
      // 在飞起顶点短暂停留并抖动
      if (!bird.hoverInitialized) {
        // 初始化悬停参数
        bird.hoverInitialized = true;
        bird.hoverTotalTime = 3000; // 悬停3秒
        bird.hoverCenterX = bird.x; // 悬停中心点
        bird.hoverCenterY = bird.y;
        bird.hoverStartTime = gameTime; // 记录悬停开始时间
        bird.hoverShakeTimer = 0;
        bird.hoverShakeDuration = 100 + Math.random() * 200; // 每个抖动周期100-300ms
        bird.hoverShakeX = 0;
        bird.hoverShakeY = 0;
        bird.hoverTargetShakeX = (Math.random() - 0.5) * 4; // 随机目标抖动位置
        bird.hoverTargetShakeY = (Math.random() - 0.5) * 2;
      }
      
      // 计算悬停时间
      const hoverElapsed = gameTime - bird.hoverStartTime;
      const hoverProgress = hoverElapsed / bird.hoverTotalTime;
      
      if (hoverProgress < 1) {
        // 还在悬停时间内
        bird.hoverShakeTimer += deltaTime;
        
        if (bird.hoverShakeTimer >= bird.hoverShakeDuration) {
          // 抖动周期结束，切换到新的随机目标
          bird.hoverShakeTimer = 0;
          bird.hoverShakeDuration = 100 + Math.random() * 200;
          bird.hoverTargetShakeX = (Math.random() - 0.5) * 4;
          bird.hoverTargetShakeY = (Math.random() - 0.5) * 2;
        }
        
        // 平滑过渡到目标抖动位置
        const shakeProgress = bird.hoverShakeTimer / bird.hoverShakeDuration;
        const easeProgress = easeInOutQuad(Math.min(shakeProgress, 1));
        
        bird.hoverShakeX += (bird.hoverTargetShakeX - bird.hoverShakeX) * 0.1;
        bird.hoverShakeY += (bird.hoverTargetShakeY - bird.hoverShakeY) * 0.1;
        
        // 应用抖动
        bird.x = bird.hoverCenterX + bird.hoverShakeX;
        bird.y = bird.hoverCenterY + bird.hoverShakeY;
        
        // 随机改变翅膀扇动状态
        if (Math.random() < 0.02) {
          bird.wingFlap = !bird.wingFlap;
        }
      } else {
        // 悬停3秒结束，开始飞回原处
        bird.state = 'flyingBack';
        bird.stateTime = 0;
        bird.flyBackStartX = bird.x;
        bird.flyBackStartY = bird.y;
        
        // 重置悬停相关属性
        bird.hoverInitialized = false;
      }
      break;
      
    case 'flyingBack':
      // 飞回原处 - 使用自然轨迹
      const flyBackDuration = 800; // 800ms
      const flyBackProgress = Math.min(bird.stateTime / flyBackDuration, 1);
      
      // 使用缓入缓出函数
      const easeInOutProgress = easeInOutQuad(flyBackProgress);
      
      // 计算当前位置
      bird.x = bird.flyBackStartX + (bird.originalX - bird.flyBackStartX) * easeInOutProgress;
      bird.y = bird.flyBackStartY + (bird.originalY - bird.flyBackStartY) * easeInOutProgress;
      
      if (flyBackProgress >= 1) {
        bird.flyUpCount++;
        
        if (bird.flyUpCount < bird.maxFlyUpCount) {
          bird.state = 'perching';
          bird.stateTime = 0;
          bird.perchTime = 1000 + Math.random() * 1000;
        } else {
          bird.state = 'perchingAfterFlight';
          bird.stateTime = 0;
          bird.finalPerchTime = 5000 + Math.random() * 5000;
        }
      }
      break;
      
    case 'perchingAfterFlight':
      // 完成飞起后的站立
      if (bird.stateTime > bird.finalPerchTime) {
        // 最终飞走
        bird.state = 'flyingAway';
        bird.stateTime = 0;
        bird.flyAwaySpeed = 1.5 + Math.random() * 0.5;
        
        // 确定飞走方向：根据枯树位置（左侧或右侧）决定向外飞
        // 简单判断：如果枯树在左侧，向右飞；如果在右侧，向左飞
        if (deadTree) {
          if (deadTree.x < GAME_WIDTH / 2) {
            bird.flyAwayDirection = 1; // 向右飞
          } else {
            bird.flyAwayDirection = -1; // 向左飞
          }
        } else {
          bird.flyAwayDirection = Math.random() > 0.5 ? 1 : -1;
        }
        // 确保头部朝向与飞行方向一致
        bird.direction = bird.flyAwayDirection;
      }
      break;
      
    case 'flyingAway':
      // 飞走离开
      bird.x += bird.flyAwaySpeed * bird.flyAwayDirection;
      bird.y -= 0.3; // 轻微向上
      
      // 检查是否飞出屏幕
      const margin = 100;
      if (bird.x < -margin || bird.x > GAME_WIDTH + margin || bird.y < -margin) {
        birds.splice(birds.indexOf(bird), 1);
      }
      // 15秒后强制移除（防止卡住）
      if (bird.stateTime > 15000) {
        birds.splice(birds.indexOf(bird), 1);
      }
      break;
      
    case 'fleeingFromRaptor':
      // 受惊吓飞走
      bird.x += bird.direction * bird.speed;
      bird.y -= 0.3; // 轻微向上
      
      if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
        birds.splice(birds.indexOf(bird), 1);
      }
      break;
  }
}

// 获取枯树上的合适停靠点
function getDeadTreePerchPoint() {
  if (!deadTree) {
    console.log("getDeadTreePerchPoint: 枯树不存在");
    return null;
  }
  
  // 确保枯树已初始化
  if (!isDeadTreeInitialized) {
    console.log("getDeadTreePerchPoint: 枯树未初始化，正在初始化...");
    initDeadTree();
  }
  
  // 检查分支点是否存在，如果不存在则生成一次
  if (!deadTree.branchPoints || deadTree.branchPoints.length === 0) {
    console.log("getDeadTreePerchPoint: 分支点为空，正在生成...");
    generateDeadTreeBranchPoints();
  }
  
  // 再次检查
  if (!deadTree.branchPoints || deadTree.branchPoints.length === 0) {
    console.log("getDeadTreePerchPoint: 分支点生成失败，使用备用点");
    return getFallbackPerchPoint();
  }
  
  // 选择深度>=2的分叉点
  const validBranchPoints = deadTree.branchPoints.filter(point => {
    if (point.depth < 2) return false;
    
    // 检查点是否在游戏区域内
    if (point.x < 100 || point.x > GAME_WIDTH - 100 || 
        point.y < 100 || point.y > GAME_HEIGHT - 100) {
      return false;
    }
    
    return true;
  });
  
  if (validBranchPoints.length > 0) {
    // 随机选择一个分叉点
    const randomPoint = validBranchPoints[Math.floor(Math.random() * validBranchPoints.length)];
    
    // 添加随机偏移
    const offsetX = (Math.random() * 20 - 10);
    const offsetY = (Math.random() * 15 - 7.5);
    
    const perchPoint = {
      x: randomPoint.x + offsetX,
      y: randomPoint.y + offsetY,
      originalX: randomPoint.x,
      originalY: randomPoint.y,
      branchAngle: randomPoint.angle,
      branchLength: randomPoint.branchLength,
      depth: randomPoint.depth
    };
    
    console.log(`getDeadTreePerchPoint: 选择点 (${perchPoint.x.toFixed(1)}, ${perchPoint.y.toFixed(1)}), 深度: ${perchPoint.depth}`);
    
    return perchPoint;
  }
  
  // 如果没有有效点，返回备用点
  console.log("getDeadTreePerchPoint: 没有有效分支点，使用备用点");
  return getFallbackPerchPoint();
}

// 获取备用停靠点
function getFallbackPerchPoint() {
  if (!deadTree) return null;
  
  const groundY = reedZone ? (reedZone.y + reedZone.height) : GAME_HEIGHT * 0.9;
  const treeTopY = groundY - deadTree.height;
  const treeHeightRange = deadTree.height * 0.8;
  const treeMiddleY = treeTopY + treeHeightRange * 0.5;
  
  return {
    x: deadTree.x + (Math.random() * 30 - 15),
    y: treeMiddleY + Math.random() * (treeHeightRange * 0.3) - (treeHeightRange * 0.15),
    branchAngle: -Math.PI/2,
    branchLength: deadTree.height * 0.5,
    depth: 1,
    isFallback: true
  };
}

function updateBat(bird, deltaTime) {
    if (gamePaused) return;
    bird.stateTime += deltaTime;
    bird.circlingTime += deltaTime;
    bird.wingFlapTimer += bird.wingFlapSpeed;
    if (gameMode === 'normal' && isDaytime) {
        bird.state = 'fleeing';
        bird.speed = bird.speed * 1.5;
        bird.direction = 1;
        bird.fleeStartTime = gameTime;
    }
    if (bird.circlingTime > bird.circleTime) {
        bird.state = 'leaving';
        bird.speed = 1.5;
        bird.direction = 1;
    }
    if (!bird.irregularParams) {
        bird.irregularParams = {
            radiusVariation: 0.3 + Math.random() * 0.4,
            angleVariation: 0.02 + Math.random() * 0.03,
            radiusChangeSpeed: 0.001 + Math.random() * 0.002,
            centerDriftSpeed: 0.05 + Math.random() * 0.1,
            verticalDriftSpeed: 0.02 + Math.random() * 0.03,
            currentRadius: bird.circlingRadius,
            targetRadius: bird.circlingRadius * (0.7 + Math.random() * 0.6),
            radiusDirection: Math.random() > 0.5 ? 1 : -1,
            centerDriftX: (Math.random() - 0.5) * 2,
            centerDriftY: (Math.random() - 0.5) * 2,
            verticalDrift: 0,
            verticalDirection: Math.random() > 0.5 ? 1 : -1
        };
    }
    const params = bird.irregularParams;
    switch (bird.state) {
        case 'circling':
            bird.circlingAngle += params.angleVariation * (bird.type.speedMultiplier || 1);
            params.currentRadius += params.radiusChangeSpeed * params.radiusDirection;
            if (Math.abs(params.currentRadius - params.targetRadius) < 5) {
                params.targetRadius = bird.circlingRadius * (0.7 + Math.random() * 0.6);
                params.radiusDirection *= -1;
            }
            params.currentRadius = Math.max(
                bird.circlingRadius * 0.5,
                Math.min(bird.circlingRadius * 1.5, params.currentRadius)
            );
            bird.circlingCenterX += params.centerDriftX * params.centerDriftSpeed;
            bird.circlingCenterY += params.centerDriftY * params.centerDriftSpeed;
            bird.circlingCenterX = Math.max(
                GAME_WIDTH * 0.3,
                Math.min(GAME_WIDTH * 0.7, bird.circlingCenterX)
            );
            bird.circlingCenterY = Math.max(
                GAME_HEIGHT * 0.2,
                Math.min(GAME_HEIGHT * 0.4, bird.circlingCenterY)
            );
            params.verticalDrift += params.verticalDriftSpeed * params.verticalDirection;
            if (Math.abs(params.verticalDrift) > 20) {
                params.verticalDirection *= -1;
            }
            const effectiveRadiusX = params.currentRadius * (1 + Math.sin(bird.circlingAngle * 0.5) * 0.2);
            const effectiveRadiusY = params.currentRadius * (1 + Math.cos(bird.circlingAngle * 0.3) * 0.2);
            bird.x = bird.circlingCenterX + Math.cos(bird.circlingAngle) * effectiveRadiusX;
            bird.y = bird.circlingCenterY + Math.sin(bird.circlingAngle) * effectiveRadiusY + params.verticalDrift;
            if (bird.y > GAME_HEIGHT * 0.5) {
                bird.y = GAME_HEIGHT * 0.5 - 10;
                bird.circlingAngle += Math.PI * 0.2;
                params.verticalDrift = -10;
                params.verticalDirection = -1;
            }
            if (bird.y < GAME_HEIGHT * 0.15) {
                bird.y = GAME_HEIGHT * 0.15 + 10;
                bird.circlingAngle += Math.PI * 0.2;
                params.verticalDrift = 10;
                params.verticalDirection = 1;
            }
            if (Math.random() < 0.01) {
                params.centerDriftX = (Math.random() - 0.5) * 2;
                params.centerDriftY = (Math.random() - 0.5) * 2;
            }
            if (Math.random() < 0.02) {
                params.verticalDirection *= -1;
            }
            const tangentAngle = bird.circlingAngle + Math.PI / 2;
            bird.direction = Math.cos(tangentAngle) > 0 ? 1 : -1;
            if (Math.random() < 0.005) {
                bird.direction *= -1;
                bird.circlingAngle += Math.PI * 0.5;
            }
            break;
        case 'leaving':
        case 'fleeing':
            // 水平斜上飞，角度不超过20度
            const batLeavingAngle = (8 + Math.random() * 12) * Math.PI / 180; // 8-20度
            bird.x += bird.speed * Math.cos(batLeavingAngle);
            bird.y -= bird.speed * Math.sin(batLeavingAngle);
            // 保持原有的摆动效果，但减小幅度
            bird.y += Math.sin(gameTime * 0.001) * 0.1; // 减小垂直摆动幅度
            bird.x += Math.sin(gameTime * 0.002) * 0.2; // 减小水平摆动幅度
            if (bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
    }
}

function updateOwlBird(bird, deltaTime) {
    bird.stateTime += deltaTime;
    bird.faceChangeTimer += deltaTime;
    if (bird.faceChangeTimer > bird.faceChangeInterval) {
        bird.faceChangeTimer = 0;
        bird.faceChangeInterval = 10000 + Math.random() * 10000;
    }
    if (bird.name !== "雕鸮" && bird.state !== 'fleeing') {
        for (const otherBird of birds) {
            if (otherBird.name === "雕鸮" && otherBird.state !== 'fleeing') {
                bird.state = 'fleeing';
                bird.speed = bird.speed * 2;
                bird.direction = Math.random() > 0.5 ? 1 : -1;
                bird.fleeStartTime = gameTime;
                break;
            }
        }
    }
    if (gameMode === 'normal' && isDaytime && bird.state !== 'fleeing') {
        bird.state = 'fleeing';
        bird.speed = bird.speed * 1.5;
        bird.direction = 1;
        bird.fleeStartTime = gameTime;
    }
    switch (bird.state) {
        case 'circling':
            bird.circlingTime += deltaTime;
            bird.circlingAngle += 0.01 * (bird.type.speedMultiplier || 1);
            bird.x = bird.circlingCenterX + Math.cos(bird.circlingAngle) * bird.circlingRadius;
            bird.y = bird.circlingCenterY + Math.sin(bird.circlingAngle) * bird.circlingRadius;
            const tangentAngle = bird.circlingAngle + Math.PI / 2;
            bird.direction = Math.cos(tangentAngle) > 0 ? 1 : -1;
            if (bird.circlingTime > bird.circleTime) {
                bird.state = 'glidingToGround';
                bird.speed = 0.8 * (bird.type.speedMultiplier || 1);
                bird.direction = Math.random() > 0.5 ? 1 : -1;
                bird.glidingStartY = bird.y;
            }
            break;
        case 'glidingToGround':
            bird.x += bird.speed * bird.direction * 0.3;
            bird.y += bird.speed * 1.5;
            if (bird.y >= GAME_HEIGHT - 60) {
                if (Math.random() < bird.catchPreyChance) {
                    if (bird.catchPreyType === "hedgehog") {
                        bird.caughtPrey = generateHedgehog();
                    } else if (bird.catchPreyType === "mouse") {
                        bird.caughtPrey = generateGroundMouseForPredator(bird.name);
                    }
                    if (bird.caughtPrey) {
                        const index = groundObjects.indexOf(bird.caughtPrey);
                        if (index !== -1) {
                            groundObjects.splice(index, 1);
                        }
                    }
                    bird.state = 'flyingWithPrey';
                    bird.speed = 1.5;
                    bird.direction = 1;
                    bird.y -= 50;
                } else {
                    bird.state = 'leaving';
                    bird.speed = 1.5;
                    bird.direction = 1;
                }
            }
            break;
        case 'flyingWithPrey':
        case 'leaving':
            // 水平斜上飞，角度不超过20度
            const owlLeavingAngle = (10 + Math.random() * 10) * Math.PI / 180; // 10-20度
            bird.x += bird.speed * Math.cos(owlLeavingAngle);
            bird.y -= bird.speed * Math.sin(owlLeavingAngle);
            if (bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
        case 'fleeing':
            // 水平斜上飞，角度不超过20度
            const owlFleeAngle = (12 + Math.random() * 8) * Math.PI / 180; // 12-20度
            bird.x += bird.speed * bird.direction * Math.cos(owlFleeAngle);
            bird.y -= bird.speed * Math.sin(owlFleeAngle);
            if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
    }
}

// 修改粪便更新函数，增加边界检查
function updatePoops(deltaTime) {
    if (gamePaused) return;
    
    // 更新所有粪便的位置（下落）
    for (let i = poops.length - 1; i >= 0; i--) {
        const poop = poops[i];
        
        // 下落效果 - 确保是向下的
        poop.y += Math.abs(poop.speed) * (deltaTime / 16);
        
        // 轻微左右摆动
        poop.x += Math.sin(gameTime * 0.001 + i) * 0.05;
        
        // 严格的边界检查
        const isOutOfBounds = poop.y > GAME_HEIGHT + 50;
        const isExpired = gameTime - poop.createdAt > poop.lifetime;
        
        if (isOutOfBounds || isExpired) {
            poops.splice(i, 1);
        }
    }
}

function drawPoops() {
    // 清除画布
    poopCtx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    poops.forEach(poop => {
        // 直接使用游戏逻辑坐标绘制
        poopCtx.fillStyle = poop.color;
        poopCtx.beginPath();
        poopCtx.arc(poop.x, poop.y, poop.size, 0, Math.PI * 2);
        poopCtx.fill();
    });
}

function updateGroundObjects(deltaTime) {
    for (let i = groundObjects.length - 1; i >= 0; i--) {
        const obj = groundObjects[i];
        
        if (gameTime - obj.createdAt > obj.lifetime) {
            groundObjects.splice(i, 1);
        }
    }
}

function drawGroundObjects() {
    groundObjects.forEach(obj => {
        if (obj.type === "mouse") {
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.ellipse(obj.x, obj.y, obj.size, obj.size/1.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.arc(obj.x + obj.size, obj.y, obj.size/2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(obj.x + obj.size + 2, obj.y - 1, 1, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = obj.color;
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(obj.x - obj.size, obj.y);
            ctx.lineTo(obj.x - obj.size - 10, obj.y + 3);
            ctx.stroke();
            
            obj.x += Math.sin(gameTime * 0.001) * 0.1;
        } else if (obj.type === "hedgehog") {
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.moveTo(obj.x + obj.size, obj.y);
            ctx.lineTo(obj.x + obj.size * 1.5, obj.y - obj.size * 0.5);
            ctx.lineTo(obj.x + obj.size * 1.5, obj.y + obj.size * 0.5);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = "#8B4513";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            for (let i = 0; i < 24; i++) {
                const angle = (i / 24) * Math.PI * 2;
                const length = 3 + Math.random() * 1.5;
                const startX = obj.x + Math.cos(angle) * obj.size;
                const startY = obj.y + Math.sin(angle) * obj.size;
                const endX = obj.x + Math.cos(angle) * (obj.size + length);
                const endY = obj.y + Math.sin(angle) * (obj.size + length);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
            
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(obj.x + obj.size * 1.2, obj.y - obj.size * 0.2, 1, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(obj.x + obj.size * 1.5, obj.y, 0.8, 0, Math.PI * 2);
            ctx.fill();
            
            obj.x += Math.sin(gameTime * 0.001) * 0.05;
        }
    });
}

function updateFruits(deltaTime) {
    fruits.forEach(fruit => {
        if (fruit.isEaten && gameTime - fruit.eatStartTime > 10000) {
            fruit.isEaten = false;
            fruit.color = fruit.originalColor;
            fruit.eatenBy = null;
            
            // 如果鸟还在吃这个水果，强制结束吃水果
            const eatingBird = birds.find(b => b.isEating && b.eatingFruit === fruit);
            if (eatingBird) {
                finishEatingFruit(eatingBird);
            }
        }
    });
}

function drawViewfinder() {
    const viewfinderSize = getViewfinderSize();
    const actualViewfinderWidth = viewfinderSize.width;
    const actualViewfinderHeight = viewfinderSize.height;
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';

// ==================== 文本浏览器功能 ====================

let textBrowserVisible = false;

function loadTextOverlayContent() {
    const contentDiv = document.getElementById('textBrowserContent');
    if (!contentDiv) return;
    
    // 保持空白，不显示任何初始文本
    contentDiv.textContent = '';
    
    // 检查是否有上次保存的内容
    const savedContent = localStorage.getItem('textBrowserLastContent');
    if (savedContent) {
        contentDiv.textContent = savedContent;
        updateCharacterCount();
    }
}

function toggleTextBrowser() {
    const overlay = document.getElementById('textBrowserOverlay');
    if (!overlay) return;
    
    if (textBrowserVisible) {
        overlay.style.display = 'none';
        textBrowserVisible = false;
    } else {
        overlay.style.display = 'block';
        textBrowserVisible = true;
        
        // 如果之前有加载过文本，重新显示
        const savedContent = localStorage.getItem('textBrowserLastContent');
        if (savedContent) {
            document.getElementById('textBrowserContent').textContent = savedContent;
            updateCharacterCount();
        }
    }
}

// 加载文本文件
function setupTextBrowser() {
    const loadBtn = document.getElementById('loadTextFile');
    const fileInput = document.getElementById('textFileInput');
    const closeBtn = document.getElementById('closeTextBrowser');
    const textContent = document.getElementById('textBrowserContent');
    
    if (!loadBtn || !fileInput || !closeBtn || !textContent) return;
    
    // 加载文件按钮点击事件
    loadBtn.addEventListener('click', function() {
        fileInput.click();
    });
    
    // 文件选择事件
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        // 检查文件类型
        const validTypes = ['.txt', '.md', '.html', '.js', '.css', '.json'];
        const fileName = file.name.toLowerCase();
        const isValid = validTypes.some(type => fileName.endsWith(type));
        
        if (!isValid) {
            alert('不支持的文件类型。请选择文本文件(.txt, .md, .html, .js, .css, .json)');
            return;
        }
        
        // 读取文件
        const reader = new FileReader();
        reader.onload = function(event) {
            const content = event.target.result;
            
            // 显示文件内容
            textContent.textContent = content;
            
            // 更新文件信息
            document.getElementById('fileInfo').textContent = 
                `已加载: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
            
            // 更新字符数
            updateCharacterCount();
            
            // 保存到本地存储，方便重新打开时显示
            localStorage.setItem('textBrowserLastContent', content);
            localStorage.setItem('textBrowserLastFileName', file.name);
            
            // 显示成功消息
            showTextBrowserMessage(`成功加载文件: ${file.name}`);
        };
        
        reader.onerror = function() {
            showTextBrowserMessage('读取文件失败，请重试');
        };
        
        reader.readAsText(file);
    });
    
    // 关闭按钮事件
    closeBtn.addEventListener('click', function() {
        document.getElementById('textBrowserOverlay').style.display = 'none';
        textBrowserVisible = false;
    });
    
    // ESC键关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && textBrowserVisible) {
            document.getElementById('textBrowserOverlay').style.display = 'none';
            textBrowserVisible = false;
        }
    });
    
    // 检查是否有上次保存的内容
    const savedContent = localStorage.getItem('textBrowserLastContent');
    const savedFileName = localStorage.getItem('textBrowserLastFileName');
    
    if (savedContent && savedFileName) {
        document.getElementById('fileInfo').textContent = `上次加载: ${savedFileName}`;
    }
}

// 更新字符数
function updateCharacterCount() {
    const content = document.getElementById('textBrowserContent').textContent;
    const charCount = content.length;
    const lineCount = content.split('\n').length;
    document.getElementById('characterCount').textContent = 
        `字符数: ${charCount.toLocaleString()} | 行数: ${lineCount}`;
}

// 在文本浏览器中显示消息
function showTextBrowserMessage(message) {
    const textContent = document.getElementById('textBrowserContent');
    const originalContent = textContent.textContent;
    
    // 创建消息元素
    const messageDiv = document.createElement('div');
    messageDiv.style.cssText = `
        position: fixed;
        top: 20px;

// 文本拖放功能
function setupTextDragAndDrop() {
    const overlay = document.getElementById('textBrowserOverlay');
    const textContainer = document.getElementById('textContentContainer');
    
    if (!overlay || !textContainer) return;
    
    // 防止默认拖放行为
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        overlay.addEventListener(eventName, preventDefaults, false);
        textContainer.addEventListener(eventName, preventDefaults, false);
    });
    
    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }
    
    // 高亮拖放区域
    ['dragenter', 'dragover'].forEach(eventName => {
        overlay.addEventListener(eventName, highlight, false);
        textContainer.addEventListener(eventName, highlight, false);
    });
    
    ['dragleave', 'drop'].forEach(eventName => {
        overlay.addEventListener(eventName, unhighlight, false);
        textContainer.addEventListener(eventName, unhighlight, false);
    });
    
    function highlight() {
        textContainer.style.backgroundColor = '#f0f8ff';
        textContainer.style.border = '3px dashed #4CAF50';
    }
    
    function unhighlight() {
        textContainer.style.backgroundColor = 'white';
        textContainer.style.border = 'none';
    }
    
    // 处理文件拖放
    textContainer.addEventListener('drop', handleDrop, false);
    
    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        
        if (files.length > 0) {
            const file = files[0];
            const validTypes = ['.txt', '.md', '.html', '.js', '.css', '.json'];
            const fileName = file.name.toLowerCase();
            const isValid = validTypes.some(type => fileName.endsWith(type));
            
            if (!isValid) {
                showTextBrowserMessage('不支持的文件类型');
                return;
            }
            
            // 创建FileList对象并触发文件输入
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            document.getElementById('textFileInput').files = dataTransfer.files;
            
            // 触发change事件
            document.getElementById('textFileInput').dispatchEvent(new Event('change'));
        }
    }
}

// ========== 综合增强脚本 ==========
// 1. 光学模式定义（望远镜视野为600mm三倍宽）
const OPTICAL_MODES = {
    '600': { name: '600mm', multiplier: 2.0, viewfinderScale: 1.0 },
    '800': { name: '800mm', multiplier: 1.42, viewfinderScale: 1.0 },
    '1200': { name: '1200mm', multiplier: 1.0, viewfinderScale: 1.0 },
    'scope': { name: '望远镜', multiplier: 6.0, viewfinderScale: 1.0 }
};

let currentOpticalMode = '600';
let gyroZoomAnimating = false;
let gyroZoomStartTime = 0;
let gyroZoomDirection = 1;
let gyroZoomCallback = null;
const GYRO_ZOOM_DURATION = 1000;
let zoomCanvasCtx = null;

// 触发放大/缩小过渡动画
function startZoomTransition(direction, callback) {
    if (!gyroModeActive) return;
    gyroZoomAnimating = true;
    gyroZoomStartTime = performance.now();
    gyroZoomDirection = direction;
    gyroZoomCallback = callback;
    const zoomCanvas = document.getElementById('zoomCanvas');
    if (zoomCanvas) zoomCanvas.style.display = 'block';
    const viewfinder = document.getElementById('viewfinder');
    if (viewfinder && gyroModeActive) viewfinder.style.display = 'none';
}

function applyGyroZoomToCanvas() {
    if (!gyroModeActive) {
        const zoomCanvas = document.getElementById('zoomCanvas');
        if (zoomCanvas) zoomCanvas.style.display = 'none';
        return;
    }
    const mainCanvas = document.getElementById('gameCanvas');
    const poopCanvas = document.getElementById('poopCanvas');
    const zoomCanvas = document.getElementById('zoomCanvas');
    if (!mainCanvas || !zoomCanvas || !poopCanvas) return;
    if (!zoomCanvasCtx) zoomCanvasCtx = zoomCanvas.getContext('2d');

    // 同步 zoomCanvas 的尺寸与主画布显示尺寸
    if (zoomCanvas.width !== mainCanvas.width || zoomCanvas.height !== mainCanvas.height) {
        zoomCanvas.width = mainCanvas.width;
        zoomCanvas.height = mainCanvas.height;
        zoomCanvas.style.width = mainCanvas.style.width;
        zoomCanvas.style.height = mainCanvas.style.height;
    }

    const viewfinderSize = getViewfinderSize();
    const srcX = mouseX - viewfinderSize.width / 2;
    const srcY = mouseY - viewfinderSize.height / 2;
    const srcW = viewfinderSize.width;
    const srcH = viewfinderSize.height;

    // 源矩形（可能超出画布）
    const srcRect = { x: srcX, y: srcY, w: srcW, h: srcH };
    const bounds = { x: 0, y: 0, w: GAME_WIDTH, h: GAME_HEIGHT };

    // 计算源矩形与画布的交集
    const intersect = {
        x: Math.max(srcRect.x, bounds.x),
        y: Math.max(srcRect.y, bounds.y),
        w: Math.min(srcRect.x + srcRect.w, bounds.x + bounds.w) - Math.max(srcRect.x, bounds.x),
        h: Math.min(srcRect.y + srcRect.h, bounds.y + bounds.h) - Math.max(srcRect.y, bounds.y)
    };

    const hasVisiblePart = intersect.w > 0 && intersect.h > 0;

    const canvasW = zoomCanvas.width;
    const canvasH = zoomCanvas.height;

    // 动画进度
    let progress = 1;
    if (gyroZoomAnimating) {
        const elapsed = performance.now() - gyroZoomStartTime;
        progress = Math.min(1, elapsed / GYRO_ZOOM_DURATION);
        if (progress >= 1) {
            gyroZoomAnimating = false;
            if (gyroZoomCallback) {
                gyroZoomCallback();
                gyroZoomCallback = null;
            }
        }
        progress = 1 - Math.pow(1 - progress, 3);
        if (gyroZoomDirection === -1) progress = 1 - progress;
    }

    // 清除并填充黑色背景
    zoomCanvasCtx.clearRect(0, 0, canvasW, canvasH);
    zoomCanvasCtx.fillStyle = '#000000';
    zoomCanvasCtx.fillRect(0, 0, canvasW, canvasH);

    if (!hasVisiblePart) {
        zoomCanvas.style.display = 'block';
        if (!gyroZoomAnimating) {
            const viewfinder = document.getElementById('viewfinder');
            if (viewfinder) viewfinder.style.display = 'none';
        }
        return;
    }

    // 动画期间：使用裁剪后全屏绘制
    if (gyroZoomAnimating) {
        const finalSrcX = Math.max(0, Math.min(srcX, GAME_WIDTH));
        const finalSrcY = Math.max(0, Math.min(srcY, GAME_HEIGHT));
        const finalSrcW = Math.min(srcW, GAME_WIDTH - finalSrcX);
        const finalSrcH = Math.min(srcH, GAME_HEIGHT - finalSrcY);
        if (finalSrcW <= 0 || finalSrcH <= 0) return;

        const startW = finalSrcW;
        const startH = finalSrcH;
        const startX = (canvasW - startW) / 2;
        const startY = (canvasH - startH) / 2;
        const endW = canvasW;
        const endH = canvasH;
        const endX = 0;
        const endY = 0;

        const drawW = startW + (endW - startW) * progress;
        const drawH = startH + (endH - startH) * progress;
        const drawX = startX + (endX - startX) * progress;
        const drawY = startY + (endY - startY) * progress;

        // 绘制主画布内容
        zoomCanvasCtx.drawImage(mainCanvas, finalSrcX, finalSrcY, finalSrcW, finalSrcH, drawX, drawY, drawW, drawH);
        // 绘制屎画布内容（叠加）
        zoomCanvasCtx.drawImage(poopCanvas, finalSrcX, finalSrcY, finalSrcW, finalSrcH, drawX, drawY, drawW, drawH);
        zoomCanvas.style.display = 'block';
        return;
    }

    // 非动画状态：精确绘制交集区域（不拉伸）
    const srcOffsetX = intersect.x - srcRect.x;
    const srcOffsetY = intersect.y - srcRect.y;
    const drawX = (srcOffsetX / srcRect.w) * canvasW;
    const drawY = (srcOffsetY / srcRect.h) * canvasH;
    const drawW = (intersect.w / srcRect.w) * canvasW;
    const drawH = (intersect.h / srcRect.h) * canvasH;

    // 绘制主画布
    zoomCanvasCtx.drawImage(mainCanvas, intersect.x, intersect.y, intersect.w, intersect.h, drawX, drawY, drawW, drawH);
    // 绘制屎画布（叠加）
    zoomCanvasCtx.drawImage(poopCanvas, intersect.x, intersect.y, intersect.w, intersect.h, drawX, drawY, drawW, drawH);

    zoomCanvas.style.display = 'block';

    const viewfinder = document.getElementById('viewfinder');
    if (viewfinder) viewfinder.style.display = 'none';
}

// ========== 红腹灰雀增强：找不到水果时随机移动重试 ==========
const originalUpdateBirds = window.updateBirds;
window.updateBirds = function(deltaTime) {
    // 记录红腹灰雀的状态快照
    const bullfinchSnapshots = [];
    for (let i = 0; i < birds.length; i++) {
        const bird = birds[i];
        if (bird.isBullfinch) {
            bullfinchSnapshots.push({
                bird: bird,
                state: bird.state,
                stateTime: bird.stateTime,
                noFruitRetryCount: bird.noFruitRetryCount || 0
            });
        }
    }
    
    // 调用原始更新
    originalUpdateBirds(deltaTime);
    
    // 后处理：处理从 waitingToEat 变成 flyingAway 的情况（无水果）
    for (let i = 0; i < bullfinchSnapshots.length; i++) {
        const snapshot = bullfinchSnapshots[i];
        const bird = snapshot.bird;
        if (!bird.isBullfinch) continue;
        
        // 如果之前是 waitingToEat 且等待时间超过 3 秒，现在变成了 flyingAway，说明因无水果而飞走
        if (snapshot.state === 'waitingToEat' && snapshot.stateTime >= 3000 && bird.state === 'flyingAway') {
            const retryCount = (bird.noFruitRetryCount || 0);
            if (retryCount < 3) {
                // 改为移动到新位置
                bird.noFruitRetryCount = retryCount + 1;
                bird.state = 'movingToNewSpot';
                bird.stateTime = 0;
                // 选择树冠上的随机新位置
                const tree = bird.targetTree;
                if (tree) {
                    const crownX = tree.x + tree.width * 0.2;
                    const crownY = tree.y + tree.height * 0.1;
                    const crownWidth = tree.width * 0.6;
                    const crownHeight = tree.height * 0.25;
                    bird.newSpotX = crownX + Math.random() * crownWidth;
                    bird.newSpotY = crownY + Math.random() * crownHeight;
                } else {
                    bird.newSpotX = bird.x + (Math.random() - 0.5) * 100;
                    bird.newSpotY = bird.y + (Math.random() - 0.5) * 50;
                }
            } else {
                // 超过重试次数，允许飞走，重置计数
                bird.noFruitRetryCount = 0;
            }
        }
        
        // 处理移动状态
        if (bird.state === 'movingToNewSpot') {
            const dx = bird.newSpotX - bird.x;
            const dy = bird.newSpotY - bird.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 2) {
                bird.x = bird.newSpotX;
                bird.y = bird.newSpotY;
                bird.state = 'waitingToEat';
                bird.stateTime = 0;
            } else {
                const step = Math.min(2, dist);
                bird.x += (dx / dist) * step;
                bird.y += (dy / dist) * step;
            }
        }
        
        // 清理标志：如果不是 waitingToEat 且不是 movingToNewSpot，重置重试计数
        if (bird.state !== 'waitingToEat' && bird.state !== 'movingToNewSpot') {
            bird.noFruitRetryCount = 0;
        }
    }
};

// ========== 陀螺仪启动/停止增强 ==========
const originalStartGyroMode = window.startGyroMode;
const originalStopGyroMode = window.stopGyroMode;
const originalDrawGame = window.drawGame;

window.startGyroMode = function() {
    if (originalStartGyroMode) originalStartGyroMode();
    if (currentOpticalMode !== 'scope') {
        currentOpticalMode = 'scope';
        updateOpticalModeButtons();
        updateCameraButtonVisibility();
    }
    const container = document.getElementById('lensToggleContainer');
    if (container) {
        if (container.classList.contains('hidden-by-gyro')) {
            container.classList.remove('hidden-by-gyro');
        }
        container.style.display = '';
    }
    updateOpticalModeButtons();
    updateCameraButtonVisibility();
    startZoomTransition(1, null);
};

window.stopGyroMode = function() {
    if (originalStopGyroMode) originalStopGyroMode();
    gyroZoomAnimating = false;
    const zoomCanvas = document.getElementById('zoomCanvas');
    if (zoomCanvas) zoomCanvas.style.display = 'none';
    const viewfinder = document.getElementById('viewfinder');
    if (viewfinder) viewfinder.style.display = 'block';
    const container = document.getElementById('lensToggleContainer');
    if (container) {
        container.style.display = '';
        container.style.position = '';
        container.style.bottom = '';
        container.style.left = '';
        container.style.zIndex = '';
        container.style.backgroundColor = '';
        container.style.border = '';
        container.style.borderRadius = '';
        container.style.padding = '';
        if (!container.classList.contains('hidden-by-gyro')) {
            container.classList.add('hidden-by-gyro');
        }
    }
    updateCameraButtonVisibility();
};

window.drawGame = function() {
    if (originalDrawGame) originalDrawGame();
    applyGyroZoomToCanvas();
};

// 添加望远镜按钮
function addScopeButton() {
    const container = document.getElementById('lensToggleContainer');
    if (!container) return;
    if (document.getElementById('scopeToggle')) return;
    const scopeBtn = document.createElement('button');
    scopeBtn.id = 'scopeToggle';
    scopeBtn.className = 'lensToggleButton';
    scopeBtn.textContent = '望远镜';
    scopeBtn.addEventListener('click', setScope);
    container.appendChild(scopeBtn);
    updateOpticalModeButtons();
    updateCameraButtonVisibility();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', addScopeButton);
} else {
    addScopeButton();
}
</script></body></html>
