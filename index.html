    transition: opacity 0.3s, background-color 0.3s;
}

    opacity: 0.7;

}

#lensToggleContainer.hidden-by-gyro:hover::after,
#modeToggleContainer.hidden-by-gyro:hover::after {

    left: 50%;

#modeToggleContainer.hidden-by-gyro::after {
    bottom: -20px;

    height: 40%;

}

    bottom: 0;
    left: 50%;

    width: 0;
    height: 0;

    border-right: 15% solid transparent;
    border-bottom: 40% solid #B22222;
}

#campsite > div > div:nth-child(2) {
    position: absolute;
    bottom: 0;
    left: 23.33%;
    width: 20%;
    height: 30%;
    z-index: 1;

    transform: rotate(-15deg);

    bottom: 8.89%;
    left: 20%;
    width: 63.33%;
    height: 17.78%;
    background-color: #A0522D;
    transform: rotate(10deg);
}

#campfire-flame {
    pointer-events: auto; /* 只有篝火可以点击 */
    cursor: pointer;
    position: absolute;
    bottom: 26.67%;
    left: 50%;
    transform: translateX(-50%);
    width: 50%;
    height: 66.67%;
    background: radial-gradient(circle, #FF4500 0%, #FF8C00 30%, #FFD700 70%);
    border-radius: 50% 50% 20% 20%;
    filter: blur(2px);
    animation: flame-flicker 0.5s infinite alternate;
    z-index: 3;
}

#campsite > div > div:last-child {
    position: absolute;
    bottom: 16.67%;
    left: 50%;
    transform: translateX(-50%);
    color: #FFD700;
    font-size: 12px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    text-align: center;
    background-color: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0.8;
    white-space: nowrap;
    z-index: 4;
}

@keyframes flame-flicker {
    0% {
        transform: translateX(-50%) scale(1.0);
        opacity: 0.9;
    }
    100% {
        transform: translateX(-50%) scale(1.1);
        opacity: 1.0;
    }
}

    opacity: 0 !important;

function initSaveData() {
    if (typeof Storage !== 'undefined') {
        const saved = localStorage.getItem('birding_simulator_save');
        if (saved) {
            try {
                gameSave = JSON.parse(saved);
                
                // 确保存档数据格式正确
                if (!gameSave.appearedBirdSpecies) gameSave.appearedBirdSpecies = {};
                if (!gameSave.capturedBirdSpecies) gameSave.capturedBirdSpecies = {};
                if (!gameSave.totalBirdingTime) gameSave.totalBirdingTime = 0;
                if (!gameSave.beastPhotos) gameSave.beastPhotos = {};
                if (!gameSave.astroPhotos) gameSave.astroPhotos = {};
                if (!gameSave.rareBirdPhotos) gameSave.rareBirdPhotos = {};
                if (!gameSave.achievements) gameSave.achievements = {};
                if (!gameSave.lastAchievementTime) gameSave.lastAchievementTime = 0;
                if (!gameSave.gameStartTime) gameSave.gameStartTime = Date.now();
                if (!gameSave.playerId) gameSave.playerId = "";
                
                // 清理存档中的重复数据
                cleanupSaveData();
                
                console.log("存档加载成功，已出现鸟种:", Object.keys(gameSave.appearedBirdSpecies).length, 
                            "已拍摄鸟种:", Object.keys(gameSave.capturedBirdSpecies).length);
            } catch (e) {
                console.log("存档损坏，创建新存档:", e);
                createNewSave();
            }
        } else {
            createNewSave();
        }
    } else {
        console.log("浏览器不支持本地存储，使用临时存档");
        createNewSave();
    }
}

// 清理存档中的重复数据
function cleanupSaveData() {
    console.log("清理存档数据...");
    
    // 确保鸟种数据是对象格式（不是数组）
    if (Array.isArray(gameSave.appearedBirdSpecies)) {
        const temp = {};
        gameSave.appearedBirdSpecies.forEach(birdName => {
            temp[birdName] = 1;
        });
        gameSave.appearedBirdSpecies = temp;
    }
    
    if (Array.isArray(gameSave.capturedBirdSpecies)) {
        const temp = {};
        gameSave.capturedBirdSpecies.forEach(birdName => {
            temp[birdName] = 1;
        });
        gameSave.capturedBirdSpecies = temp;
    }
    
    // 确保每个鸟种的值是数字（出现次数/拍摄次数）
    Object.keys(gameSave.appearedBirdSpecies).forEach(birdName => {
        if (typeof gameSave.appearedBirdSpecies[birdName] !== 'number') {
            gameSave.appearedBirdSpecies[birdName] = 1;
        }
    });
    
    Object.keys(gameSave.capturedBirdSpecies).forEach(birdName => {
        if (typeof gameSave.capturedBirdSpecies[birdName] !== 'number') {
            gameSave.capturedBirdSpecies[birdName] = 1;
        }
    });
    
    // 移除成就中的空值
    Object.keys(gameSave.achievements).forEach(key => {
        if (!gameSave.achievements[key] || !gameSave.achievements[key].achieved) {
            delete gameSave.achievements[key];
        }
    });
    
    // 确保其他数据是对象格式
    if (!gameSave.beastPhotos || typeof gameSave.beastPhotos !== 'object') {
        gameSave.beastPhotos = {};
    }
    
    if (!gameSave.astroPhotos || typeof gameSave.astroPhotos !== 'object') {
        gameSave.astroPhotos = {};
    }
    
    if (!gameSave.rareBirdPhotos || typeof gameSave.rareBirdPhotos !== 'object') {
        gameSave.rareBirdPhotos = {};
    }
    
    console.log("存档清理完成");
    saveGameData();
}

// 创建新存档
function createNewSave() {
    gameSave = {
        playerId: "",
        appearedBirdSpecies: {},
        capturedBirdSpecies: {},
        totalBirdingTime: 0,
        beastPhotos: {},
        astroPhotos: {},
        rareBirdPhotos: {},
        achievements: {},
        lastAchievementTime: 0,
        gameStartTime: Date.now()
    };
    saveGameData();
}

// 保存游戏数据
function saveGameData() {
    if (typeof Storage !== 'undefined') {
        localStorage.setItem('birding_simulator_save', JSON.stringify(gameSave));
    }
}

        } else {

        }
    }

// 更新出现鸟种（不重复计数）
function updateAppearedBird(birdName) {
    // 确保存档中有该鸟种记录
    if (!gameSave.appearedBirdSpecies[birdName]) {
        gameSave.appearedBirdSpecies[birdName] = 1;
    } else {
        // 如果已经存在，只增加出现次数，不重复计数种类
        gameSave.appearedBirdSpecies[birdName]++;
    }
    
    // 更新成就
    checkCollectAchievements();
    saveGameData();
}

// 更新拍摄鸟种（不重复计数）
function updateCapturedBird(birdName) {
    // 确保存档中有该鸟种记录
    if (!gameSave.capturedBirdSpecies[birdName]) {
        gameSave.capturedBirdSpecies[birdName] = 1;
    } else {
        // 如果已经存在，只增加拍摄次数，不重复计数种类
        gameSave.capturedBirdSpecies[birdName]++;
    }
    
    // 检查拍摄类成就
    checkPhotoAchievements();
    
    // 检查是否是稀有鸟类
    const birdKey = Object.keys(BIRD_TYPES).find(key => BIRD_TYPES[key].name === birdName);
    if (birdKey && RARE_BIRD_TYPES.includes(birdKey)) {
        if (!gameSave.rareBirdPhotos[birdName]) {
            gameSave.rareBirdPhotos[birdName] = true;
            checkRareBirdAchievements();
        }
    }
    
    saveGameData();
}

// 更新累计观鸟时间
function updateTotalBirdingTime(timeMs) {
    gameSave.totalBirdingTime += timeMs;
    checkTimeAchievements();
    saveGameData();
}

// 更新兽类照片（蝙蝠）
function updateBeastPhoto(beastName) {
    if (!gameSave.beastPhotos[beastName]) {
        gameSave.beastPhotos[beastName] = true;
        checkBeastAchievements();
        saveGameData();
    }
}

// 更新天文照片
function updateAstroPhoto(astroName) {
    if (!gameSave.astroPhotos[astroName]) {
        gameSave.astroPhotos[astroName] = true;
        checkAstroAchievements();
        saveGameData();
    }
}

// 检查收集类成就
function checkCollectAchievements() {
    const observedCount = Object.keys(gameSave.appearedBirdSpecies).length;
    
    const collectAchievements = Object.keys(ACHIEVEMENTS).filter(key => 
        ACHIEVEMENTS[key].type === 'collect'
    );
    
    collectAchievements.forEach(key => {
        if (!gameSave.achievements[key] && observedCount >= ACHIEVEMENTS[key].threshold) {
            unlockAchievement(key);
        }
    });
}

// 检查拍摄类成就
function checkPhotoAchievements() {
    const capturedCount = Object.keys(gameSave.capturedBirdSpecies).length;
    
    const photoAchievements = Object.keys(ACHIEVEMENTS).filter(key => 
        ACHIEVEMENTS[key].type === 'photo'
    );
    
    photoAchievements.forEach(key => {
        if (!gameSave.achievements[key] && capturedCount >= ACHIEVEMENTS[key].threshold) {
            unlockAchievement(key);
        }
    });
}

// 检查时间类成就
function checkTimeAchievements() {
    const timeAchievements = Object.keys(ACHIEVEMENTS).filter(key => 
        ACHIEVEMENTS[key].type === 'time'
    );
    
    timeAchievements.forEach(key => {
        if (!gameSave.achievements[key] && gameSave.totalBirdingTime >= ACHIEVEMENTS[key].threshold) {
            unlockAchievement(key);
        }
    });
}

// 检查单次观鸟成就
function checkSingleBirdingAchievement(duration) {
    if (!gameSave.achievements.SINGLE_60MIN && duration >= ACHIEVEMENTS.SINGLE_60MIN.threshold) {
        unlockAchievement('SINGLE_60MIN');
    }
}

// 检查兽类成就
function checkBeastAchievements() {
    if (Object.keys(gameSave.beastPhotos).length > 0 && !gameSave.achievements.BEAST_BAT) {
        unlockAchievement('BEAST_BAT');
    }
}

// 检查天文成就
function checkAstroAchievements() {
    const astroTypes = Object.keys(gameSave.astroPhotos);
    
    if (astroTypes.includes('流星') && !gameSave.achievements.ASTRO_METEOR) {
        unlockAchievement('ASTRO_METEOR');
    }
    if (astroTypes.includes('UFO') && !gameSave.achievements.ASTRO_UFO) {
        unlockAchievement('ASTRO_UFO');
    }
    if (astroTypes.includes('彗星') && !gameSave.achievements.ASTRO_COMET) {
        unlockAchievement('ASTRO_COMET');
    }
}

// 检查稀有鸟类成就
function checkRareBirdAchievements() {
    const rareCount = Object.keys(gameSave.rareBirdPhotos).length;
    
    const rareAchievements = Object.keys(ACHIEVEMENTS).filter(key => 
        ACHIEVEMENTS[key].type === 'rare'
    );
    
    rareAchievements.forEach(key => {
        if (!gameSave.achievements[key] && rareCount >= ACHIEVEMENTS[key].threshold) {
            unlockAchievement(key);
        }
    });
}

// 解锁成就时，检查是否已经有更高级的成就
function unlockAchievement(achievementId) {
    const achievement = ACHIEVEMENTS[achievementId];
    if (!achievement) return;
    
    // 检查是否已经解锁了同一系列更高级的成就
    const sameSeries = Object.keys(gameSave.achievements)
        .filter(key => ACHIEVEMENTS[key] && ACHIEVEMENTS[key].series === achievement.series)
        .map(key => ({id: key, level: ACHIEVEMENTS[key].level}))
        .sort((a, b) => b.level - a.level);
    
    // 如果已有更高级成就，仍然解锁当前成就，但不删除低级成就
    // 这样存档中会保留所有解锁的成就
    
    // 解锁新成就
    gameSave.achievements[achievementId] = {
        achieved: true,
        timestamp: Date.now(),
        title: achievement.name
    };
    
    gameSave.lastAchievementTime = Date.now();
    
    // 显示成就解锁提示
    showAchievementAlert(achievement.name);
    
    saveGameData();
    updateAlbumStats();
}

function initFullscreenTouch() {
    const gameContainer = document.getElementById('gameContainer');
    
    // 触摸开始事件
    gameContainer.addEventListener('touchstart', function(e) {
        if (fullscreenLongPressTimer) {
            clearTimeout(fullscreenLongPressTimer);
        }
        
        fullscreenLongPressTimer = setTimeout(function() {
            toggleFullscreen();
        }, LONG_PRESS_DURATION);
    });
    
    // 触摸结束或移动时取消计时器
    gameContainer.addEventListener('touchend', function(e) {
        if (fullscreenLongPressTimer) {
            clearTimeout(fullscreenLongPressTimer);
            fullscreenLongPressTimer = null;
        }
    });
    
    gameContainer.addEventListener('touchmove', function(e) {
        if (fullscreenLongPressTimer) {
            clearTimeout(fullscreenLongPressTimer);
            fullscreenLongPressTimer = null;
        }
    });
    
    // 监听全屏变化事件
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);
}

function toggleFullscreen() {
    const gameContainer = document.getElementById('gameContainer');
    
    if (!isFullscreen) {
        // 进入全屏
        if (gameContainer.requestFullscreen) {
            gameContainer.requestFullscreen();
        } else if (gameContainer.webkitRequestFullscreen) {
            gameContainer.webkitRequestFullscreen();
        } else if (gameContainer.mozRequestFullScreen) {
            gameContainer.mozRequestFullScreen();
        } else if (gameContainer.msRequestFullscreen) {
            gameContainer.msRequestFullscreen();
        }
    } else {
        // 退出全屏
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    }
    
    // 显示提示
    showSpecialAlert(isFullscreen ? "已退出全屏" : "已进入全屏");
}

function handleFullscreenChange() {
    const isNowFullscreen = !!(document.fullscreenElement || 
                               document.webkitFullscreenElement || 
                               document.mozFullScreenElement || 
                               document.msFullscreenElement);
    
    isFullscreen = isNowFullscreen;
    
    // 全屏时调整一些UI元素
    if (isFullscreen) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = 'auto';
    }
    
    // 重新调整画布大小
    setTimeout(resizeCanvas, 100);
    
    // 如果营地可见，更新其位置
    if (gameMode === 'normal' && !isDaytime) {
        setTimeout(updateCampsiteVisibility, 150);
    }
}

// 打开帮助模态框
function openHelpModal() {
    if (gamePaused) return;
    pauseGame();
    
    const helpModal = document.getElementById('helpModal');
    const helpContent = document.getElementById('helpContent');
    
    // 显示加载中
    helpContent.innerHTML = '<div style="text-align: center; color: #FFD700; font-size: 18px;">加载帮助内容中...</div>';
    
    // 显示模态框
    helpModal.style.display = 'block';
    
    // 尝试加载readme.txt
    fetch('readme.txt')
        .then(response => {
            if (!response.ok) {
                throw new Error('无法加载帮助文件');
            }
            return response.text();
        })
        .then(text => {
            // 成功加载，显示内容
            displayHelpContent(text);
        })
        .catch(error => {
            console.error('加载帮助文件失败:', error);
            // 如果读取失败，显示默认帮助内容
            displayDefaultHelp();
        });
}

// 显示帮助内容
function displayHelpContent(text) {
    const helpContent = document.getElementById('helpContent');
    
    // 解析文本内容，可以添加基本的Markdown样式支持
    let htmlContent = '<div class="help-title">观鸟模拟器 使用帮助</div>';
    
    // 简单的文本解析，将文本转换为带格式的HTML
    const lines = text.split('\n');
    let inSection = false;
    let currentSection = '';
    
    lines.forEach(line => {
        const trimmedLine = line.trim();
        
        if (trimmedLine === '') {
            return; // 跳过空行
        }
        
        // 检测标题
        if (trimmedLine.startsWith('# ')) {
            htmlContent += `<h2 style="color: #FFD700; margin: 20px 0 10px 0;">${trimmedLine.substring(2)}</h2>`;
        } else if (trimmedLine.startsWith('## ')) {
            htmlContent += `<h3 style="color: #87CEEB; margin: 15px 0 8px 0; border-left: 3px solid #87CEEB; padding-left: 10px;">${trimmedLine.substring(3)}</h3>`;
        } else if (trimmedLine.startsWith('### ')) {
            htmlContent += `<h4 style="color: #90EE90; margin: 10px 0 5px 0;">${trimmedLine.substring(4)}</h4>`;
        } else if (trimmedLine.startsWith('- ') || trimmedLine.startsWith('* ')) {
            // 列表项
            if (!inSection) {
                htmlContent += '<ul style="margin: 8px 0 8px 20px;">';
                inSection = true;
            }
            htmlContent += `<li style="margin-bottom: 5px;">${trimmedLine.substring(2)}</li>`;
        } else if (trimmedLine.startsWith('  ')) {
            // 代码或键盘快捷键
            const keyMatch = trimmedLine.match(/`([^`]+)`/g);
            if (keyMatch) {
                let formattedLine = trimmedLine;
                keyMatch.forEach(match => {
                    const key = match.replace(/`/g, '');
                    formattedLine = formattedLine.replace(match, `<span class="help-key">${key}</span>`);
                });
                htmlContent += `<p style="font-family: monospace; background-color: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 4px; margin: 5px 0;">${formattedLine}</p>`;
            } else {
                htmlContent += `<p>${trimmedLine}</p>`;
            }
        } else {
            if (inSection) {
                htmlContent += '</ul>';
                inSection = false;
            }
            htmlContent += `<p>${trimmedLine}</p>`;
        }
    });
    
    if (inSection) {
        htmlContent += '</ul>';
    }
    
    // 添加游戏控制说明部分

            <h3>游戏控制快捷键</h3>

function updateCampfirePosition() {
    const campsite = document.getElementById('campsite');
    if (!campsite || !canvas) {
        console.log("营地或画布未初始化");
        return;
    }
    
    const container = document.getElementById('gameContainer');
    const containerRect = container.getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();
    
    // 计算画布在容器内的相对位置
    const canvasInContainerLeft = canvasRect.left - containerRect.left;
    const canvasInContainerTop = canvasRect.top - containerRect.top;
    const canvasInContainerBottom = canvasInContainerTop + canvasRect.height;
    
    // 营地尺寸 - 注意：营地图片有透明边距
    const campsiteRect = campsite.getBoundingClientRect();
    const campsiteWidth = campsiteRect.width;
    const campsiteHeight = campsiteRect.height;
    
    // 计算营地底部应该对齐的位置
    // 注意：营地SVG/HTML元素可能有内部边距或透明区域
    // 在竖屏模式下，我们需要让营地"底部"紧贴画布底部
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    
    let campsiteTop;
    
    if (isPortrait) {
        // 竖屏模式：营地紧贴地面
        // 由于营地元素可能有内部布局，我们需要计算实际可视底部的位置
        const visualBottomOffset = 0; // 营地底部就是可视底部，不需要额外偏移
        
        campsiteTop = canvasInContainerBottom - campsiteHeight - visualBottomOffset;
        
        console.log("竖屏营地位置计算:", {
            canvasBottom: canvasInContainerBottom,
            campsiteHeight: campsiteHeight,
            visualBottomOffset: visualBottomOffset,
            calculatedTop: campsiteTop
        });
    } else {
        // 横屏模式：营地距离画布底部10像素
        campsiteTop = canvasInContainerBottom - campsiteHeight - 10;
    }
    
    // 营地水平居中
    const campsiteLeft = canvasInContainerLeft + (canvasRect.width / 2) - (campsiteWidth / 2);
    
    // 应用位置
    campsite.style.position = 'absolute';
    campsite.style.top = campsiteTop + 'px';
    campsite.style.left = campsiteLeft + 'px';
    campsite.style.bottom = 'auto';
    campsite.style.transform = 'none';
    
    // 调试信息
    console.log("营地位置更新:", {
        orientation: isPortrait ? "portrait" : "landscape",
        container: `${containerRect.width}x${containerRect.height}`,
        canvas: {
            left: canvasRect.left,
            top: canvasRect.top,
            width: canvasRect.width,
            height: canvasRect.height,
            inContainer: {
                left: canvasInContainerLeft,
                top: canvasInContainerTop,
                bottom: canvasInContainerBottom
            }
        },
        campsite: {
            width: campsiteWidth,
            height: campsiteHeight,
            left: campsiteLeft,
            top: campsiteTop
        }
    });
        // 确保营地不会捕获鼠标事件
    campsite.style.pointerEvents = 'none';
}
    // 额外调试：检查营地元素的实际样式
    const computedStyle = window.getComputedStyle(campsite);
    console.log("营地计算样式:", {
        display: computedStyle.display,
        position: computedStyle.position,
        top: computedStyle.top,
        left: computedStyle.left,
        bottom: computedStyle.bottom,
        transform: computedStyle.transform,
        width: computedStyle.width,
        height: computedStyle.height
    });

function updateCampsiteVisibility() {
    const campsite = document.getElementById('campsite');
    if (!campsite) return;
    
    if (gameMode === 'normal' && !isDaytime) {
        campsite.style.display = 'block';
        const flame = document.getElementById('campfire-flame');
        const hint = document.querySelector('#campsite > div > div:last-child');
        
        if (flame && hint) {
            if (isCampfireExtinguished) {
                flame.classList.add('extinguished');
                hint.textContent = "篝火已熄灭";
                hint.style.color = "#87CEEB";
                flame.style.pointerEvents = 'none'; // 篝火熄灭后不可点击
            } else {
                flame.classList.remove('extinguished');
                hint.textContent = "点击熄灭篝火";
                hint.style.color = "#FFD700";
                flame.style.pointerEvents = 'auto'; // 篝火未熄灭可点击
                flame.style.cursor = 'pointer';
            }
        }
        
        setTimeout(() => {
            updateCampfirePosition();
        }, 50);
    } else {
        campsite.style.display = 'none';
    }
}
// 新增：处理营地区域的点击事件
function handleCampsiteClick(e) {
    // 检查是否点击的是篝火元素
    const flame = document.getElementById('campfire-flame');
    if (flame && e.target === flame) {
        // 点击的是篝火，触发熄灭功能
        extinguishCampfire();
        e.stopPropagation(); // 阻止事件冒泡，避免触发拍照
        return;
    }
    // 检查是否点击的是篝火元素的子元素
    let target = e.target;
    while (target && target !== document) {
        if (target.id === 'campfire-flame') {
            extinguishCampfire();
            e.stopPropagation();
            return;
        }
        target = target.parentElement;
    }
    // 点击的是营地其他区域，不执行任何操作，让事件继续冒泡
    // 这样相机点击功能可以正常工作
}

function extinguishCampfire() {
    if (gameMode !== 'normal' || isDaytime || isCampfireExtinguished) return;
    
    isCampfireExtinguished = true;
    isNightAccelerated = true;
    
    const flame = document.getElementById('campfire-flame');
    if (flame) {
        flame.classList.add('extinguished');
        flame.style.pointerEvents = 'none'; // 熄灭后不可点击
    }
    
    const hint = document.querySelector('#campsite > div > div:last-child');
    if (hint) {
        hint.textContent = "篝火已熄灭";
        hint.style.color = "#87CEEB";
    }
    
    showSpecialAlert("篝火熄灭，夜晚加速流逝...");
    checkNightAcceleration();
}

// 修改checkNightAcceleration函数
function checkNightAcceleration() {
    if (!isNightAccelerated) return;
    
    // 如果已经变为白天，停止加速
    if (isDaytime) {
        isNightAccelerated = false;
        // 注意：这里不要重置isCampfireExtinguished，让它保持直到第二天夜晚
        return;
    }
    
    // 继续检查
    setTimeout(checkNightAcceleration, 1000);
}

function resetCampsite() {
  isNightAccelerated = false;
  isCampfireExtinguished = false;
  
  const flame = document.getElementById('campfire-flame');
  if (flame) {
    flame.classList.remove('extinguished');
  }
  
  const hint = document.querySelector('#campsite > div > div:last-child');
  if (hint) {
    hint.textContent = "点击熄灭篝火";
    hint.style.color = "#FFD700";
  }
  
  showSpecialAlert("黎明到来，恢复正常时间流速");
  updateCampsiteVisibility();
}
    
function updateDayNight(deltaTime) {
    if (gamePaused) return;
    
    gameTime += deltaTime;
    
    // 应用时间加速
    let effectiveDeltaTime = deltaTime;
    
    if (isNightAccelerated && gameMode === 'normal' && !isDaytime) {
        effectiveDeltaTime = deltaTime * nightAccelerationMultiplier;
    }
    
    // 普通模式：日夜循环
    if (gameMode === 'normal') {
        dayNightTimer += effectiveDeltaTime;
        
        // 检查日夜切换
        if (dayNightTimer >= DAY_NIGHT_CYCLE_DURATION) {
            isDaytime = !isDaytime;
            dayNightTimer = 0;
            
            // 夜晚切换为白天时，重置篝火状态
            if (isDaytime) {
                // 重置篝火状态（重新点燃）
                isCampfireExtinguished = false;
                isNightAccelerated = false;
                
                // 显示提示
                showSpecialAlert("黎明到来，篝火重新点燃");
            } else {
                // 白天切换为夜晚时，确保篝火是点燃状态
                isCampfireExtinguished = false;
                moonPhaseTimer = Math.random() * MOON_PHASE_CYCLE;
                
                // 显示提示
                showSpecialAlert("夜幕降临");
            }
            
            updateModeToggleButtons();
            updateCampsiteVisibility();
            
            // 清理不符合当前时间的生物
            if (!isDaytime) {
                for (let i = birds.length - 1; i >= 0; i--) {
                    if (!birds[i].isOwl && !birds[i].isBat && birds[i].name !== "小鸮" && birds[i].name !== "夜鹭") {
                        birds.splice(i, 1);
                    }
                }
                nightObjects = [];
            } else {
                for (let i = birds.length - 1; i >= 0; i--) {
                    if (birds[i].isOwl || birds[i].isBat) {
                        birds.splice(i, 1);
                    }
                }
                
                if (littleOwl) {
                    birds.splice(birds.indexOf(littleOwl), 1);
                    littleOwl = null;
                }
                nightObjects = [];
            }
        }
            
            // 更新太阳/月亮位置
            sunMoonPosition = dayNightTimer / DAY_NIGHT_CYCLE_DURATION;
        } 
        // 永久日间模式
        else if (gameMode === 'day') {
            dayModeTimeState += deltaTime;
            dayNightTimer = dayModeTimeState;
            
            // 确保营地状态被重置
            resetCampsite();
            
            const goldenFilter = document.getElementById('goldenFilter');
            goldenFilter.style.backgroundColor = 'rgba(255, 215, 0, 0.1)';
            
            // 更新营地可见性
            updateCampsiteVisibility();
        } 
        // 永久夜间模式
        else if (gameMode === 'night') {
            nightModeTimeState += deltaTime;
            nightModeMoonPhaseTimer += deltaTime;
            dayNightTimer = nightModeTimeState;
            moonPhaseTimer = nightModeMoonPhaseTimer;
            
            if (moonPhaseTimer >= MOON_PHASE_CYCLE) {
                moonPhaseTimer = 0;
                nightModeMoonPhaseTimer = 0;
            }
            
            // 确保营地状态被重置
            resetCampsite();
            
            const goldenFilter = document.getElementById('goldenFilter');
            goldenFilter.style.backgroundColor = 'rgba(255, 215, 0, 0)';
            
    updateTimeIndicator();
    updateCampsiteVisibility(); // 确保营地可见性更新
}
        
        // 稀有鸟类生成（使用实际时间，不受加速影响）
        let rareBirdDelta = deltaTime;
        lastRareBirdTime += rareBirdDelta;
        
        if (gameTime - lastRareBirdTime >= RARE_BIRD_INTERVAL && !birdingModeActive) {
            generateRareBird();
            lastRareBirdTime = gameTime;
        }
        
        // 小鸮生成逻辑（使用实际时间）
        if (!littleOwl) {
            let cooldown;
            if (gameMode === 'day') {
                cooldown = LITTLE_OWL_DAY_COOLDOWN;
            } else if (gameMode === 'night') {
                cooldown = LITTLE_OWL_NIGHT_COOLDOWN;
            } else {
                cooldown = isDaytime ? LITTLE_OWL_DAY_COOLDOWN : LITTLE_OWL_NIGHT_COOLDOWN;
            }
            
            // 使用实际时间计算
            let actualTimePassed = deltaTime;
            lastLittleOwlTime += actualTimePassed;
            
            if (gameTime - lastLittleOwlTime > cooldown) {
                generateLittleOwl(true);
                lastLittleOwlTime = gameTime;
            }
        }
        
        // 夜间猫头鹰生成（使用实际时间）
        if ((gameMode === 'night' || (gameMode === 'normal' && !isDaytime))) {
            let actualTimePassed = deltaTime;
            lastOwlSpawnTime += actualTimePassed;
            
            if (gameTime - lastOwlSpawnTime > NIGHT_OWL_SPAWN_INTERVAL) {
                spawnNightOwls();
                lastOwlSpawnTime = gameTime;
            }
        }
    }

function initGyro() {
    const gyroModeButton = document.getElementById('gyroModeToggle');
    const gyroStatusIndicator = document.getElementById('gyroStatusIndicator');
    const sensitivitySlider = document.getElementById('gyroSensitivitySlider');
    const sensitivityValue = document.getElementById('gyroSensitivityValue');
    const sensitivityContainer = document.getElementById('gyroSensitivityContainer');
    const calibrateButton = document.getElementById('gyroCalibrateButton');
    const cameraButton = document.getElementById('cameraButton'); // 获取快门按钮
    
    // 设置默认状态：只显示陀螺仪按钮，其他元素隐藏
    gyroStatusIndicator.style.display = 'none';
    sensitivityContainer.style.display = 'none';
    calibrateButton.style.display = 'none';
    cameraButton.style.display = 'none'; // 隐藏快门按钮
    
    // 设置陀螺仪按钮为半透明
    gyroModeButton.style.opacity = '0.5';
    
    gyroModeButton.addEventListener('click', toggleGyroMode);
    calibrateButton.addEventListener('click', handleGyroCalibrate);
    sensitivitySlider.addEventListener('input', function() {
        gyroSensitivity = parseInt(this.value);
        sensitivityValue.textContent = gyroSensitivity;
    });

function calibrateGyro() {
    if (!gyroModeActive) return;
    requestCalibration = true;
    isGyroCalibrated = true;
    const gyroStatusIndicator = document.getElementById('gyroStatusIndicator');
    gyroStatusIndicator.textContent = "已校准";
    showSpecialAlert("陀螺仪校准完成！");
}

function handleDeviceOrientation(event) {
    if (!gyroModeActive || gamePaused) return;
    
    const now = Date.now();
    if (now - lastGyroUpdate < 16) return;
    lastGyroUpdate = now;
    
    const beta = event.beta;
    const gamma = event.gamma;
    if (beta === null || gamma === null) return;
    
    if (!isGyroCalibrated) {
        calibrateGyro();
        return;
    }
    
    if (requestCalibration) {
        gyroCenterBeta = beta;
        gyroCenterGamma = gamma;
        requestCalibration = false;
        return;
    }
    
    const sensitivityFactor = gyroSensitivity / 10;
    let orientation = window.orientation || 0;
    if (screen.orientation && screen.orientation.angle) {
        orientation = screen.orientation.angle;
    }
    
    let xAngle = 0;
    let yAngle = 0;
    
    if (orientation === 90) {
        xAngle = beta - gyroCenterBeta;
        yAngle = -(gamma - gyroCenterGamma);
    } else if (orientation === -90 || orientation === 270) {
        xAngle = -(beta - gyroCenterBeta);
        yAngle = gamma - gyroCenterGamma;
    } else if (orientation === 180) {
        xAngle = -(gamma - gyroCenterGamma);
        yAngle = -(beta - gyroCenterBeta);
    } else {
        xAngle = gamma - gyroCenterGamma;
        yAngle = beta - gyroCenterBeta;
    }
    
    const maxTiltAngle = 30;
    const xMultiplier = (GAME_WIDTH / 2) / maxTiltAngle;
    const yMultiplier = (GAME_HEIGHT / 2) / maxTiltAngle;
    
    const limitedXAngle = Math.max(-60, Math.min(60, xAngle));
    const limitedYAngle = Math.max(-60, Math.min(60, yAngle));
    
    const targetX = GAME_WIDTH / 2 + (limitedXAngle * xMultiplier * sensitivityFactor);
    const targetY = GAME_HEIGHT / 2 + (limitedYAngle * yMultiplier * sensitivityFactor);
    
    gyroX = gyroX + (targetX - gyroX) * 0.2;
    gyroY = gyroY + (targetY - gyroY) * 0.2;
    
    mouseX = Math.max(0, Math.min(GAME_WIDTH, gyroX));
    mouseY = Math.max(0, Math.min(GAME_HEIGHT, gyroY));
    
    updateViewfinderFromGyro();
}

function updateViewfinderFromGyro() {
    if (!gyroModeActive || gamePaused) return;
    
    const viewfinder = document.getElementById('viewfinder');
    const viewfinderSize = getViewfinderSize();
    
    const rect = canvas.getBoundingClientRect();
    const container = document.getElementById('gameContainer');
    const containerRect = container.getBoundingClientRect();
    
    // 计算画布的实际显示缩放比例
    const displayScaleX = rect.width / GAME_WIDTH;
    const displayScaleY = rect.height / GAME_HEIGHT;
    
    // 鼠标位置在屏幕上的坐标
    const screenX = mouseX * displayScaleX;
    const screenY = mouseY * displayScaleY;
    
    const canvasLeft = rect.left - containerRect.left;
    const canvasTop = rect.top - containerRect.top;
    
    // 取景器在屏幕上的显示尺寸
    const viewfinderDisplayWidth = viewfinderSize.width * displayScaleX;
    const viewfinderDisplayHeight = viewfinderSize.height * displayScaleY;
    
    viewfinder.style.display = 'block';
    viewfinder.style.width = viewfinderDisplayWidth + 'px';
    viewfinder.style.height = viewfinderDisplayHeight + 'px';
    viewfinder.style.left = (canvasLeft + screenX - viewfinderDisplayWidth / 2) + 'px';
    viewfinder.style.top = (canvasTop + screenY - viewfinderDisplayHeight / 2) + 'px';
}

function handleMouseMove(e) {
    if (gyroModeActive) return;
    
    const rect = canvas.getBoundingClientRect();
    
    // 计算从屏幕坐标到游戏逻辑坐标的转换
    const scaleX = GAME_WIDTH / rect.width;
    const scaleY = GAME_HEIGHT / rect.height;
    
    mouseX = (e.clientX - rect.left) * scaleX;
    mouseY = (e.clientY - rect.top) * scaleY;
    
    // 限制在游戏边界内
    mouseX = Math.max(0, Math.min(GAME_WIDTH, mouseX));
    mouseY = Math.max(0, Math.min(GAME_HEIGHT, mouseY));
    
    if (!gyroModeActive) {
        updateViewfinderFromMouse(e.clientX, e.clientY, rect);
    }
}

    const viewfinder = document.getElementById('viewfinder');
    const viewfinderSize = getViewfinderSize();

    // 取景器在屏幕上的显示尺寸

    viewfinder.style.display = 'block';

    viewfinder.style.height = viewfinderDisplayHeight + 'px';
    viewfinder.style.left = (clientX - viewfinderDisplayWidth / 2) + 'px';
    viewfinder.style.top = (clientY - viewfinderDisplayHeight / 2) + 'px';
}

        // 观鸟模式下保持 gamePaused = false，但 requestAnimationFrame 会被浏览器暂停，
        // 画面不更新，但 setInterval 继续运行，观鸟记录正常累积。
    } else {
        // 页面重新可见：如果游戏处于暂停状态，恢复游戏
        if (gamePaused) {
            resumeGame();
        }
    }
}

function getBirdsInView() {
  const viewBounds = {
    left: 0,
    right: GAME_WIDTH,
    top: 0,
    bottom: GAME_HEIGHT
  };
  
  const birdsInView = [];
  const countedGroups = new Set();
  
  birds.forEach(bird => {
    if (!bird.name || bird.isBat || bird.type?.isSpecial) return;
    
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    const birdRadius = birdSize / 2;
    
    const isInView = bird.x + birdRadius >= viewBounds.left &&
                    bird.x - birdRadius <= viewBounds.right &&
                    bird.y + birdRadius >= viewBounds.top &&
                    bird.y - birdRadius <= viewBounds.bottom;
    
    if (isInView) {
      birdsInView.push(bird);
      
      if (bird.groupId && birdGroupInfo[bird.groupId]) {
        if (!countedGroups.has(bird.groupId)) {
          countedGroups.add(bird.groupId);
        }
      }
    }
  });
  
  return birdsInView;
}

function countBirdsInView() {
  const birdsInView = getBirdsInView();
  const birdCounts = {};
  const countedGroups = new Set();
  
  birdsInView.forEach(bird => {
    const birdName = bird.name;
    if (!birdCounts[birdName]) {
      birdCounts[birdName] = 0;
    }
    
    if (bird.groupId && birdGroupInfo[bird.groupId]) {
      if (!countedGroups.has(bird.groupId)) {
        const group = birdGroupInfo[bird.groupId];
        if (group && group.birds) {
          let groupCount = 0;
          group.birds.forEach(groupBird => {
            if (groupBird && birds.includes(groupBird)) {
              const baseSize = 20;
              const groupBirdRadius = baseSize * groupBird.size / 2;
              const isGroupBirdInView = groupBird.x + groupBirdRadius >= 0 &&
                                        groupBird.x - groupBirdRadius <= GAME_WIDTH &&
                                        groupBird.y + groupBirdRadius >= 0 &&
                                        groupBird.y - groupBirdRadius <= GAME_HEIGHT;
              if (isGroupBirdInView) {
                groupCount++;
              }
            }
          });
          birdCounts[birdName] += groupCount;
          countedGroups.add(bird.groupId);
        }
      }
    } else {
      birdCounts[birdName]++;
    }
  });
  
  return birdCounts;
}

    function createBirdingRecord(duration) {
        if (!birdingModeActive && birdingObservedSpecies.size === 0) {
            return null;
        }
        
        const capturedInSession = birdingModeCapturedSpecies ? birdingModeCapturedSpecies.size : 0;
        let rarestBird = null;
        let minProbability = Infinity;
        
        for (const birdName of birdingObservedSpecies) {
            const birdKey = Object.keys(BIRD_TYPES).find(key => BIRD_TYPES[key].name === birdName);
            if (birdKey && BIRD_TYPES[birdKey].probability > 0 && BIRD_TYPES[birdKey].probability < minProbability) {
                minProbability = BIRD_TYPES[birdKey].probability;
                rarestBird = birdName;
            }
        }
        
        const record = {
            id: birdingRecords.length + 1,
            time: gameTime,
            observedSpecies: Array.from(birdingObservedSpecies),
            totalObservedSpecies: birdingObservedSpecies.size,
            capturedInSession: capturedInSession,
            rarestBird: rarestBird,
            birdingModeDuration: duration, // 使用传入的实际时长
            startedAtDaytime: isDaytimeAtStart,
            endedAtDaytime: isDaytime
        };
        
        birdingRecords.push(record);
        if (birdingRecords.length > 20) {
            birdingRecords.shift();
        }
        
        updateBirdingRecordIcons();
        return record;
    }

function switchBirdingRecord(direction) {

  if (newIndex >= 0 && newIndex < birdingRecords.length) {
    isNavigatingRecords = true;

      }, 100);
    }, 100);
  }

// 处理滚轮事件
function handleRecordWheel(event) {
  if (isNavigatingRecords) return;
  
  const now = Date.now();
  if (now - lastWheelTime < WHEEL_COOLDOWN) return;
  
  event.preventDefault();
  
  // 判断滚轮方向
  if (event.deltaY > 0) {
    // 向下滚动，切换到下一条记录
    switchBirdingRecord(1);
  } else if (event.deltaY < 0) {
    // 向上滚动，切换到上一条记录
    switchBirdingRecord(-1);
  }
  
  lastWheelTime = now;
}

// 处理触摸开始事件
function handleRecordTouchStart(event) {
  if (event.touches.length === 1) {
    touchStartY = event.touches[0].clientY;
    touchStartX = event.touches[0].clientX;
  }
}

// 处理触摸移动事件
function handleRecordTouchMove(event) {
  if (isNavigatingRecords || event.touches.length !== 1) return;
  
  event.preventDefault();
  
  const touchY = event.touches[0].clientY;
  const touchX = event.touches[0].clientX;
  
  // 计算垂直滑动距离
  const deltaY = touchY - touchStartY;
  const deltaX = touchX - touchStartX;
  
  // 如果是垂直滑动且距离足够大，则切换记录
  if (Math.abs(deltaY) > 50 && Math.abs(deltaY) > Math.abs(deltaX)) {
    if (deltaY > 0) {
      // 向下滑动，切换到上一条记录
      switchBirdingRecord(-1);
    } else {
      // 向上滑动，切换到下一条记录
      switchBirdingRecord(1);
    }
    
    // 重置触摸起点
    touchStartY = touchY;
    touchStartX = touchX;
  }
}

// 处理触摸结束事件
function handleRecordTouchEnd() {
  touchStartY = 0;
  touchStartX = 0;
}

function easeInOutQuad(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function setGameMode(mode) {
  if (gameMode === mode) return;
  const oldMode = gameMode;
  gameMode = mode;
    // 重置篝火状态
    isCampfireExtinguished = false;
    isNightAccelerated = false;
        // 重置营地状态
        resetCampsite();
  
  if (mode === 'day') {
    if (oldMode === 'normal') {
      normalModeTimeState = {
        isDaytime: isDaytime,
        dayNightTimer: dayNightTimer,
        moonPhaseTimer: moonPhaseTimer
      };
    }
    
    isDaytime = true;
    dayNightTimer = dayModeTimeState;
    
    showSpecialAlert("切换到永久日间模式");
    
    for (let i = birds.length - 1; i >= 0; i--) {
      if (birds[i].isOwl || birds[i].isBat) {
        birds.splice(i, 1);
      }
    }
    
    if (littleOwl) {
      birds.splice(birds.indexOf(littleOwl), 1);
      littleOwl = null;
    }
    
    nightObjects = [];
  } else if (mode === 'night') {
    if (oldMode === 'normal') {
      normalModeTimeState = {
        isDaytime: isDaytime,
        dayNightTimer: dayNightTimer,
        moonPhaseTimer: moonPhaseTimer
      };
    }
    
    isDaytime = false;
    dayNightTimer = nightModeTimeState;
    moonPhaseTimer = nightModeMoonPhaseTimer || Math.random() * MOON_PHASE_CYCLE;
    
    showSpecialAlert("切换到永久夜间模式");
    
    for (let i = birds.length - 1; i >= 0; i--) {
      if (!birds[i].isOwl && !birds[i].isBat && birds[i].name !== "小鸮" && birds[i].name !== "夜鹭") {
        birds.splice(i, 1);
      }
    }
    
    nightObjects = [];
  } else if (mode === 'normal') {
    if (oldMode === 'day') {
      dayModeTimeState = dayNightTimer;
      isDaytime = normalModeTimeState.isDaytime;
      dayNightTimer = normalModeTimeState.dayNightTimer;
      moonPhaseTimer = normalModeTimeState.moonPhaseTimer;
    } else if (oldMode === 'night') {
      nightModeTimeState = dayNightTimer;
      nightModeMoonPhaseTimer = moonPhaseTimer;
      isDaytime = normalModeTimeState.isDaytime;
      dayNightTimer = normalModeTimeState.dayNightTimer;
      moonPhaseTimer = normalModeTimeState.moonPhaseTimer;
    } else {
      if (normalModeTimeState) {
        isDaytime = normalModeTimeState.isDaytime;
        dayNightTimer = normalModeTimeState.dayNightTimer;
        moonPhaseTimer = normalModeTimeState.moonPhaseTimer;
      } else {
        isDaytime = true;
        dayNightTimer = 0;
        moonPhaseTimer = 0;
      }
    }
    
    showSpecialAlert("切换到普通模式");
    
    if (oldMode === 'night') {
      for (let i = birds.length - 1; i >= 0; i--) {
        if (birds[i].isOwl || birds[i].isBat) {
          birds.splice(i, 1);
        }
      }
      nightObjects = [];
    }
  }
        updateModeToggleButtons();
        updateCampsiteVisibility();
        updateTimeIndicator();
}

function captureBirdingRecord() {
    console.log("开始截图记录...");
    
    // 检查是否已设置玩家ID，如果没有则先提示输入
    if (!gameSave.playerId) {
        promptPlayerId();
        return;
    }
    
    if (!currentBirdingRecord) {
        console.warn("没有当前观鸟记录");
        showSpecialAlert("请先打开观鸟记录！");
        return;
    }
    
    const screenshotButton = document.getElementById('screenshotButton');
    screenshotButton.disabled = true;
    screenshotButton.style.opacity = '0.5';
    screenshotButton.textContent = "生成中...";
    
    const originalNavigating = isNavigatingRecords;
    isNavigatingRecords = true;
    
    try {
        if (!gamePaused) {
            pauseGame();
        }
        
        const SCREENSHOT_WIDTH = 300;
        const lineHeight = 22;
        const record = currentBirdingRecord;
        const speciesCount = record.observedSpecies.length;
        
        // 计算高度
        const titleHeight = 50;
        const recordInfoHeight = 5 * lineHeight;
        const headerMargin = 35;
        const footerHeight = 30;
        const achievementAreaHeight = 60;
        const bottomMargin = 20;
        const playerIdHeight = 0; // 不再单独显示一行
        
        // 计算物种列表所需高度
        const itemsPerColumn = 20;
        const columnCount = Math.ceil(speciesCount / itemsPerColumn);
        const maxColumns = 3;
        const actualColumnCount = Math.min(columnCount, maxColumns);
        const speciesListHeight = Math.min(speciesCount, itemsPerColumn * actualColumnCount) * lineHeight;
        
        const baseHeight = titleHeight + recordInfoHeight + headerMargin + footerHeight + 
                          achievementAreaHeight + bottomMargin + playerIdHeight;
        const dynamicHeight = baseHeight + speciesListHeight;
        
        const MIN_SCREENSHOT_HEIGHT = 1000;
        const MAX_SCREENSHOT_HEIGHT = 2000;
        const SCREENSHOT_HEIGHT = Math.max(MIN_SCREENSHOT_HEIGHT, Math.min(MAX_SCREENSHOT_HEIGHT, dynamicHeight));
        
        screenshotCanvas.width = SCREENSHOT_WIDTH;
        screenshotCanvas.height = SCREENSHOT_HEIGHT;
        screenshotCtx.clearRect(0, 0, SCREENSHOT_WIDTH, SCREENSHOT_HEIGHT);
        
        // 背景渐变
        const gradient = screenshotCtx.createLinearGradient(0, 0, 0, SCREENSHOT_HEIGHT);
        gradient.addColorStop(0, '#16213e');
        gradient.addColorStop(1, '#0f3460');
        screenshotCtx.fillStyle = gradient;
        screenshotCtx.fillRect(0, 0, SCREENSHOT_WIDTH, SCREENSHOT_HEIGHT);
        
        // 标题 - 改为"ID的观鸟记录"
        screenshotCtx.fillStyle = '#FFD700';
        screenshotCtx.font = 'bold 24px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
        screenshotCtx.textAlign = 'center';
        const titleText = gameSave.playerId ? `${gameSave.playerId}的观鸟记录` : '观鸟记录';
        screenshotCtx.fillText(titleText, SCREENSHOT_WIDTH / 2, 40);
        
        screenshotCtx.strokeStyle = '#87CEEB';
        screenshotCtx.lineWidth = 2;
        screenshotCtx.beginPath();
        screenshotCtx.moveTo(50, 55);
        screenshotCtx.lineTo(SCREENSHOT_WIDTH - 50, 55);
        screenshotCtx.stroke();
        
        const startY = 85;
        const availableHeight = SCREENSHOT_HEIGHT - startY - footerHeight - 10;
        
        // 绘制记录信息和鸟类列表，传递截图宽度和高度作为参数
        let contentBottom = drawRecordInfoSingleColumn(
            record, 
            startY, 
            lineHeight, 
            SCREENSHOT_WIDTH - 40, 
            availableHeight, 
            SCREENSHOT_WIDTH, 
            SCREENSHOT_HEIGHT
        );
        
        // 获取最近成就（同一系列只显示最高级）
        const recentAchievements = getRecentAchievementsForScreenshot(3);
        
        // 在底部绘制成就（红褐色字体）
        if (recentAchievements.length > 0) {
            const achievementY = SCREENSHOT_HEIGHT - footerHeight - 25;
            
            screenshotCtx.fillStyle = '#8B4513'; // 红褐色
            screenshotCtx.font = 'bold 16px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
            screenshotCtx.textAlign = 'center';
            
            // 绘制成就，从下往上排列
            let currentY = achievementY;
            for (let i = 0; i < Math.min(recentAchievements.length, 3); i++) {
                const achievement = recentAchievements[i];
                screenshotCtx.fillText(achievement.name, SCREENSHOT_WIDTH / 2, currentY);
                currentY -= lineHeight * 1.2;
            }
        }
        
        // 底部网址

        screenshotCtx.font = 'bold 14px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
        screenshotCtx.textAlign = 'center';
        const bottomText = 'https://goseplover.github.io/12000h/';
        screenshotCtx.fillText(bottomText, SCREENSHOT_WIDTH / 2, SCREENSHOT_HEIGHT - 15);
        
        currentScreenshotDataURL = screenshotCanvas.toDataURL('image/png');
        console.log("截图生成完成，数据URL长度:", currentScreenshotDataURL.length);
        
        setTimeout(() => {
            showScreenshotPreview();
            screenshotButton.disabled = false;
            screenshotButton.style.opacity = '1';
            screenshotButton.textContent = "📸 截图记录";
            isNavigatingRecords = originalNavigating;
        }, 100);
        
    } catch (error) {
        console.error("截图绘制过程中出错:", error);
        showSpecialAlert("截图绘制失败");
        screenshotButton.disabled = false;
        screenshotButton.style.opacity = '1';
        screenshotButton.textContent = "📸 截图记录";
        isNavigatingRecords = originalNavigating;
        resumeGame();
    }
}

function drawRecordInfoSingleColumn(record, startY, lineHeight, columnWidth, maxHeight, screenshotWidth, screenshotHeight) {
    let y = startY;
    const x = 20;
    
    // 删除之前的"观鸟者: ID"行
    
    // 记录基本信息
    screenshotCtx.fillStyle = '#FFFFFF';
    screenshotCtx.font = '16px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
    screenshotCtx.textAlign = 'left';
    
    screenshotCtx.fillText(`记录编号: #${record.id}`, x, y);
    y += lineHeight;
    
    const durationText = `观鸟时长: ${Math.floor(record.birdingModeDuration / 60000)}分${Math.floor((record.birdingModeDuration % 60000) / 1000)}秒`;
    screenshotCtx.fillText(durationText, x, y);
    y += lineHeight;
    
    screenshotCtx.fillText(`时间: ${record.startedAtDaytime ? "白天" : "黑夜"} → ${record.endedAtDaytime ? "白天" : "黑夜"}`, x, y);
    y += lineHeight;
    
    screenshotCtx.fillText(`观察鸟种: ${record.totalObservedSpecies} 种`, x, y);
    y += lineHeight;
    
    screenshotCtx.fillText(`拍摄鸟种: ${record.capturedInSession || 0} 种`, x, y);
    y += lineHeight;
    
    if (record.rarestBird) {
        screenshotCtx.fillStyle = '#FFD700';
        screenshotCtx.fillText(`最稀有: ${record.rarestBird}`, x, y);
        screenshotCtx.fillStyle = '#FFFFFF';
        y += lineHeight;
    }
    
    y += lineHeight;
    
    // 观察到的鸟种标题
    screenshotCtx.fillStyle = '#87CEEB';
    screenshotCtx.fillText('观察到的鸟种:', x, y);
    y += lineHeight;
    
    screenshotCtx.strokeStyle = '#87CEEB';
    screenshotCtx.lineWidth = 1;
    screenshotCtx.beginPath();
    screenshotCtx.moveTo(x, y - 5);
    screenshotCtx.lineTo(x + 120, y - 5);
    screenshotCtx.stroke();
    
    y += 5;
    
    // 绘制鸟类列表，添加序号
    const sortedSpecies = [...record.observedSpecies].sort();
    const itemsPerColumn = 20;
    const columnCount = Math.ceil(sortedSpecies.length / itemsPerColumn);
    const maxColumns = 3;
    const actualColumnCount = Math.min(columnCount, maxColumns);
    const actualColumnWidth = (screenshotWidth - 40) / actualColumnCount;
    
    for (let col = 0; col < actualColumnCount; col++) {
        const columnX = x + col * actualColumnWidth;
        let columnY = y;
        
        for (let row = 0; row < itemsPerColumn; row++) {
            const index = col * itemsPerColumn + row;
            if (index >= sortedSpecies.length) break;
            
            const birdName = sortedSpecies[index];
            const birdKey = Object.keys(BIRD_TYPES).find(key => BIRD_TYPES[key].name === birdName);
            const isRare = birdKey && BIRD_TYPES[birdKey].probability < 0.02;
            const isRarest = birdName === record.rarestBird;
            
            // 序号部分
            const numberText = `${index + 1}. `;
            const numberWidth = screenshotCtx.measureText(numberText).width;
            
            screenshotCtx.fillStyle = '#87CEEB'; // 序号颜色
            screenshotCtx.font = '14px "AlimamaShuHeiTi-Bold.ttf"';
            screenshotCtx.fillText(numberText, columnX, columnY);
            
            // 鸟类名称部分
            if (isRarest) {
                screenshotCtx.fillStyle = '#FFD700';
                screenshotCtx.font = 'bold 14px "AlimamaShuHeiTi-Bold.ttf"';
                screenshotCtx.fillText(`${birdName} ★`, columnX + numberWidth, columnY);
                screenshotCtx.font = '14px "AlimamaShuHeiTi-Bold.ttf"';
            } else if (isRare) {
                screenshotCtx.fillStyle = '#FFA500';
                screenshotCtx.fillText(birdName, columnX + numberWidth, columnY);
            } else {
                screenshotCtx.fillStyle = '#FFFFFF';
                screenshotCtx.fillText(birdName, columnX + numberWidth, columnY);
            }
            columnY += lineHeight;
        }
    }
    
    return y + Math.min(sortedSpecies.length, itemsPerColumn * actualColumnCount) * lineHeight;
}

// 获取最近成就用于截图显示（同一系列只显示最高级）
function getRecentAchievementsForScreenshot(maxCount) {
    const now = Date.now();
    const twelveHours = 12 * 60 * 60 * 1000;
    
    // 获取所有已解锁的成就，按时间倒序
    const allAchievements = Object.keys(gameSave.achievements)
        .filter(key => gameSave.achievements[key].achieved)
        .map(key => ({
            id: key,
            ...ACHIEVEMENTS[key],
            ...gameSave.achievements[key]
        }))
        .sort((a, b) => b.timestamp - a.timestamp); // 按解锁时间倒序
    
    if (allAchievements.length === 0) return [];
    
    // 按系列分组，只保留每个系列的最高级成就（用于截图显示）
    const seriesMap = {};
    allAchievements.forEach(achievement => {
        const series = achievement.series;
        if (!seriesMap[series] || seriesMap[series].level < achievement.level) {
            seriesMap[series] = achievement;
        }
    });
    
    // 转换为数组并重新按时间排序
    const filteredAchievements = Object.values(seriesMap)
        .sort((a, b) => b.timestamp - a.timestamp);
    
    // 检查是否有12小时内的成就
    const recentAchievements = filteredAchievements.filter(a => now - a.timestamp <= twelveHours);
    
    if (recentAchievements.length === 0) {
        // 如果都没有12小时内的，随机选择几个
        return filteredAchievements
            .sort(() => Math.random() - 0.5)
            .slice(0, Math.min(maxCount, filteredAchievements.length));
    }
    
    return recentAchievements.slice(0, Math.min(maxCount, recentAchievements.length));
}

// 在屏幕方向变化时保存和恢复篝火状态
window.addEventListener('orientationchange', function() {
    // 保存当前篝火状态
    const wasExtinguished = isCampfireExtinguished;
    const wasAccelerated = isNightAccelerated;
    
    // 短暂延迟后恢复状态
    setTimeout(function() {
        // 重新获取营地元素
        const campsite = document.getElementById('campsite');
        const flame = document.getElementById('campfire-flame');
        const hint = document.querySelector('#campsite > div > div:last-child');
        
        if (campsite && flame && hint) {

            if (wasExtinguished) {
                // 如果是熄灭状态
                flame.style.display = 'none';
                flame.style.opacity = '0';
                hint.textContent = "篝火已熄灭";
                hint.style.color = "#87CEEB";
                
                // 确保加速状态也恢复
                if (wasAccelerated) {

                }

                flame.style.opacity = '1';
                hint.textContent = "点击熄灭篝火";
                hint.style.color = "#FFD700";

});

// 修改 handleKeyDown 函数，添加键盘导航支持
function handleKeyDown(e) {
    // 防止在输入框等元素中触发
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        return;
    }else if (e.key === ' ' || e.key === 'Spacebar') {
    // 防止空格键滚动页面
    e.preventDefault();
    
    // 切换文本浏览器显示/隐藏
    toggleTextBrowser();
    
    // 返回false防止事件冒泡
    return false;
}
    if (e.key === 'Escape') {
        closeAlbum();
        closeBirdingRecord();
        closeHelpModal();
    } else if (e.key === 'c' || e.key === 'C') {
        generateBlackWingedKite(false);
    } else if (e.key === 'x' || e.key === 'X') {
        generateComet(false);
    } else if (e.key === 'd' || e.key === 'D') {
        generateGoldcrest(false);
    } else if (e.key === '1') {
        generateTwelveThousandPlover(false);
    } else if (e.key === 'l' || e.key === 'L') {
        generateMeteor(false);
    } else if (e.key === 'u' || e.key === 'U') {
        generateUFO(false);
    } else if (e.key === 'q' || e.key === 'Q') {
        generateMagpie(false);
    } else if (e.key === 'k' || e.key === 'K') {
        generateKingfisher(false);
    } else if (e.key === 'r' || e.key === 'R') {
        createBirdingRecord();
    } else if (e.key === 'v' || e.key === 'V') {
        if (birdingRecords.length > 0) {
            openBirdingRecord(birdingRecords.length - 1);
        }
    } else if (e.key === 'm' || e.key === 'M') {
        toggleBirdingMode();
    } else if (e.key === '0') {
        generateRareBird();
    } else if (e.key === 'p' || e.key === 'P') {
        if (currentBirdingRecord) {
            captureBirdingRecord();
        }
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        const modal = document.getElementById('birdingRecordModal');
        if (modal.style.display === 'block') {
            e.preventDefault();
            switchBirdingRecord(-1);
        }
    } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        const modal = document.getElementById('birdingRecordModal');
        if (modal.style.display === 'block') {
            e.preventDefault();
            switchBirdingRecord(1);
        }
     } else if (e.key === 't' || e.key === 'T') {
        generateVinegarDuck(true);
    } else if (e.key === 'b' || e.key === 'B') {
        debugCoordinateSystem();
    } else if (e.key === 'g' || e.key === 'G') {
        debugBlueKingfisherStatus();
}
}
function skipToNight() {
    // 只有在普通模式且是白天时才有效
    if (gameMode !== 'normal' || !isDaytime) {
        showSpecialAlert("只能在普通模式的白天跳过");
        return;
    }
    
    // 保存当前时间状态
    const savedTimeState = {
        gameTime: gameTime,
        dayNightTimer: dayNightTimer,
        moonPhaseTimer: moonPhaseTimer
    };
    
    // 计算跳过的时间
    const timeToSkip = DAY_NIGHT_CYCLE_DURATION - dayNightTimer;
    
    // 直接切换到夜晚
    isDaytime = false;
    dayNightTimer = 0; // 重置为夜晚开始
    
    // 更新篝火状态
    isCampfireExtinguished = false;
    isNightAccelerated = false;
    
    // 清除白天的鸟类（除了夜间可以出现的）
    for (let i = birds.length - 1; i >= 0; i--) {
        const bird = birds[i];
        // 保留夜鹭、猫头鹰、蝙蝠等夜间鸟类
        const isNocturnal = bird.isOwl || bird.isBat || 
                           bird.name === "小鸮" || 
                           bird.name === "夜鹭" ||
                           bird.name === "雕鸮" ||
                           bird.name === "短耳鸮";
        
        if (!isNocturnal) {
            birds.splice(i, 1);
        }
    }
    
    // 清空白天物体
    nightObjects = [];
    
    // 生成一些夜间鸟类
    if (Math.random() < 0.3) {
        spawnNightOwls();
    }
    
    // 显示提示
    const skippedMinutes = Math.floor(timeToSkip / 60000);
    const skippedSeconds = Math.floor((timeToSkip % 60000) / 1000);
    showSpecialAlert(`跳过了 ${skippedMinutes}分${skippedSeconds}秒，已切换到夜晚`);
    
    // 更新UI
    updateModeToggleButtons();
    updateCampsiteVisibility();
    updateTimeIndicator();
    
    // 播放音效（可选）
    playTimeSkipSound();
    
    // 记录跳过操作（用于调试）
    console.log("跳过白天:", {
        skippedTime: timeToSkip,
        skippedMinutes,
        skippedSeconds,
        previousTimeState: savedTimeState,
        newTimeState: {
            isDaytime: isDaytime,
            dayNightTimer: dayNightTimer
        }
    });
}

function resizeCanvas() {
  const container = document.getElementById('gameContainer');
  const containerWidth = container.clientWidth;
  const containerHeight = container.clientHeight;
  
  canvas.width = GAME_WIDTH;
  canvas.height = GAME_HEIGHT;
  poopCanvas.width = GAME_WIDTH;
  poopCanvas.height = GAME_HEIGHT;
  
  const containerAspect = containerWidth / containerHeight;
  const gameAspect = GAME_WIDTH / GAME_HEIGHT;
  
  let displayWidth, displayHeight;
  if (containerAspect > gameAspect) {
    displayHeight = containerHeight;
    displayWidth = displayHeight * gameAspect;
  } else {
    displayWidth = containerWidth;
    displayHeight = displayWidth / gameAspect;
  }
  
  canvas.style.width = displayWidth + 'px';
  canvas.style.height = displayHeight + 'px';
  poopCanvas.style.width = displayWidth + 'px';
  poopCanvas.style.height = displayHeight + 'px';
  
  canvas.style.position = 'absolute';
  canvas.style.left = (containerWidth - displayWidth) / 2 + 'px';
  canvas.style.top = (containerHeight - displayHeight) / 2 + 'px';
  
  poopCanvas.style.position = 'absolute';
  poopCanvas.style.left = canvas.style.left;
  poopCanvas.style.top = canvas.style.top;
  
  console.log("画布重置，枯树状态:", deadTree ? "已存在" : "不存在");
  
  // 注意：这里不重置枯树，只重置芦苇区域（如果需要）
  if (!reedZone) {
    initReeds();
  }
  
  if (gameMode === 'normal' && !isDaytime) {
    setTimeout(updateCampfirePosition, 100);
  }
}

function initDeadTree() {
  // 如果已经初始化，直接返回
  if (isDeadTreeInitialized && deadTree) {
    console.log("枯树已初始化，跳过");
    return;
  }
  
  if (!reedZone) {
    console.log("芦苇区域未初始化，延迟枯树初始化");
    setTimeout(initDeadTree, 100);
    return;
  }
  
  console.log("初始化枯树（只执行一次）");
  
  const deadTreeX = reedZone.x + reedZone.width / 3;
  const groundY = reedZone.y + reedZone.height;
  const deadTreeHeight = GAME_HEIGHT * 0.2;
  const deadTreeWidth = 10;
  
  // 分支角度模式（与之前相同）
  const branchPatterns = {};
  const branchAnglePatterns = {};
  
  // 生成7组分支模式（与之前相同）
  for (let i = 0; i < 7; i++) {
    const angle1 = (15 + Math.random() * 10) * Math.PI / 180;
    const angle2 = (40 + Math.random() * 10) * Math.PI / 180;
    const dir1 = Math.random() > 0.5 ? 1 : -1;
    
    branchPatterns[i] = { direction1: dir1, direction2: -dir1 };
    branchAnglePatterns[i] = { angle1: angle1, angle2: angle2 };
  }
  
  deadTree = {
    x: deadTreeX,
    bottomY: groundY,
    height: deadTreeHeight,
    width: deadTreeWidth,
    trunkColor: '#8B928B',
    branchColor: '#5D5B53',
    hasBranches: true,
    branchPatterns: branchPatterns,
    branchAnglePatterns: branchAnglePatterns,
    branchPoints: [] // 初始化为空数组
  };
  
  // 生成分支点
  generateDeadTreeBranchPoints();
  
  isDeadTreeInitialized = true;
  console.log("枯树初始化完成，分叉点数量:", deadTree.branchPoints ? deadTree.branchPoints.length : 0);
}

// 生成枯树的分叉点（只在初始化时调用一次）
function generateDeadTreeBranchPoints() {
  if (!deadTree) return;
  
  const tree = deadTree;
  const groundY = reedZone ? (reedZone.y + reedZone.height) : GAME_HEIGHT * 0.9;
  const trunkBottomY = groundY;
  
  // 清空之前的分叉点
  tree.branchPoints = [];
  
  // 递归生成树枝分叉点
  function generateBranchPoints(startX, startY, length, thickness, angle, depth, branchPattern, anglePatternIndex) {
    if (depth <= 0 || length < 3) return;
    
    // 计算树枝终点
    const endX = startX + Math.cos(angle) * length;
    const endY = startY + Math.sin(angle) * length;
    
    // 当前点是一个分叉点，记录它
    if (depth >= 2 && length > 5) { // 只记录足够长的分叉点
      tree.branchPoints.push({
        x: endX,
        y: endY,
        branchLength: length,
        depth: depth,
        angle: angle
      });
    }
    
    // 计算下一级分支的参数
    const nextLength = length * 0.65; // 每次递归长度减少35%
    const nextThickness = thickness * 0.6; // 每次递归粗细减少40%
    const nextDepth = depth - 1;
    
    if (nextDepth > 0 && nextLength > 3) {
      // 获取当前分叉的角度模式和方向模式
      const pattern = tree.branchPatterns[anglePatternIndex];
      const anglePair = tree.branchAnglePatterns[anglePatternIndex];
      
      if (pattern && anglePair) {
        // 第一个分支：小角度分支 (15-25度)
        const angle1 = angle + pattern.direction1 * anglePair.angle1;
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle1, nextDepth, branchPattern + "A", anglePatternIndex + 1);
        
        // 第二个分支：大角度分支 (40-50度)
        const angle2 = angle + pattern.direction2 * anglePair.angle2;
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle2, nextDepth, branchPattern + "B", anglePatternIndex + 1);
      } else {
        // 如果没有模式，使用默认角度
        const angle1 = angle + (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 10) * Math.PI / 180;
        const angle2 = angle + (Math.random() > 0.5 ? 1 : -1) * (40 + Math.random() * 10) * Math.PI / 180;
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle1, nextDepth, branchPattern + "A", anglePatternIndex + 1);
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle2, nextDepth, branchPattern + "B", anglePatternIndex + 1);
      }
    } else {
      // 到达最小深度，记录为末端点
      if (depth >= 2 && length > 5) { // 只记录足够长的末端分支
        tree.branchPoints.push({
          x: endX,
          y: endY,
          branchLength: length,
          depth: depth,
          angle: angle,
          isEnd: true
        });
      }
    }
  }
  
  // 从树干开始生成分叉点
  generateBranchPoints(tree.x, trunkBottomY, tree.height * 0.8, tree.width, -Math.PI/2, 4, "", 0);
}

                            const bgColor = isHighest ? 'rgba(255, 215, 0, 0.2)' : 'rgba(139, 69, 19, 0.2)';
                            const textColor = isHighest ? '#FFD700' : '#8B4513';
                            
                            return `
                                <div style="background: ${bgColor}; 
                                            color: ${textColor}; 
                                            padding: 4px 8px; 
                                            border-radius: 12px; 
                                            border: 1px solid ${borderColor};
                                            font-size: 12px;
                                            cursor: help;"
                                     title="${achievement.desc} (${achievement.level}级)">
                                    ${achievement.name}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        });
        
        detailedAchievements.innerHTML = `
            <div style="color: #8B4513; font-weight: bold; margin-bottom: 8px;">
                已解锁成就：
            </div>
            ${achievementsHTML}
        `;
        
        achievementSummary.appendChild(detailedAchievements);
    }

    albumStats.appendChild(achievementSummary);
}

// 检查是否是同系列中的最高级成就
function isHighestAchievementInSeries(achievementId) {
    const achievement = ACHIEVEMENTS[achievementId];
    if (!achievement) return false;
    
    // 获取同系列的所有成就
    const seriesAchievements = Object.keys(ACHIEVEMENTS)
        .filter(key => ACHIEVEMENTS[key].series === achievement.series)
        .map(key => ({
            id: key,
            level: ACHIEVEMENTS[key].level,
            achieved: gameSave.achievements[key]?.achieved || false
        }));
    
    // 找到已解锁的最高级成就
    const highestUnlocked = seriesAchievements
        .filter(a => a.achieved)
        .sort((a, b) => b.level - a.level)[0];
    
    return highestUnlocked && highestUnlocked.id === achievementId;
}

// 获取系列名称
function getSeriesName(seriesKey) {
    const seriesNames = {
        'bird_collect': '鸟类收集',

        'total_time': '观鸟时间',
        'single_time': '单次观鸟',
        'beast': '兽类',
        'astro_meteor': '天文-流星',
        'astro_ufo': '天文-UFO',
        'astro_comet': '天文-彗星',
        'rare_bird': '稀有鸟类'
    };
    return seriesNames[seriesKey] || seriesKey;
}

// 辅助函数：十六进制颜色转RGB
function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? 
        `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : 
        '255, 215, 0';
}

// 获取成就图标
function getAchievementIcon(achievementId) {
    const achievement = ACHIEVEMENTS[achievementId];
    if (!achievement) return '🏆';
    
    switch(achievement.type) {
        case 'collect': return '🐦';
        case 'photo': return '📷';
        case 'time': return '⏱️';
        case 'single': return '🎯';
        case 'beast': return '🦇';
        case 'astro': 
            if (achievementId.includes('METEOR')) return '☄️';
            if (achievementId.includes('UFO')) return '🛸';
            if (achievementId.includes('COMET')) return '🌠';
            return '⭐';
        case 'rare': return '🌟';
        default: return '🏆';
    }
}

function handleMouseClick() {
    if (isTakingPhoto) return;
    isTakingPhoto = true;
    
    const viewfinderSize = getViewfinderSize();
    const actualViewfinderWidth = viewfinderSize.width;
    const actualViewfinderHeight = viewfinderSize.height;
    
    // 取景器在游戏坐标系中的边界
    const viewfinderLeft = mouseX - actualViewfinderWidth / 2;
    const viewfinderTop = mouseY - actualViewfinderHeight / 2;
    const viewfinderRight = viewfinderLeft + actualViewfinderWidth;
    const viewfinderBottom = viewfinderTop + actualViewfinderHeight;
       
    // 确保拍照区域在画布范围内，避免黑边
    // 注意：createPhoto 内部会处理边界剪裁，但如果传入坐标完全在画布外，就会全黑
    // 我们主要保证 mouseX/Y 是正确的逻辑坐标即可
    
    const centerRegionWidth = actualViewfinderWidth * 0.7;
    const centerRegionHeight = actualViewfinderHeight * 0.7;
    const centerRegionLeft = mouseX - centerRegionWidth / 2;
    const centerRegionTop = mouseY - centerRegionHeight / 2;
    const centerRegionRight = centerRegionLeft + centerRegionWidth;
    const centerRegionBottom = centerRegionTop + centerRegionHeight;
    
    let capturedBird = null;
    let capturedNightObject = null;
    let maxSize = 0;
    
    for (const bird of birds) {
        const baseSize = 20;
        const birdSize = baseSize * bird.size;
        let birdDisplayX = bird.x;
        
        const isInCenterRegion = birdDisplayX >= centerRegionLeft && birdDisplayX <= centerRegionRight &&
                                  bird.y >= centerRegionTop && bird.y <= centerRegionBottom;
        
        if (isInCenterRegion) {
            if (birdSize > maxSize) {
                maxSize = birdSize;
                capturedBird = bird;
                capturedNightObject = null;
            }
        }
    }
    
    for (const obj of nightObjects) {
        const baseSize = 20;
        const objSize = baseSize * obj.size;
        
        const isInCenterRegion = obj.x >= centerRegionLeft && obj.x <= centerRegionRight &&
                                  obj.y >= centerRegionTop && obj.y <= centerRegionBottom;
        
        if (isInCenterRegion) {
            if (objSize > maxSize) {
                maxSize = objSize;
                capturedBird = null;
                capturedNightObject = obj;
            }
        }
    }
    
    if (!capturedBird && !capturedNightObject) {
        let fallbackCapturedBird = null;
        let fallbackCapturedNightObject = null;
        let fallbackMaxSize = 0;
        
        for (const bird of birds) {
            const baseSize = 20;
            const birdSize = baseSize * bird.size;
            const birdRadius = birdSize / 2;
            let birdDisplayX = bird.x;
            
            const birdLeft = birdDisplayX - birdRadius;
            const birdRight = birdDisplayX + birdRadius;
            const birdTop = bird.y - birdRadius;
            const birdBottom = bird.y + birdRadius;
            
            const overlapX = birdRight >= viewfinderLeft && birdLeft <= viewfinderRight;
            const overlapY = birdBottom >= viewfinderTop && birdTop <= viewfinderBottom;
            const isInViewfinder = overlapX && overlapY;
            
            if (isInViewfinder) {
                if (birdSize > fallbackMaxSize) {
                    fallbackMaxSize = birdSize;
                    fallbackCapturedBird = bird;
                    fallbackCapturedNightObject = null;
                }
            }
        }
        
        for (const obj of nightObjects) {
            const baseSize = 20;
            const objSize = baseSize * obj.size;
            const objRadius = objSize / 2;
            
            const objLeft = obj.x - objRadius;
            const objRight = obj.x + objRadius;
            const objTop = obj.y - objRadius;
            const objBottom = obj.y + objRadius;
            
            const overlapX = objRight >= viewfinderLeft && objLeft <= viewfinderRight;
            const overlapY = objBottom >= viewfinderTop && objTop <= viewfinderBottom;
            const isInViewfinder = overlapX && overlapY;
            
            if (isInViewfinder) {
                if (objSize > fallbackMaxSize) {
                    fallbackMaxSize = objSize;
                    fallbackCapturedBird = null;
                    fallbackCapturedNightObject = obj;
                }
            }
        }
        
        capturedBird = fallbackCapturedBird;
        capturedNightObject = fallbackCapturedNightObject;
    }
    
    // 直接执行拍照逻辑，不再检查是否点击了营地
    createPhoto(viewfinderLeft, viewfinderTop, actualViewfinderWidth, actualViewfinderHeight, capturedBird, capturedNightObject);
    updateTextStats();
    playCameraSound();
    
    if (capturedBird) {
        showCaptureAlert(`拍摄到${capturedBird.name}！`);
    } else if (capturedNightObject) {
        showCaptureAlert(`拍摄到${capturedNightObject.name}！`);
    }
    
    setTimeout(() => {
        isTakingPhoto = false;
    }, 50);
}

function createPhoto(x, y, width, height, capturedBird, capturedNightObject) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width;
    tempCanvas.height = height;
    const tempCtx = tempCanvas.getContext('2d');
    
    let sourceX = Math.max(0, Math.min(x, GAME_WIDTH));
    let sourceY = Math.max(0, Math.min(y, GAME_HEIGHT));
    let drawX = 0;
    let drawY = 0;
    let drawWidth = width;
    let drawHeight = height;
    
    if (x < 0) {
        drawX = -x;
        drawWidth = width + x;
    }
    if (y < 0) {
        drawY = -y;
        drawHeight = height + y;
    }
    if (x + width > GAME_WIDTH) {
        drawWidth = GAME_WIDTH - x;
    }
    if (y + height > GAME_HEIGHT) {
        drawHeight = GAME_HEIGHT - y;
    }
    
    sourceX = Math.max(0, sourceX);
    sourceY = Math.max(0, sourceY);
    drawWidth = Math.max(0, drawWidth);
    drawHeight = Math.max(0, drawHeight);
    
    if (drawWidth > 0 && drawHeight > 0) {
        tempCtx.drawImage(
            canvas,
            sourceX, sourceY, drawWidth, drawHeight,
            drawX, drawY, drawWidth, drawHeight
        );
    }
    
    const goldenFilter = document.getElementById('goldenFilter');
    const filterStyle = window.getComputedStyle(goldenFilter);
    const filterColor = filterStyle.backgroundColor;
    
    // 只在非陀螺仪模式下应用滤镜（陀螺仪模式下保持原色）
    if (!gyroModeActive && filterColor && filterColor !== 'rgba(0, 0, 0, 0)' && filterColor !== 'transparent') {
        tempCtx.fillStyle = filterColor;
        tempCtx.fillRect(0, 0, drawWidth, drawHeight);
    }
    
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = viewfinderBaseWidth;
    finalCanvas.height = viewfinderBaseHeight;
    const finalCtx = finalCanvas.getContext('2d');
    
    finalCtx.drawImage(tempCanvas, 0, 0, width, height, 0, 0, viewfinderBaseWidth, viewfinderBaseHeight);
    
    finalCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
    finalCtx.lineWidth = 2;
    finalCtx.strokeRect(0, 0, viewfinderBaseWidth, viewfinderBaseHeight);
    
    // 拍摄到鸟类
    if (capturedBird) {
        // 正常鸟类（不是特殊鸟类、不是蝙蝠、不是无统计鸟类）
        if (!capturedBird.type.isSpecial && !capturedBird.isBat && 
            capturedBirds[capturedBird.name] !== undefined && !capturedBird.noStats) {
            capturedBirds[capturedBird.name]++;
            
// 保存到存档（不重复计数）
            if (!capturedBird.noStats) {
                updateCapturedBird(capturedBird.name);
            }
            
            // 如果是蝙蝠，记录为兽类
            if (capturedBird.isBat) {
                updateBeastPhoto(capturedBird.name);
                console.log("记录兽类（蝙蝠）照片:", capturedBird.name);
            }
            
            // 观鸟模式下更新拍摄鸟种统计
            if (birdingModeActive && birdingModeCapturedSpecies) {
                birdingModeCapturedSpecies.add(capturedBird.name);
                // 更新观鸟模式下的拍摄鸟种统计显示
                const capturedCountElement = document.getElementById('capturedCount');
                if (capturedCountElement) {
                    capturedCountElement.textContent = birdingModeCapturedSpecies.size;
                }
            }
        }
        
        const highlightColor = 'rgba(255, 255, 255, 0.1)';
        finalCtx.fillStyle = highlightColor;
        finalCtx.fillRect(0, 0, viewfinderBaseWidth, viewfinderBaseHeight);
        
        finalCtx.fillStyle = '#FFFFFF';
        finalCtx.font = '12px Arial';
        finalCtx.textAlign = 'left';
        finalCtx.fillText(capturedBird.name, 5, viewfinderBaseHeight - 5);
    } 
    // 拍摄到夜间物体（天文对象）
    else if (capturedNightObject) {
        // 记录天文照片
        updateAstroPhoto(capturedNightObject.name);
        console.log("记录天文照片:", capturedNightObject.name);
        
        const highlightColor = 'rgba(173, 216, 230, 0.1)';
        finalCtx.fillStyle = highlightColor;
        finalCtx.fillRect(0, 0, viewfinderBaseWidth, viewfinderBaseHeight);
        
        finalCtx.fillStyle = '#87CEEB';
        finalCtx.font = '12px Arial';
        finalCtx.textAlign = 'left';
        finalCtx.fillText(capturedNightObject.name, 5, viewfinderBaseHeight - 5);
    }
    
    // 检查是否已收集所有鸟类（用于触发特殊提示）
    const hasCollectedAllBirds = checkIfAllBirdsCollected();
    if (hasCollectedAllBirds && !hasShownAllBirdsAlert) {
        showAllBirdsAlert();
        hasShownAllBirdsAlert = true;
    }
    
    // 创建照片对象
    const photo = {
        id: photos.length,
        x: x,
        y: y,
        width: width,
        height: height,
        lens: currentLens,
        time: gameTime,
        bird: capturedBird ? capturedBird.name : null,
        birdType: capturedBird ? capturedBird.type : null,
        nightObject: capturedNightObject ? capturedNightObject.name : null,
        nightObjectType: capturedNightObject ? capturedNightObject.type : null,
        imageData: finalCanvas.toDataURL('image/png'),
        // 新增存档相关字段
        isBeast: capturedBird ? capturedBird.isBat : false,
        isAstro: capturedNightObject ? true : false,
        timestamp: Date.now()
    };
    
    // 添加到照片数组
    photos.push(photo);
    
    // 如果拍摄到鸟，更新游戏统计（双重确认，确保统计准确）
    if (capturedBird && !capturedBird.type.isSpecial && !capturedBird.isBat && 
        capturedBirds[capturedBird.name] !== undefined && !capturedBird.noStats) {
        capturedBirds[capturedBird.name]++;
        
        // 观鸟模式下记录本次观鸟的拍摄统计
        if (birdingModeActive && birdingModeCapturedSpecies) {
            birdingModeCapturedSpecies.add(capturedBird.name);
        }
    }
    
    // 更新相册预览
    updatePhotoPreview();
    
    // 自动保存游戏数据（增量保存）
    setTimeout(() => {
        saveGameData();
    }, 100);
}

function playCameraSound() {
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator1 = audioContext.createOscillator();
        const oscillator2 = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator1.connect(gainNode);
        oscillator2.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator1.frequency.value = 800;
        oscillator1.type = 'sine';
        oscillator2.frequency.value = 1200;
        oscillator2.type = 'sine';
        
        const currentTime = audioContext.currentTime;
        gainNode.gain.setValueAtTime(0, currentTime);
        gainNode.gain.linearRampToValueAtTime(0.5, currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.05);
        gainNode.gain.linearRampToValueAtTime(0, currentTime + 0.1);
        
        oscillator1.start(currentTime);
        oscillator2.start(currentTime);
        oscillator1.stop(currentTime + 0.1);
        oscillator2.stop(currentTime + 0.1);
    } catch (e) {
        console.log("音频上下文不支持，跳过音效");
    }
}

    pausedTimeState.lastRareBirdTime = lastRareBirdTime;
