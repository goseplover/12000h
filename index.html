}

    width: 100%;
    height: 100%;

}

#campsite > div > div:first-child {
    position: absolute;
    bottom: 0;
    right: 16.67%;

    height: 40%;

    height: 0;

    border-right: 15% solid transparent;

    bottom: 0;
    left: 23.33%;
    width: 20%;
    height: 30%;

}

    left: 20%;

}

    z-index: 3;
}

<script>

// ========== 石头系统与游禽模式 (优化版) ==========
let stones = [];
let waterfowlPatrolGroups = [];
const STONE_COUNT = 5;
const SPARROW_SIZE = 20;
const VISIBLE_HEIGHT = SPARROW_SIZE;
const FULL_HEIGHT_FACTOR = 1.2;
const STONE_MIN_LEN = 3 * SPARROW_SIZE;
const STONE_MAX_LEN = 5 * SPARROW_SIZE;
const WATER_HEIGHT = 6;
const WATER_COLOR = "rgba(0, 128, 128, 0.6)";

// 游禽参数
const LANDING_DURATION = 5000;      // 慢速降落时长5秒
const WATERFOWL_MOVE_SPEED = 0.2;   // 移动速度 0.2像素/秒
const WATERFOWL_MOVE_DIST_MIN = 15 * SPARROW_SIZE;
const WATERFOWL_MOVE_DIST_MAX = 45 * SPARROW_SIZE;
const RAPTOR_ALARM_DIST = 500;      // 猛禽惊吓距离

// 生成不规则石头顶点
function generateStoneVertices(cx, cy, width, fullHeight) {
    const w = width, h = fullHeight;
    const points = [];
    const segments = 12;
    const angleStep = (Math.PI * 2) / segments;
    for (let i = 0; i < segments; i++) {
        let angle = i * angleStep;
        let radX = w / 2, radY = h / 2;
        let randomFactor = 0.15 + Math.random() * 0.2;
        let offsetX = (Math.random() - 0.5) * w * randomFactor;
        let offsetY = (Math.random() - 0.5) * h * randomFactor;
        if (angle > Math.PI * 0.7 && angle < Math.PI * 1.3) offsetY *= 0.3;
        let x = cx + Math.cos(angle) * (radX + offsetX);
        let y = cy + Math.sin(angle) * (radY + offsetY);
        points.push({ x, y });
    }
    return points;
}

function generateStoneSpots(x, y, width, height, count) {
    const spots = [];
    for (let i = 0; i < count; i++) {
        spots.push({
            x: x + (Math.random() - 0.5) * width * 0.6,
            y: y + (Math.random() - 0.5) * height * 0.6,
            r: Math.random() * width * 0.1 + 2
        });
    }
    return spots;
}

function initStones() {
    console.log("initStones 被调用，reedZone:", reedZone);
    if (!reedZone) {
        console.warn("reedZone 未初始化，石头生成失败");
        return;
    }
    const groundY = reedZone.y + reedZone.height;
    const areaLeft = reedZone.x + reedZone.width * 0.25;
    const areaRight = reedZone.x + reedZone.width * 0.75;
    const step = (areaRight - areaLeft) / (STONE_COUNT + 1);
    stones = [];
    for (let i = 0; i < STONE_COUNT; i++) {
        const stoneX = areaLeft + step * (i + 1) + (Math.random() - 0.5) * step * 0.4;
        const stoneWidth = STONE_MIN_LEN + Math.random() * (STONE_MAX_LEN - STONE_MIN_LEN);
        const fullHeight = VISIBLE_HEIGHT * FULL_HEIGHT_FACTOR;
        const fullCenterY = groundY - fullHeight / 2;
        let vertices = generateStoneVertices(stoneX, fullCenterY, stoneWidth, fullHeight);
        const originalMinY = Math.min(...vertices.map(v => v.y));
        const targetBottomY = groundY - VISIBLE_HEIGHT;
        const deltaY = targetBottomY - originalMinY;
        vertices = vertices.map(v => ({ x: v.x, y: v.y + deltaY }));
        const finalCenterX = stoneX;
        const finalCenterY = (Math.min(...vertices.map(v => v.y)) + Math.max(...vertices.map(v => v.y))) / 2;
        const spots = generateStoneSpots(finalCenterX, finalCenterY, stoneWidth, VISIBLE_HEIGHT, 6);
        stones.push({ x: finalCenterX, y: finalCenterY, width: stoneWidth, height: VISIBLE_HEIGHT, vertices, spots });
    }
    console.log(`[石头] 初始化完成，共生成 ${stones.length} 块石头`);
}

function drawStones() {
    if (!stones.length) return;
    ctx.save();
    for (let s of stones) {
        ctx.fillStyle = "#5A5A5A";
        ctx.beginPath();
        if (s.vertices && s.vertices.length) {
            ctx.moveTo(s.vertices[0].x, s.vertices[0].y);
            for (let i = 1; i < s.vertices.length; i++) ctx.lineTo(s.vertices[i].x, s.vertices[i].y);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#3A3A3A";
            for (let spot of s.spots) { ctx.beginPath(); ctx.arc(spot.x, spot.y, spot.r, 0, Math.PI * 2); ctx.fill(); }
            ctx.strokeStyle = "#8A8A8A";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        } else {
            ctx.fillRect(s.x - s.width/2, s.y - s.height/2, s.width, s.height);
        }
    }
    ctx.restore();
}

function drawWater() {
    if (!reedZone) return;
    const groundY = reedZone.y + reedZone.height;
    const waterY = groundY - WATER_HEIGHT;
    ctx.fillStyle = WATER_COLOR;
    ctx.fillRect(0, waterY, GAME_WIDTH, WATER_HEIGHT);
}

// 检查是否有猛禽靠近
function isRaptorNearby(bird, distance) {
    for (let other of birds) {
        if (other.name === "游隼" || other.name === "红隼" || other.name === "黑翅鸢") {
            const dx = other.x - bird.x;
            const dy = other.y - bird.y;
            if (Math.sqrt(dx*dx + dy*dy) < distance) return true;
        }
    }
    return false;
}
function updateHeronReedStand(bird, deltaTime) {
    switch (bird.state) {
        case 'flyingToReedGround':
            if (!reedZone) {
                bird.state = 'flyingAway';
                break;
            }
            const dx = bird.reedGroundTargetX - bird.x;
            const dy = bird.reedGroundTargetY - bird.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 5) {
                bird.x = bird.reedGroundTargetX;
                bird.y = bird.reedGroundTargetY;
                bird.state = 'standing';
                bird.standStartTime = gameTime; // 使用全局游戏时间
                bird.speed = 0;
            } else {
                const step = Math.min(bird.speed, dist);
                bird.x += (dx / dist) * step;
                bird.y += (dy / dist) * step;
                bird.direction = dx > 0 ? 1 : -1;
            }
            break;
        case 'standing':
            if (gameTime - bird.standStartTime >= bird.standDuration) {
                bird.state = 'flyingAway';
                bird.speed = 1.5;
                bird.direction = Math.random() > 0.5 ? 1 : -1;
            }
            break;
        case 'flyingAway':
            bird.x += bird.speed * bird.direction;
            bird.y -= 0.3;
            if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
    }
}
function updateHeronFishDive(bird, deltaTime) {
    bird.stateTime += deltaTime;

    switch (bird.state) {
        case 'flyingToReedTop':
            if (!reedZone) {
                bird.state = 'flyingAway';
                break;
            }
            const dx = bird.targetX - bird.x;
            const dy = bird.targetY - bird.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 10) {
                bird.x = bird.targetX;
                bird.y = bird.targetY;
                bird.state = 'perchingOnReed';
                bird.stateTime = 0;
                bird.speed = 0;
                bird.headAngle = Math.PI / 4; // 头向下
            } else {
                const step = Math.min(bird.speed, dist);
                bird.x += (dx / dist) * step;
                bird.y += (dy / dist) * step;
            }
            break;
        case 'perchingOnReed':
            if (bird.stateTime >= bird.perchDuration) {
                bird.state = 'divingForFish';
                bird.stateTime = 0;
                bird.diveTargetX = bird.x + (bird.facingDirection > 0 ? 80 : -80);
                bird.diveTargetY = reedZone.y + reedZone.height - 10;
                bird.speed = 3.0;
            }
            break;
        case 'divingForFish':
            if (!reedZone) {
                bird.state = 'flyingAway';
                break;
            }
            const dxDiv = bird.diveTargetX - bird.x;
            const dyDiv = bird.diveTargetY - bird.y;
            const distDiv = Math.sqrt(dxDiv * dxDiv + dyDiv * dyDiv);
            if (distDiv < 15 || bird.stateTime > 2000) {
                bird.hasCaughtFish = true;
                bird.caughtFish = { size: 8, color: "#3399FF" };
                bird.state = 'flyingWithFish';
                bird.stateTime = 0;
                bird.speed = 2.0;
                bird.facingDirection = bird.direction; // 记录方向
            } else {
                const angle = Math.atan2(dyDiv, dxDiv);
                const step = Math.min(bird.speed, distDiv);
                bird.x += Math.cos(angle) * step;
                bird.y += Math.sin(angle) * step;
                bird.headAngle = angle;
            }
            break;
        case 'flyingWithFish':
            if (bird.direction !== bird.facingDirection) {
                bird.direction = bird.facingDirection;
            }
            bird.x += bird.speed * bird.direction;
            bird.y -= 0.5;
            bird.headAngle = 0;
            bird.bodyFlipped = (bird.direction === -1);
            if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
        case 'flyingAway':
            bird.x += bird.speed * bird.direction;
            bird.y -= 0.3;
            if (bird.x < -100 || bird.x > GAME_WIDTH + 100 || bird.y < -100) {
                birds.splice(birds.indexOf(bird), 1);
            }
            break;
    }
}
// 游禽组更新（含移动、转向、猛禽惊吓）
function updateWaterfowlPatrol(deltaTime) {
    for (let i = 0; i < waterfowlPatrolGroups.length; i++) {
        const group = waterfowlPatrolGroups[i];
        if (!group.birds.length) {
            waterfowlPatrolGroups.splice(i, 1);
            i--;
            continue;
        }

        // ========== 小pt下潜逻辑（必须在组移动前处理） ==========
        for (let b of group.birds) {
            if (b.name === "小pt" && b.state === 'patrolWalk') {
                // 初始化下潜属性
                if (b.diveCooldown === undefined) {
                    b.diveCooldown = 0;
                    b.isDiving = false;
                    b.diving = false;
                }

                // 冷却递减
                if (b.diveCooldown > 0) {
                    b.diveCooldown -= deltaTime;
                    if (b.diveCooldown < 0) b.diveCooldown = 0;
                }

                // 未下潜且冷却结束，随机触发
                if (!b.isDiving && b.diveCooldown <= 0) {
                    if (Math.random() < 0.5) { // 50%概率下潜
                        b.isDiving = true;
                        b.diving = true;
                        b.diveStartTime = gameTime;
                        b.diveDuration = 5000;
                        b.diveOriginalX = b.x;
                        b.diveOriginalY = b.y;
                    }
                }

// 下潜中，检查是否结束
if (b.isDiving) {
    if (gameTime - b.diveStartTime >= b.diveDuration) {
        // 上浮前检查是否有猛禽靠近
        let raptorStillNear = false;
        for (let other of birds) {
            if (other.name === "游隼" || other.name === "红隼" || other.name === "黑翅鸢") {
                const dx = other.x - b.x;
                const dy = other.y - b.y;
                if (Math.hypot(dx, dy) < 500) { // 猛禽检测距离
                    raptorStillNear = true;
                    break;
                }
            }
        }
        if (raptorStillNear) {
            // 猛禽仍在附近，继续下潜，延长下潜时间
            b.diveDuration += 3000; // 每次延长3秒
            b.diveStartTime = gameTime; // 重置计时起点
        } else {
            // 上浮
            b.isDiving = false;
            b.diving = false;

            // 计算新位置（距离原位置50~150）
            let angle = Math.random() * Math.PI * 2;
            let distance = 50 + Math.random() * 100;
            let newX = b.diveOriginalX + Math.cos(angle) * distance;
            let newY = b.diveOriginalY + Math.sin(angle) * distance;

            // 边界限制（石头区或芦苇区）
            if (stones.length) {
                const minX = Math.min(...stones.map(s => s.x - s.width/2)) + 10;
                const maxX = Math.max(...stones.map(s => s.x + s.width/2)) - 10;
                const minY = (reedZone.y + reedZone.height) - VISIBLE_HEIGHT + 5;
                const maxY = (reedZone.y + reedZone.height) - 5;
                newX = Math.max(minX, Math.min(maxX, newX));
                newY = Math.max(minY, Math.min(maxY, newY));
            } else {
                newX = Math.max(reedZone.x + 20, Math.min(reedZone.x + reedZone.width - 20, newX));
                newY = Math.max(reedZone.y + 10, Math.min(reedZone.y + reedZone.height - 10, newY));
            }

            b.x = newX;
            b.y = newY;

            // 设置冷却
            b.diveCooldown = 5000;
        }
    } else {
        // 下潜中，不参与任何移动，跳过后续所有组内逻辑
        continue;
    }
}
            }
        }

        // ========== 胖虎与鸳鸯互动逻辑（保持不变，但需注意跳过下潜中的小pt） ==========
        let panghu = null;
        let mandarin = null;
        for (let b of group.birds) {
            if (b.name === "胖虎") panghu = b;
            if (b.name === "鸳鸯♂") mandarin = b;
        }

        if (panghu && mandarin && panghu.state === 'patrolWalk' && mandarin.state === 'patrolWalk') {
            const dx = panghu.x - mandarin.x;
            const dy = panghu.y - mandarin.y;
            const distance = Math.hypot(dx, dy);
            const now = gameTime;

            // 初始化状态
            if (panghu.interactionState === undefined) panghu.interactionState = 'random';
            if (mandarin.interactionState === undefined) mandarin.interactionState = 'random';

            // 追逐冷却标志
            if (panghu.chaseCooldownUntil === undefined) panghu.chaseCooldownUntil = 0;
            if (mandarin.chaseCooldownUntil === undefined) mandarin.chaseCooldownUntil = 0;

            const inCooldown = now < panghu.chaseCooldownUntil || now < mandarin.chaseCooldownUntil;

            if (distance <= 300 && !inCooldown) {
                if (panghu.interactionState !== 'chase') {
                    panghu.interactionState = 'chase';
                    mandarin.interactionState = 'chase';

                    panghu.chaseStartTime = now;
                    mandarin.chaseStartTime = now;

                    const angleToMandarin = Math.atan2(mandarin.y - panghu.y, mandarin.x - panghu.x);
                    panghu.targetAngle = angleToMandarin;
                    mandarin.targetAngle = angleToMandarin + Math.PI;
                    panghu.lastDirectionChangeTime = now;
                    mandarin.lastDirectionChangeTime = now;

                    mandarin.directionChangeCount = 0;
                    mandarin.exhausted = false;

                    panghu.randomChangeTimer = 0;
                    mandarin.randomChangeTimer = 0;
                }
            } else if (distance >= 500) {
                if (panghu.interactionState !== 'random') {

// 尝试让一组鸭子进入游禽模式（改进版：独立目标点，间隔至少一只麻雀）
function tryEnterWaterfowlPatrolForGroup(groupId, fromLeft, customChance = null) {
    const group = birdGroupInfo[groupId];
    if (!group || !group.birds.length) return false;
    const sampleBird = group.birds[0];
    if (!sampleBird) return false;

    let prob = 0;
    if (customChance !== null) {
        prob = customChance;
    } else {
        // 优先使用鸟的类型属性
        const birdType = sampleBird.type;
        if (birdType.isWaterfowlCandidate) {
            prob = birdType.waterfowlChance || 0.5; // 默认50%
        } else {
            // 兼容旧逻辑（如果没有属性，则按名字判断）
            const birdName = sampleBird.name;
            if (birdName === "胖虎") prob = 0.9;
            else if (birdName === "赤麻鸭") prob = 0.8;
            else if (birdName === "绿头鸭") prob = 0.6;
            else if (birdName === "醋鸭" || birdName === "醋鸭♀") prob = 0.3;
            else return false;
        }
    }

    // 概率判断
    if (Math.random() > prob) return false;
    if (!stones.length) return false;
    
    console.log(`[游禽] 触发！${birdName} 组将进入游禽模式，共 ${group.birds.length} 只，方向 ${fromLeft ? '左侧' : '右侧'}`);
    
    // 石头区域范围
    const stoneAreaX = stones.reduce((sum, s) => sum + s.x, 0) / stones.length;
    const groundY = reedZone.y + reedZone.height;
    const targetBaseY = groundY - VISIBLE_HEIGHT / 2;
    const targetAreaHalf = 100; // 目标点可偏移范围
    
    // 为每只鸟生成独立目标点，且彼此间隔至少20像素
    let targets = [];
    const minDist = SPARROW_SIZE; // 一只麻雀的距离
    for (let b of group.birds) {
        let attempts = 0;
        let newX, valid;
        do {
            valid = true;
            newX = stoneAreaX + (Math.random() - 0.5) * targetAreaHalf * 2;
            for (let t of targets) {
                if (Math.abs(newX - t.x) < minDist) {
                    valid = false;
                    break;
                }
            }
            attempts++;
            if (attempts > 50) break; // 避免无限循环
        } while (!valid);
        targets.push({ x: newX, y: targetBaseY + (Math.random() - 0.5) * 15 });
    }
    
    // 设置每只鸟的飞行路径
    for (let idx = 0; idx < group.birds.length; idx++) {
        const b = group.birds[idx];
        b.targetX = targets[idx].x;
        b.targetY = targets[idx].y;
        b.state = 'flyingToStone';
        b.speed = 1.5;                  // 飞向石头区域的速度
        b.landingProgress = 0;
        b.landingStartTime = 0;
    }
    
    // 记录游禽组（移动阶段将在降落完成后开启）
    waterfowlPatrolGroups.push({
        groupId: groupId,
        birds: group.birds,
        direction: fromLeft ? 1 : -1,
        moveDistance: WATERFOWL_MOVE_DIST_MIN + Math.random() * (WATERFOWL_MOVE_DIST_MAX - WATERFOWL_MOVE_DIST_MIN),
        moveRemaining: WATERFOWL_MOVE_DIST_MIN + Math.random() * (WATERFOWL_MOVE_DIST_MAX - WATERFOWL_MOVE_DIST_MIN),
        phase: 0,
        sideFrom: fromLeft ? 'left' : 'right',
        phaseCounter: 0,
        isMoving: false   // 初始未开始移动
    });
    return true;
}

// 稀有鸟类列表（从BIRD_TYPES中提取）
const RARE_BIRD_TYPES = ['KENTISH_PLOVER', 'MINIVET', 'GOLDCREST', 'OWL', 'LITTLEGREBE', 
                         'LONGTAILED_FINCH', 'ROBIN', 'RED_HEADED', 'PEREGRINE', 'KINGFISHER',

// MODIFIED: 辅助函数，用于统计时合并醋鸭♀到醋鸭
function getMergedBirdName(originalName) {
    return originalName === "醋鸭♀" ? "醋鸭" : originalName;
}

function initSaveData() {
    if (typeof Storage !== 'undefined') {
        const saved = localStorage.getItem('birding_simulator_save');
        if (saved) {
            try {
                gameSave = JSON.parse(saved);
                
                // ===== 清除 2026-03-26 之前的旧存档 =====
                const OLD_SAVE_THRESHOLD = new Date('2026-03-26T00:00:00').getTime();
                const shouldClear = !gameSave.gameStartTime || gameSave.gameStartTime < OLD_SAVE_THRESHOLD;
                if (shouldClear) {
                    console.log('检测到旧存档（早于 2026-03-26），自动清除并初始化新存档');
                    localStorage.removeItem('birding_simulator_save');
                    createNewSave();          // 创建全新存档，内部会重新保存
                    return;                  // 直接返回，避免继续使用旧数据
                }
                // ===== 清除逻辑结束 =====
                
                // 确保存档数据格式正确
                if (!gameSave.appearedBirdSpecies) gameSave.appearedBirdSpecies = {};
                if (!gameSave.capturedBirdSpecies) gameSave.capturedBirdSpecies = {};
                if (!gameSave.totalBirdingTime) gameSave.totalBirdingTime = 0;
                if (!gameSave.beastPhotos) gameSave.beastPhotos = {};
                if (!gameSave.astroPhotos) gameSave.astroPhotos = {};
                if (!gameSave.rareBirdPhotos) gameSave.rareBirdPhotos = {};
                if (!gameSave.achievements) gameSave.achievements = {};
                if (!gameSave.lastAchievementTime) gameSave.lastAchievementTime = 0;
                if (!gameSave.gameStartTime) gameSave.gameStartTime = Date.now();
                if (!gameSave.playerId) gameSave.playerId = "";
                
                // 清理存档中的重复数据
                cleanupSaveData();
                
                console.log("存档加载成功，已出现鸟种:", Object.keys(gameSave.appearedBirdSpecies).length, 
                            "已拍摄鸟种:", Object.keys(gameSave.capturedBirdSpecies).length);
            } catch (e) {
                console.log("存档损坏，创建新存档:", e);
                createNewSave();
            }
        } else {
            createNewSave();
        }
    } else {
        console.log("浏览器不支持本地存储，使用临时存档");
        createNewSave();
    }
}

// 清理存档中的重复数据
function cleanupSaveData() {
    console.log("清理存档数据...");
    
    // 确保鸟种数据是对象格式（不是数组）
    if (Array.isArray(gameSave.appearedBirdSpecies)) {
        const temp = {};
        gameSave.appearedBirdSpecies.forEach(birdName => {
            temp[birdName] = 1;
        });
        gameSave.appearedBirdSpecies = temp;
    }
    
    if (Array.isArray(gameSave.capturedBirdSpecies)) {
        const temp = {};
        gameSave.capturedBirdSpecies.forEach(birdName => {
            temp[birdName] = 1;
        });
        gameSave.capturedBirdSpecies = temp;
    }
    
    // 确保每个鸟种的值是数字（出现次数/拍摄次数）
    Object.keys(gameSave.appearedBirdSpecies).forEach(birdName => {
        if (typeof gameSave.appearedBirdSpecies[birdName] !== 'number') {
            gameSave.appearedBirdSpecies[birdName] = 1;
        }
    });
    
    Object.keys(gameSave.capturedBirdSpecies).forEach(birdName => {
        if (typeof gameSave.capturedBirdSpecies[birdName] !== 'number') {
            gameSave.capturedBirdSpecies[birdName] = 1;
        }
    });
    
    // MODIFIED: 合并醋鸭♀的统计数据到醋鸭
    if (gameSave.appearedBirdSpecies && gameSave.appearedBirdSpecies["醋鸭♀"]) {
        gameSave.appearedBirdSpecies["醋鸭"] = (gameSave.appearedBirdSpecies["醋鸭"] || 0) + gameSave.appearedBirdSpecies["醋鸭♀"];
        delete gameSave.appearedBirdSpecies["醋鸭♀"];
    }
    if (gameSave.capturedBirdSpecies && gameSave.capturedBirdSpecies["醋鸭♀"]) {
        gameSave.capturedBirdSpecies["醋鸭"] = (gameSave.capturedBirdSpecies["醋鸭"] || 0) + gameSave.capturedBirdSpecies["醋鸭♀"];
        delete gameSave.capturedBirdSpecies["醋鸭♀"];
    }
    
    // 移除成就中的空值
    Object.keys(gameSave.achievements).forEach(key => {
        if (!gameSave.achievements[key] || !gameSave.achievements[key].achieved) {
            delete gameSave.achievements[key];
        }
    });
    
    // 确保其他数据是对象格式
    if (!gameSave.beastPhotos || typeof gameSave.beastPhotos !== 'object') {
        gameSave.beastPhotos = {};
    }
    
    if (!gameSave.astroPhotos || typeof gameSave.astroPhotos !== 'object') {
        gameSave.astroPhotos = {};
    }
    
    if (!gameSave.rareBirdPhotos || typeof gameSave.rareBirdPhotos !== 'object') {
        gameSave.rareBirdPhotos = {};
    }
    
    console.log("存档清理完成");
    saveGameData();
}

// 更新出现鸟种（不重复计数）
function updateAppearedBird(birdName) {
    birdName = getMergedBirdName(birdName);
    // 更新全局记录（保留，但不用于成就）
    if (!gameSave.appearedBirdSpecies[birdName]) {
        gameSave.appearedBirdSpecies[birdName] = 1;
    } else {
        gameSave.appearedBirdSpecies[birdName]++;
    }

    // 观鸟模式会话记录
    if (birdingModeActive) {
        birdingSessionObserved.add(birdName);
        // 触发成就检查（基于会话）
        checkSessionAchievements();
    }

    saveGameData();
}

function updateCapturedBird(birdName) {
    birdName = getMergedBirdName(birdName);
    // 更新全局记录
    if (!gameSave.capturedBirdSpecies[birdName]) {
        gameSave.capturedBirdSpecies[birdName] = 1;
    } else {
        gameSave.capturedBirdSpecies[birdName]++;
    }

    // 观鸟模式会话记录
    if (birdingModeActive) {
        birdingSessionCaptured.add(birdName);
        checkSessionAchievements();

        // 如果是稀有鸟类，同样记录到会话稀有鸟类（如果需要）
        const birdKey = Object.keys(BIRD_TYPES).find(key => BIRD_TYPES[key].name === birdName);
        if (birdKey && RARE_BIRD_TYPES.includes(birdKey)) {
            if (!window.birdingSessionRare) window.birdingSessionRare = new Set();
            window.birdingSessionRare.add(birdName);
        }
    }

    saveGameData();
}
function checkSessionAchievements() {
    if (!birdingModeActive) return;

    const observedCount = birdingSessionObserved.size;
    const capturedCount = birdingSessionCaptured.size;
    const rareCount = window.birdingSessionRare ? window.birdingSessionRare.size : 0;

    // 收集类成就
    if (observedCount >= 10 && !gameSave.achievements.BIRD_COLLECT_10) unlockAchievement('BIRD_COLLECT_10');
    if (observedCount >= 20 && !gameSave.achievements.BIRD_COLLECT_20) unlockAchievement('BIRD_COLLECT_20');
    if (observedCount >= 30 && !gameSave.achievements.BIRD_COLLECT_30) unlockAchievement('BIRD_COLLECT_30');
    if (observedCount >= 40 && !gameSave.achievements.BIRD_COLLECT_40) unlockAchievement('BIRD_COLLECT_40');
    if (observedCount >= 50 && !gameSave.achievements.BIRD_COLLECT_50) unlockAchievement('BIRD_COLLECT_50');

    // 拍摄类成就
    if (capturedCount >= 10 && !gameSave.achievements.BIRD_PHOTO_10) unlockAchievement('BIRD_PHOTO_10');
    if (capturedCount >= 20 && !gameSave.achievements.BIRD_PHOTO_20) unlockAchievement('BIRD_PHOTO_20');
    if (capturedCount >= 30 && !gameSave.achievements.BIRD_PHOTO_30) unlockAchievement('BIRD_PHOTO_30');
    if (capturedCount >= 40 && !gameSave.achievements.BIRD_PHOTO_40) unlockAchievement('BIRD_PHOTO_40');
    if (capturedCount >= 50 && !gameSave.achievements.BIRD_PHOTO_50) unlockAchievement('BIRD_PHOTO_50');

    // 稀有鸟类成就
    if (rareCount >= 1 && !gameSave.achievements.RARE_BIRD_1) unlockAchievement('RARE_BIRD_1');
    if (rareCount >= 5 && !gameSave.achievements.RARE_BIRD_5) unlockAchievement('RARE_BIRD_5');
    if (rareCount >= 10 && !gameSave.achievements.RARE_BIRD_10) unlockAchievement('RARE_BIRD_10');

    // 注意：时间类成就（TIME_1H, TIME_5H, TIME_10H, SINGLE_60MIN）需要基于观鸟模式时长，将在观鸟模式结束时检查
}

        ACHIEVEMENTS[key].type === 'rare'
    );

// 解锁成就时，检查是否已经有更高级的成就
function unlockAchievement(achievementId) {
    const achievement = ACHIEVEMENTS[achievementId];
    if (!achievement) return;
    
    // 检查是否已经解锁了同一系列更高级的成就
    const sameSeries = Object.keys(gameSave.achievements)
        .filter(key => ACHIEVEMENTS[key] && ACHIEVEMENTS[key].series === achievement.series)
        .map(key => ({id: key, level: ACHIEVEMENTS[key].level}))
        .sort((a, b) => b.level - a.level);
    
    // 如果已有更高级成就，仍然解锁当前成就，但不删除低级成就
    // 这样存档中会保留所有解锁的成就
    
    // 解锁新成就
    gameSave.achievements[achievementId] = {
        achieved: true,
        timestamp: Date.now(),
        title: achievement.name
    };
    
    gameSave.lastAchievementTime = Date.now();
    
    // 显示成就解锁提示
    showAchievementAlert(achievement.name);
    
    saveGameData();
    updateAlbumStats();
}

function initFullscreenTouch() {
    const gameContainer = document.getElementById('gameContainer');
    
    // 触摸开始事件
    gameContainer.addEventListener('touchstart', function(e) {
        if (fullscreenLongPressTimer) {
            clearTimeout(fullscreenLongPressTimer);
        }
        
        fullscreenLongPressTimer = setTimeout(function() {
            toggleFullscreen();
        }, LONG_PRESS_DURATION);
    });
    
    // 触摸结束或移动时取消计时器
    gameContainer.addEventListener('touchend', function(e) {
        if (fullscreenLongPressTimer) {
            clearTimeout(fullscreenLongPressTimer);
            fullscreenLongPressTimer = null;
        }
    });
    
    gameContainer.addEventListener('touchmove', function(e) {
        if (fullscreenLongPressTimer) {
            clearTimeout(fullscreenLongPressTimer);
            fullscreenLongPressTimer = null;
        }
    });
    
    // 监听全屏变化事件
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);
}

function toggleFullscreen() {
    const gameContainer = document.getElementById('gameContainer');
    
    if (!isFullscreen) {
        // 进入全屏
        if (gameContainer.requestFullscreen) {
            gameContainer.requestFullscreen();
        } else if (gameContainer.webkitRequestFullscreen) {
            gameContainer.webkitRequestFullscreen();
        } else if (gameContainer.mozRequestFullScreen) {
            gameContainer.mozRequestFullScreen();
        } else if (gameContainer.msRequestFullscreen) {
            gameContainer.msRequestFullscreen();
        }
    } else {
        // 退出全屏
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    }
    
    // 显示提示
    showSpecialAlert(isFullscreen ? "已退出全屏" : "已进入全屏");
}

function handleFullscreenChange() {
    const isNowFullscreen = !!(document.fullscreenElement || 
                               document.webkitFullscreenElement || 
                               document.mozFullScreenElement || 
                               document.msFullscreenElement);
    
    isFullscreen = isNowFullscreen;
    
    // 全屏时调整一些UI元素
    if (isFullscreen) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = 'auto';
    }
    
    // 重新调整画布大小
    setTimeout(resizeCanvas, 100);
    
    // 如果营地可见，更新其位置
    if (gameMode === 'normal' && !isDaytime) {
        setTimeout(updateCampsiteVisibility, 150);
    }
}

function displayHelpContent(text) {
    const helpContent = document.getElementById('helpContent');

    let htmlContent = '<div class="help-title">观鸟模拟器 使用帮助</div>';

    const lines = text.split('\n');

    lines.forEach(line => {
        const trimmedLine = line.trim();
        
        if (trimmedLine === '') {
            return; // 跳过空行
        }

        if (trimmedLine.startsWith('# ')) {
            htmlContent += `<h2 style="color: #FFD700; margin: 20px 0 10px 0;">${trimmedLine.substring(2)}</h2>`;
        } else if (trimmedLine.startsWith('## ')) {

        } else if (trimmedLine.startsWith('  ')) {
            // 代码或键盘快捷键
            const keyMatch = trimmedLine.match(/`([^`]+)`/g);
            if (keyMatch) {
                let formattedLine = trimmedLine;
                keyMatch.forEach(match => {
                    const key = match.replace(/`/g, '');
                    formattedLine = formattedLine.replace(match, `<span class="help-key">${key}</span>`);

                htmlContent += `<p style="font-family: monospace; background-color: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 4px; margin: 5px 0;">${formattedLine}</p>`;
            } else {
                htmlContent += `<p>${trimmedLine}</p>`;

        } else {
            if (inSection) {

            htmlContent += `<p>${trimmedLine}</p>`;

function updateCampfirePosition() {
    const campsite = document.getElementById('campsite');
    if (!campsite || !canvas) {
        console.log("营地或画布未初始化");
        return;
    }
    
    const container = document.getElementById('gameContainer');
    const containerRect = container.getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();
    
    // 计算画布在容器内的相对位置
    const canvasInContainerLeft = canvasRect.left - containerRect.left;
    const canvasInContainerTop = canvasRect.top - containerRect.top;
    const canvasInContainerBottom = canvasInContainerTop + canvasRect.height;
    
    // 营地尺寸 - 注意：营地图片有透明边距
    const campsiteRect = campsite.getBoundingClientRect();
    const campsiteWidth = campsiteRect.width;
    const campsiteHeight = campsiteRect.height;
    
    // 计算营地底部应该对齐的位置
    // 注意：营地SVG/HTML元素可能有内部边距或透明区域
    // 在竖屏模式下，我们需要让营地"底部"紧贴画布底部
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    
    let campsiteTop;
    
    if (isPortrait) {
        // 竖屏模式：营地紧贴地面
        // 由于营地元素可能有内部布局，我们需要计算实际可视底部的位置
        const visualBottomOffset = 0; // 营地底部就是可视底部，不需要额外偏移
        
        campsiteTop = canvasInContainerBottom - campsiteHeight - visualBottomOffset;
        
        console.log("竖屏营地位置计算:", {
            canvasBottom: canvasInContainerBottom,
            campsiteHeight: campsiteHeight,
            visualBottomOffset: visualBottomOffset,
            calculatedTop: campsiteTop
        });
    } else {
        // 横屏模式：营地距离画布底部10像素
        campsiteTop = canvasInContainerBottom - campsiteHeight - 10;
    }
    
    // 营地水平居中
    const campsiteLeft = canvasInContainerLeft + (canvasRect.width / 2) - (campsiteWidth / 2);
    
    // 应用位置
    campsite.style.position = 'absolute';
    campsite.style.top = campsiteTop + 'px';
    campsite.style.left = campsiteLeft + 'px';
    campsite.style.bottom = 'auto';
    campsite.style.transform = 'none';
    
    // 调试信息
    console.log("营地位置更新:", {
        orientation: isPortrait ? "portrait" : "landscape",
        container: `${containerRect.width}x${containerRect.height}`,
        canvas: {
            left: canvasRect.left,
            top: canvasRect.top,
            width: canvasRect.width,
            height: canvasRect.height,
            inContainer: {
                left: canvasInContainerLeft,
                top: canvasInContainerTop,
                bottom: canvasInContainerBottom
            }
        },
        campsite: {
            width: campsiteWidth,
            height: campsiteHeight,
            left: campsiteLeft,
            top: campsiteTop
        }
    });
        // 确保营地不会捕获鼠标事件
    campsite.style.pointerEvents = 'none';
}
    // 额外调试：检查营地元素的实际样式
    const computedStyle = window.getComputedStyle(campsite);
    console.log("营地计算样式:", {
        display: computedStyle.display,
        position: computedStyle.position,
        top: computedStyle.top,
        left: computedStyle.left,
        bottom: computedStyle.bottom,
        transform: computedStyle.transform,
        width: computedStyle.width,
        height: computedStyle.height
    });

function updateCampsiteVisibility() {
    const campsite = document.getElementById('campsite');
    if (!campsite) return;
    
    if (gameMode === 'normal' && !isDaytime) {
        campsite.style.display = 'block';
        const flame = document.getElementById('campfire-flame');
        const hint = document.querySelector('#campsite > div > div:last-child');
        
        if (flame && hint) {
            if (isCampfireExtinguished) {
                flame.classList.add('extinguished');
                hint.textContent = "篝火已熄灭";
                hint.style.color = "#87CEEB";
                flame.style.pointerEvents = 'none'; // 篝火熄灭后不可点击
            } else {
                flame.classList.remove('extinguished');
                hint.textContent = "点击熄灭篝火";
                hint.style.color = "#FFD700";
                flame.style.pointerEvents = 'auto'; // 篝火未熄灭可点击
                flame.style.cursor = 'pointer';
            }
        }
        
        setTimeout(() => {
            updateCampfirePosition();
        }, 50);
    } else {
        campsite.style.display = 'none';
    }
}
// 新增：处理营地区域的点击事件
function handleCampsiteClick(e) {
    // 检查是否点击的是篝火元素
    const flame = document.getElementById('campfire-flame');
    if (flame && e.target === flame) {
        // 点击的是篝火，触发熄灭功能
        extinguishCampfire();
        e.stopPropagation(); // 阻止事件冒泡，避免触发拍照
        return;
    }
    // 检查是否点击的是篝火元素的子元素
    let target = e.target;
    while (target && target !== document) {
        if (target.id === 'campfire-flame') {
            extinguishCampfire();
            e.stopPropagation();
            return;
        }
        target = target.parentElement;
    }
    // 点击的是营地其他区域，不执行任何操作，让事件继续冒泡
    // 这样相机点击功能可以正常工作
}

function extinguishCampfire() {
    if (gameMode !== 'normal' || isDaytime || isCampfireExtinguished) return;
    
    isCampfireExtinguished = true;
    isNightAccelerated = true;
    
    const flame = document.getElementById('campfire-flame');
    if (flame) {
        flame.classList.add('extinguished');
        flame.style.pointerEvents = 'none'; // 熄灭后不可点击
    }
    
    const hint = document.querySelector('#campsite > div > div:last-child');
    if (hint) {
        hint.textContent = "篝火已熄灭";
        hint.style.color = "#87CEEB";
    }
    
    showSpecialAlert("篝火熄灭，夜晚加速流逝...");
    checkNightAcceleration();
}

// 修改checkNightAcceleration函数
function checkNightAcceleration() {
    if (!isNightAccelerated) return;
    
    // 如果已经变为白天，停止加速
    if (isDaytime) {
        isNightAccelerated = false;
        // 注意：这里不要重置isCampfireExtinguished，让它保持直到第二天夜晚
        return;
    }
    
    // 继续检查
    setTimeout(checkNightAcceleration, 1000);
}

function resetCampsite() {
  isNightAccelerated = false;
  isCampfireExtinguished = false;
  
  const flame = document.getElementById('campfire-flame');
  if (flame) {
    flame.classList.remove('extinguished');
  }
  
  const hint = document.querySelector('#campsite > div > div:last-child');
  if (hint) {
    hint.textContent = "点击熄灭篝火";
    hint.style.color = "#FFD700";
  }
  
  showSpecialAlert("黎明到来，恢复正常时间流速");
  updateCampsiteVisibility();
}
    
function updateDayNight(deltaTime) {
    if (gamePaused) return;
    
    gameTime += deltaTime;
    
    // 应用时间加速（篝火熄灭时夜晚加速）
    let effectiveDeltaTime = deltaTime;
    if (isNightAccelerated && gameMode === 'normal' && !isDaytime) {
        effectiveDeltaTime = deltaTime * nightAccelerationMultiplier;
    }
    
    // ========== 普通模式：日夜循环 ==========
    if (gameMode === 'normal') {
        dayNightTimer += effectiveDeltaTime;
        
        if (dayNightTimer >= DAY_NIGHT_CYCLE_DURATION) {
            isDaytime = !isDaytime;
            dayNightTimer = 0;
            
            if (isDaytime) {
                isNightAccelerated = false;
                showSpecialAlert("黎明到来");
            } else {
                isCampfireExtinguished = false;
                isNightAccelerated = false;
                moonPhaseTimer = Math.random() * MOON_PHASE_CYCLE;
                showSpecialAlert("夜幕降临，篝火重新点燃");
                updateCampsiteVisibility();
            }
            
            updateModeToggleButtons();
            updateCampsiteVisibility();
            
            // 清理不符合当前时间的生物
            if (!isDaytime) {
                for (let i = birds.length - 1; i >= 0; i--) {
                    if (!birds[i].isOwl && !birds[i].isBat && birds[i].name !== "小鸮" && birds[i].name !== "夜鹭") {
                        birds.splice(i, 1);
                    }
                }
                nightObjects = [];
            } else {
                for (let i = birds.length - 1; i >= 0; i--) {
                    if (birds[i].isOwl || birds[i].isBat) {
                        birds.splice(i, 1);
                    }
                }
                if (littleOwl) {
                    birds.splice(birds.indexOf(littleOwl), 1);
                    littleOwl = null;
                }
                nightObjects = [];
            }
        }
        
        moonPhaseTimer += deltaTime;
        if (moonPhaseTimer >= MOON_PHASE_CYCLE) {
            moonPhaseTimer = 0;
        }
        
        updateGoldenFilter();
        sunMoonPosition = dayNightTimer / DAY_NIGHT_CYCLE_DURATION;
    } 
    // ========== 永久日间模式 ==========
    else if (gameMode === 'day') {
        dayModeTimeState += deltaTime;
        dayNightTimer = dayModeTimeState;
        isCampfireExtinguished = false;
        isNightAccelerated = false;
        const goldenFilter = document.getElementById('goldenFilter');
        goldenFilter.style.backgroundColor = 'rgba(255, 215, 0, 0.1)';
        updateCampsiteVisibility();
    } 
    // ========== 永久夜间模式 ==========
    else if (gameMode === 'night') {
        nightModeTimeState += deltaTime;
        nightModeMoonPhaseTimer += deltaTime;
        dayNightTimer = nightModeTimeState;
        moonPhaseTimer = nightModeMoonPhaseTimer;
        if (moonPhaseTimer >= MOON_PHASE_CYCLE) {
            moonPhaseTimer = 0;
            nightModeMoonPhaseTimer = 0;
        }
        isCampfireExtinguished = false;
        isNightAccelerated = false;
        const goldenFilter = document.getElementById('goldenFilter');
        goldenFilter.style.backgroundColor = 'rgba(255, 215, 0, 0)';
        updateCampsiteVisibility();
    }
    
    updateTimeIndicator();
    
    // ========== 稀有鸟类生成 ==========
    let rareBirdDelta = deltaTime;
    lastRareBirdTime += rareBirdDelta;
    if (gameTime - lastRareBirdTime >= RARE_BIRD_INTERVAL && !birdingModeActive) {
        generateRareBird();
        lastRareBirdTime = gameTime;
    }
    
    // ========== 夜间猫头鹰生成 ==========
    if ((gameMode === 'night' || (gameMode === 'normal' && !isDaytime))) {
        let actualTimePassed = deltaTime;
        lastOwlSpawnTime += actualTimePassed;
        if (gameTime - lastOwlSpawnTime > NIGHT_OWL_SPAWN_INTERVAL) {
            spawnNightOwls();
            lastOwlSpawnTime = gameTime;
        }
    }
    
    // ========== 小鸮生成逻辑（基于时间段概率） ==========
    if (!littleOwl) {
        // 确定当前时间段
        let isGolden = (gameMode === 'normal' && isDaytime && isGoldenFilterActive);
        let isDaytimeWithoutGolden = (gameMode === 'normal' && isDaytime && !isGoldenFilterActive);
        let isNight = (gameMode === 'normal' && !isDaytime) || gameMode === 'night';
        if (gameMode === 'day') isDaytimeWithoutGolden = true;
        if (gameMode === 'night') isNight = true;

        const now = gameTime;
        const elapsed = now - lastLittleOwlCheckTime;
        let interval = Infinity;
        let probability = 0;

        if (isGolden) {
            interval = 5000;
            if (gameMode === 'normal' && isDaytime) {
                const dayDuration = DAY_NIGHT_CYCLE_DURATION;
                const oneMinute = 60000;
                if (dayNightTimer < oneMinute) {
                    probability = 0.01;      // 清晨 1%
                } else if (dayNightTimer > dayDuration - oneMinute) {
                    probability = 0.015;     // 黄昏 1.5%
                } else {
                    probability = 0.005;
                }
            } else {
                probability = 0.01;
            }
        } else if (isDaytimeWithoutGolden) {
            interval = 25000;
            probability = 0.005;
        } else if (isNight) {
            interval = 15000;
            probability = 0.005;
        }

        if (littleOwlTestMode) {
            probability = 0.5;
        }

        if (elapsed >= interval) {
            lastLittleOwlCheckTime = now;
            if (Math.random() < probability) {
                generateLittleOwl(true);
            }
        }
    }
}

    requestCalibration = true;

function handleDeviceOrientation(event) {
    if (!gyroModeActive || gamePaused) return;

    const now = Date.now();
    if (now - lastGyroUpdate < 16) return;
    lastGyroUpdate = now;

    const beta = event.beta;
    const gamma = event.gamma;
    if (beta === null || gamma === null) return;

    if (!isGyroCalibrated) {
        calibrateGyro();
        return;
    }

    if (requestCalibration) {
        gyroCenterBeta = beta;
        gyroCenterGamma = gamma;
        requestCalibration = false;
        return;
    }

    const sensitivityFactor = gyroSensitivity / 10;
    let orientation = window.orientation || 0;
    if (screen.orientation && screen.orientation.angle) {
        orientation = screen.orientation.angle;
    }

    let xAngle = 0;
    let yAngle = 0;

    if (orientation === 90) {
        xAngle = beta - gyroCenterBeta;
        yAngle = -(gamma - gyroCenterGamma);
    } else if (orientation === -90 || orientation === 270) {
        xAngle = -(beta - gyroCenterBeta);
        yAngle = gamma - gyroCenterGamma;
    } else if (orientation === 180) {
        xAngle = -(gamma - gyroCenterGamma);
        yAngle = -(beta - gyroCenterBeta);
    } else {
        xAngle = gamma - gyroCenterGamma;
        yAngle = beta - gyroCenterBeta;
    }

    const maxTiltAngle = 30;
    const xMultiplier = (GAME_WIDTH / 2) / maxTiltAngle;
    const yMultiplier = (GAME_HEIGHT / 2) / maxTiltAngle;

    const limitedXAngle = Math.max(-60, Math.min(60, xAngle));
    const limitedYAngle = Math.max(-60, Math.min(60, yAngle));

    const targetX = GAME_WIDTH / 2 + (limitedXAngle * xMultiplier * sensitivityFactor);
    const targetY = GAME_HEIGHT / 2 + (limitedYAngle * yMultiplier * sensitivityFactor);

    // 提高响应速度（原阻尼系数0.2→0.4）
    gyroX = gyroX + (targetX - gyroX) * 0.4;
    gyroY = gyroY + (targetY - gyroY) * 0.4;

    mouseX = Math.max(0, Math.min(GAME_WIDTH, gyroX));
    mouseY = Math.max(0, Math.min(GAME_HEIGHT, gyroY));

    // 立即更新放大画布，避免帧延迟导致的拖影
    applyGyroZoomToCanvas();

    // 同时更新取景器（如果处于普通模式）
    if (!gyroZoomAnimating) {
        updateViewfinderFromGyro();
    }
}
function updateViewfinderFromGyro() {
    if (!gyroModeActive || gamePaused) return;

    const viewfinderSize = getViewfinderSize();
    
    const rect = canvas.getBoundingClientRect();
    const container = document.getElementById('gameContainer');
    const containerRect = container.getBoundingClientRect();
    
    // 计算画布的实际显示缩放比例
    const displayScaleX = rect.width / GAME_WIDTH;
    const displayScaleY = rect.height / GAME_HEIGHT;
    
    // 鼠标位置在屏幕上的坐标
    const screenX = mouseX * displayScaleX;
    const screenY = mouseY * displayScaleY;
    
    const canvasLeft = rect.left - containerRect.left;
    const canvasTop = rect.top - containerRect.top;
    
    // 取景器在屏幕上的显示尺寸
    const viewfinderDisplayWidth = viewfinderSize.width * displayScaleX;
    const viewfinderDisplayHeight = viewfinderSize.height * displayScaleY;
    
    viewfinder.style.display = 'block';
    viewfinder.style.width = viewfinderDisplayWidth + 'px';
    viewfinder.style.height = viewfinderDisplayHeight + 'px';
    viewfinder.style.left = (canvasLeft + screenX - viewfinderDisplayWidth / 2) + 'px';
    viewfinder.style.top = (canvasTop + screenY - viewfinderDisplayHeight / 2) + 'px';
}

function handleMouseMove(e) {
    if (gyroModeActive) return;
    
    const rect = canvas.getBoundingClientRect();
    
    // 计算从屏幕坐标到游戏逻辑坐标的转换
    const scaleX = GAME_WIDTH / rect.width;
    const scaleY = GAME_HEIGHT / rect.height;
    
    mouseX = (e.clientX - rect.left) * scaleX;
    mouseY = (e.clientY - rect.top) * scaleY;
    
    // 限制在游戏边界内
    mouseX = Math.max(0, Math.min(GAME_WIDTH, mouseX));
    mouseY = Math.max(0, Math.min(GAME_HEIGHT, mouseY));
    
    if (!gyroModeActive) {
        updateViewfinderFromMouse(e.clientX, e.clientY, rect);
    }
}

function updateGame(deltaTime) {
    if (gamePaused) return;
    if (document.hidden && !birdingModeActive) return; // 非观鸟模式且页面隐藏时停止更新

    updateDayNight(deltaTime);

    updatePoops(deltaTime);
    updateGroundObjects(deltaTime);

    updateClouds(deltaTime);

}
function updateClouds(deltaTime) {
    if (gamePaused) return;
    // 只在白天更新位置（夜间云彩不可见，但位置仍可更新，以免重置时跳变）
    for (let cloud of clouds) {
        cloud.x += cloud.speed * (deltaTime / 16); // 保持速度与帧率无关
        // 超出左边界则重置到右边界
        if (cloud.x + cloud.size < 0) {
            cloud.x = GAME_WIDTH + cloud.size;
            cloud.y = Math.random() * (GAME_HEIGHT * 0.3);
        }
        // 超出右边界则重置到左边界
        if (cloud.x - cloud.size > GAME_WIDTH) {
            cloud.x = -cloud.size;
            cloud.y = Math.random() * (GAME_HEIGHT * 0.3);
        }
    }
}

function getBirdsInView() {
  const viewBounds = {
    left: 0,
    right: GAME_WIDTH,
    top: 0,
    bottom: GAME_HEIGHT
  };
  
  const birdsInView = [];
  const countedGroups = new Set();
  
  birds.forEach(bird => {
    if (!bird.name || bird.isBat || bird.type?.isSpecial) return;
    
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    const birdRadius = birdSize / 2;
    
    const isInView = bird.x + birdRadius >= viewBounds.left &&
                    bird.x - birdRadius <= viewBounds.right &&
                    bird.y + birdRadius >= viewBounds.top &&
                    bird.y - birdRadius <= viewBounds.bottom;
    
    if (isInView) {
      birdsInView.push(bird);
      
      if (bird.groupId && birdGroupInfo[bird.groupId]) {
        if (!countedGroups.has(bird.groupId)) {
          countedGroups.add(bird.groupId);
        }
      }
    }
  });
  
  return birdsInView;
}

function countBirdsInView() {
  const birdsInView = getBirdsInView();
  const birdCounts = {};
  const countedGroups = new Set();
  
  birdsInView.forEach(bird => {
    const birdName = bird.name;
    if (!birdCounts[birdName]) {
      birdCounts[birdName] = 0;
    }
    
    if (bird.groupId && birdGroupInfo[bird.groupId]) {
      if (!countedGroups.has(bird.groupId)) {
        const group = birdGroupInfo[bird.groupId];
        if (group && group.birds) {
          let groupCount = 0;
          group.birds.forEach(groupBird => {
            if (groupBird && birds.includes(groupBird)) {
              const baseSize = 20;
              const groupBirdRadius = baseSize * groupBird.size / 2;
              const isGroupBirdInView = groupBird.x + groupBirdRadius >= 0 &&
                                        groupBird.x - groupBirdRadius <= GAME_WIDTH &&
                                        groupBird.y + groupBirdRadius >= 0 &&
                                        groupBird.y - groupBirdRadius <= GAME_HEIGHT;
              if (isGroupBirdInView) {
                groupCount++;
              }
            }
          });
          birdCounts[birdName] += groupCount;
          countedGroups.add(bird.groupId);
        }
      }
    } else {
      birdCounts[birdName]++;
    }
  });
  
  return birdCounts;
}

// 处理滚轮事件
function handleRecordWheel(event) {
  if (isNavigatingRecords) return;
  
  const now = Date.now();
  if (now - lastWheelTime < WHEEL_COOLDOWN) return;
  
  event.preventDefault();
  
  // 判断滚轮方向
  if (event.deltaY > 0) {
    // 向下滚动，切换到下一条记录
    switchBirdingRecord(1);
  } else if (event.deltaY < 0) {
    // 向上滚动，切换到上一条记录
    switchBirdingRecord(-1);
  }
  
  lastWheelTime = now;
}

// 处理触摸开始事件
function handleRecordTouchStart(event) {
  if (event.touches.length === 1) {
    touchStartY = event.touches[0].clientY;
    touchStartX = event.touches[0].clientX;
  }
}

// 处理触摸移动事件
function handleRecordTouchMove(event) {
  if (isNavigatingRecords || event.touches.length !== 1) return;
  
  event.preventDefault();
  
  const touchY = event.touches[0].clientY;
  const touchX = event.touches[0].clientX;
  
  // 计算垂直滑动距离
  const deltaY = touchY - touchStartY;
  const deltaX = touchX - touchStartX;
  
  // 如果是垂直滑动且距离足够大，则切换记录
  if (Math.abs(deltaY) > 50 && Math.abs(deltaY) > Math.abs(deltaX)) {
    if (deltaY > 0) {
      // 向下滑动，切换到上一条记录
      switchBirdingRecord(-1);
    } else {
      // 向上滑动，切换到下一条记录
      switchBirdingRecord(1);
    }
    
    // 重置触摸起点
    touchStartY = touchY;
    touchStartX = touchX;
  }
}

// 处理触摸结束事件
function handleRecordTouchEnd() {
  touchStartY = 0;
  touchStartX = 0;
}

      const leafY = tree.y + Math.random() * tree.height * 0.8;

      const leafType = Math.floor(Math.random() * 3);

        size: leafSize,

        rotation: Math.random() * Math.PI * 2,

    }

function easeInOutQuad(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function setGameMode(mode) {
  if (gameMode === mode) return;
  const oldMode = gameMode;
  gameMode = mode;
    // 重置篝火状态
    isCampfireExtinguished = false;
    isNightAccelerated = false;
        // 重置营地状态
        resetCampsite();
  
  if (mode === 'day') {
    if (oldMode === 'normal') {
      normalModeTimeState = {
        isDaytime: isDaytime,
        dayNightTimer: dayNightTimer,
        moonPhaseTimer: moonPhaseTimer
      };
    }
    
    isDaytime = true;
    dayNightTimer = dayModeTimeState;
    
    showSpecialAlert("切换到永久日间模式");
    
    for (let i = birds.length - 1; i >= 0; i--) {
      if (birds[i].isOwl || birds[i].isBat) {
        birds.splice(i, 1);
      }
    }
    
    if (littleOwl) {
      birds.splice(birds.indexOf(littleOwl), 1);
      littleOwl = null;
    }
    
    nightObjects = [];
  } else if (mode === 'night') {
    if (oldMode === 'normal') {
      normalModeTimeState = {
        isDaytime: isDaytime,
        dayNightTimer: dayNightTimer,
        moonPhaseTimer: moonPhaseTimer
      };
    }
    
    isDaytime = false;
    dayNightTimer = nightModeTimeState;
    moonPhaseTimer = nightModeMoonPhaseTimer || Math.random() * MOON_PHASE_CYCLE;
    
    showSpecialAlert("切换到永久夜间模式");
    
    for (let i = birds.length - 1; i >= 0; i--) {
      if (!birds[i].isOwl && !birds[i].isBat && birds[i].name !== "小鸮" && birds[i].name !== "夜鹭") {
        birds.splice(i, 1);
      }
    }
    
    nightObjects = [];
  } else if (mode === 'normal') {
    if (oldMode === 'day') {
      dayModeTimeState = dayNightTimer;
      isDaytime = normalModeTimeState.isDaytime;
      dayNightTimer = normalModeTimeState.dayNightTimer;
      moonPhaseTimer = normalModeTimeState.moonPhaseTimer;
    } else if (oldMode === 'night') {
      nightModeTimeState = dayNightTimer;
      nightModeMoonPhaseTimer = moonPhaseTimer;
      isDaytime = normalModeTimeState.isDaytime;
      dayNightTimer = normalModeTimeState.dayNightTimer;
      moonPhaseTimer = normalModeTimeState.moonPhaseTimer;
    } else {
      if (normalModeTimeState) {
        isDaytime = normalModeTimeState.isDaytime;
        dayNightTimer = normalModeTimeState.dayNightTimer;
        moonPhaseTimer = normalModeTimeState.moonPhaseTimer;
      } else {
        isDaytime = true;
        dayNightTimer = 0;
        moonPhaseTimer = 0;
      }
    }
    
    showSpecialAlert("切换到普通模式");
    
    if (oldMode === 'night') {
      for (let i = birds.length - 1; i >= 0; i--) {
        if (birds[i].isOwl || birds[i].isBat) {
          birds.splice(i, 1);
        }
      }
      nightObjects = [];
    }
  }
        updateModeToggleButtons();
        updateCampsiteVisibility();
        updateTimeIndicator();
}

function captureBirdingRecord() {
    console.log("开始截图记录...");
    
    // 检查是否已设置玩家ID，如果没有则先提示输入
    if (!gameSave.playerId) {
        promptPlayerId();
        return;
    }
    
    if (!currentBirdingRecord) {
        console.warn("没有当前观鸟记录");
        showSpecialAlert("请先打开观鸟记录！");
        return;
    }
    
    const screenshotButton = document.getElementById('screenshotButton');
    screenshotButton.disabled = true;
    screenshotButton.style.opacity = '0.5';
    screenshotButton.textContent = "生成中...";
    
    const originalNavigating = isNavigatingRecords;
    isNavigatingRecords = true;
    
    try {
        if (!gamePaused) {
            pauseGame();
        }
        
        const SCREENSHOT_WIDTH = 300;
        const lineHeight = 22;
        const record = currentBirdingRecord;
        const speciesCount = record.observedSpecies.length;
        
        // 计算高度
        const titleHeight = 50;
        const recordInfoHeight = 5 * lineHeight;
        const headerMargin = 35;
        const footerHeight = 30;
        const achievementAreaHeight = 60;
        const bottomMargin = 20;
        const playerIdHeight = 0; // 不再单独显示一行
        
        // 计算物种列表所需高度
        const itemsPerColumn = 20;
        const columnCount = Math.ceil(speciesCount / itemsPerColumn);
        const maxColumns = 3;
        const actualColumnCount = Math.min(columnCount, maxColumns);
        const speciesListHeight = Math.min(speciesCount, itemsPerColumn * actualColumnCount) * lineHeight;
        
        const baseHeight = titleHeight + recordInfoHeight + headerMargin + footerHeight + 
                          achievementAreaHeight + bottomMargin + playerIdHeight;
        const dynamicHeight = baseHeight + speciesListHeight;
        
        const MIN_SCREENSHOT_HEIGHT = 800;
        const MAX_SCREENSHOT_HEIGHT = 2000;
        const SCREENSHOT_HEIGHT = Math.max(MIN_SCREENSHOT_HEIGHT, Math.min(MAX_SCREENSHOT_HEIGHT, dynamicHeight * 0.75));
        
        screenshotCanvas.width = SCREENSHOT_WIDTH;
        screenshotCanvas.height = SCREENSHOT_HEIGHT;
        screenshotCtx.clearRect(0, 0, SCREENSHOT_WIDTH, SCREENSHOT_HEIGHT);
        
        // 背景渐变
        const gradient = screenshotCtx.createLinearGradient(0, 0, 0, SCREENSHOT_HEIGHT);
        gradient.addColorStop(0, '#16213e');
        gradient.addColorStop(1, '#0f3460');
        screenshotCtx.fillStyle = gradient;
        screenshotCtx.fillRect(0, 0, SCREENSHOT_WIDTH, SCREENSHOT_HEIGHT);
        
        // 标题 - 改为"ID的观鸟记录"
        screenshotCtx.fillStyle = '#FFD700';
        screenshotCtx.font = 'bold 24px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
        screenshotCtx.textAlign = 'center';
        const titleText = gameSave.playerId ? `${gameSave.playerId}的观鸟记录` : '观鸟记录';
        screenshotCtx.fillText(titleText, SCREENSHOT_WIDTH / 2, 40);
        
        screenshotCtx.strokeStyle = '#87CEEB';
        screenshotCtx.lineWidth = 2;
        screenshotCtx.beginPath();
        screenshotCtx.moveTo(50, 55);
        screenshotCtx.lineTo(SCREENSHOT_WIDTH - 50, 55);
        screenshotCtx.stroke();
        
        const startY = 85;
        const availableHeight = SCREENSHOT_HEIGHT - startY - footerHeight - 10;
        
        // 绘制记录信息和鸟类列表，传递截图宽度和高度作为参数
        let contentBottom = drawRecordInfoSingleColumn(
            record, 
            startY, 
            lineHeight, 
            SCREENSHOT_WIDTH - 40, 
            availableHeight, 
            SCREENSHOT_WIDTH, 
            SCREENSHOT_HEIGHT
        );
        
        // 获取最近成就（同一系列只显示最高级）
        const recentAchievements = getRecentAchievementsForScreenshot(3);
        
        // 在底部绘制成就（红褐色字体）
        if (recentAchievements.length > 0) {
            const achievementY = SCREENSHOT_HEIGHT - footerHeight - 25;
            
            screenshotCtx.fillStyle = '#8B4513'; // 红褐色
            screenshotCtx.font = 'bold 16px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
            screenshotCtx.textAlign = 'center';
            
            // 绘制成就，从下往上排列
            let currentY = achievementY;
            for (let i = 0; i < Math.min(recentAchievements.length, 3); i++) {
                const achievement = recentAchievements[i];
                screenshotCtx.fillText(achievement.name, SCREENSHOT_WIDTH / 2, currentY);
                currentY -= lineHeight * 1.2;
            }
        }
        
        // 底部网址
        screenshotCtx.fillStyle = '#FFD700';
        screenshotCtx.font = 'bold 14px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
        screenshotCtx.textAlign = 'center';
        const bottomText = 'https://goseplover.github.io/12000h/';
        screenshotCtx.fillText(bottomText, SCREENSHOT_WIDTH / 2, SCREENSHOT_HEIGHT - 15);
        
        currentScreenshotDataURL = screenshotCanvas.toDataURL('image/png');
        console.log("截图生成完成，数据URL长度:", currentScreenshotDataURL.length);
        
        setTimeout(() => {
            showScreenshotPreview();
            screenshotButton.disabled = false;
            screenshotButton.style.opacity = '1';
            screenshotButton.textContent = "📸 截图记录";
            isNavigatingRecords = originalNavigating;
        }, 100);
        
    } catch (error) {
        console.error("截图绘制过程中出错:", error);
        showSpecialAlert("截图绘制失败");
        screenshotButton.disabled = false;
        screenshotButton.style.opacity = '1';
        screenshotButton.textContent = "📸 截图记录";
        isNavigatingRecords = originalNavigating;
        resumeGame();
    }
}

        }
    });

function drawRecordInfoSingleColumn(record, startY, lineHeight, columnWidth, maxHeight, screenshotWidth, screenshotHeight) {
    let y = startY;
    const x = 20;
    
    // 删除之前的"观鸟者: ID"行
    
    // 记录基本信息
    screenshotCtx.fillStyle = '#FFFFFF';
    screenshotCtx.font = '16px "AlimamaShuHeiTi-Bold.ttf", Arial, sans-serif';
    screenshotCtx.textAlign = 'left';
    
    screenshotCtx.fillText(`记录编号: #${record.id}`, x, y);
    y += lineHeight;
    
    const durationText = `观鸟时长: ${Math.floor(record.birdingModeDuration / 60000)}分${Math.floor((record.birdingModeDuration % 60000) / 1000)}秒`;
    screenshotCtx.fillText(durationText, x, y);
    y += lineHeight;
    
    screenshotCtx.fillText(`时间: ${record.startedAtDaytime ? "白天" : "黑夜"} → ${record.endedAtDaytime ? "白天" : "黑夜"}`, x, y);
    y += lineHeight;
    
    screenshotCtx.fillText(`观察鸟种: ${record.totalObservedSpecies} 种`, x, y);
    y += lineHeight;
    
    screenshotCtx.fillText(`拍摄鸟种: ${record.capturedInSession || 0} 种`, x, y);
    y += lineHeight;
    
    if (record.rarestBird) {
        screenshotCtx.fillStyle = '#FFD700';
        screenshotCtx.fillText(`最稀有: ${record.rarestBird}`, x, y);
        screenshotCtx.fillStyle = '#FFFFFF';
        y += lineHeight;
    }
    
    y += lineHeight;
    
    // 观察到的鸟种标题
    screenshotCtx.fillStyle = '#87CEEB';
    screenshotCtx.fillText('观察到的鸟种:', x, y);
    y += lineHeight;
    
    screenshotCtx.strokeStyle = '#87CEEB';
    screenshotCtx.lineWidth = 1;
    screenshotCtx.beginPath();
    screenshotCtx.moveTo(x, y - 5);
    screenshotCtx.lineTo(x + 120, y - 5);
    screenshotCtx.stroke();
    
    y += 5;
    
    // 绘制鸟类列表，添加序号
    const sortedSpecies = [...record.observedSpecies].sort();
    const itemsPerColumn = 20;
    const columnCount = Math.ceil(sortedSpecies.length / itemsPerColumn);
    const maxColumns = 3;
    const actualColumnCount = Math.min(columnCount, maxColumns);
    const actualColumnWidth = (screenshotWidth - 40) / actualColumnCount;
    
    for (let col = 0; col < actualColumnCount; col++) {
        const columnX = x + col * actualColumnWidth;
        let columnY = y;
        
        for (let row = 0; row < itemsPerColumn; row++) {
            const index = col * itemsPerColumn + row;
            if (index >= sortedSpecies.length) break;
            
            const birdName = sortedSpecies[index];
            const birdKey = Object.keys(BIRD_TYPES).find(key => BIRD_TYPES[key].name === birdName);
            const isRare = birdKey && BIRD_TYPES[birdKey].probability < 0.02;
            const isRarest = birdName === record.rarestBird;
            
            // 序号部分
            const numberText = `${index + 1}. `;
            const numberWidth = screenshotCtx.measureText(numberText).width;
            
            screenshotCtx.fillStyle = '#87CEEB'; // 序号颜色
            screenshotCtx.font = '14px "AlimamaShuHeiTi-Bold.ttf"';
            screenshotCtx.fillText(numberText, columnX, columnY);
            
            // 鸟类名称部分
            if (isRarest) {
                screenshotCtx.fillStyle = '#FFD700';
                screenshotCtx.font = 'bold 14px "AlimamaShuHeiTi-Bold.ttf"';
                screenshotCtx.fillText(`${birdName} ★`, columnX + numberWidth, columnY);
                screenshotCtx.font = '14px "AlimamaShuHeiTi-Bold.ttf"';
            } else if (isRare) {
                screenshotCtx.fillStyle = '#FFA500';
                screenshotCtx.fillText(birdName, columnX + numberWidth, columnY);
            } else {
                screenshotCtx.fillStyle = '#FFFFFF';
                screenshotCtx.fillText(birdName, columnX + numberWidth, columnY);
            }
            columnY += lineHeight;
        }
    }
    
    return y + Math.min(sortedSpecies.length, itemsPerColumn * actualColumnCount) * lineHeight;
}

// 获取最近成就用于截图显示（同一系列只显示最高级）
function getRecentAchievementsForScreenshot(maxCount) {
    const now = Date.now();
    const twelveHours = 12 * 60 * 60 * 1000;
    
    // 获取所有已解锁的成就，按时间倒序
    const allAchievements = Object.keys(gameSave.achievements)
        .filter(key => gameSave.achievements[key].achieved)
        .map(key => ({
            id: key,
            ...ACHIEVEMENTS[key],
            ...gameSave.achievements[key]
        }))
        .sort((a, b) => b.timestamp - a.timestamp); // 按解锁时间倒序
    
    if (allAchievements.length === 0) return [];
    
    // 按系列分组，只保留每个系列的最高级成就（用于截图显示）
    const seriesMap = {};
    allAchievements.forEach(achievement => {
        const series = achievement.series;
        if (!seriesMap[series] || seriesMap[series].level < achievement.level) {
            seriesMap[series] = achievement;
        }
    });
    
    // 转换为数组并重新按时间排序
    const filteredAchievements = Object.values(seriesMap)
        .sort((a, b) => b.timestamp - a.timestamp);
    
    // 检查是否有12小时内的成就
    const recentAchievements = filteredAchievements.filter(a => now - a.timestamp <= twelveHours);
    
    if (recentAchievements.length === 0) {
        // 如果都没有12小时内的，随机选择几个
        return filteredAchievements
            .sort(() => Math.random() - 0.5)
            .slice(0, Math.min(maxCount, filteredAchievements.length));
    }
    
    return recentAchievements.slice(0, Math.min(maxCount, recentAchievements.length));
}

// 在屏幕方向变化时保存和恢复篝火状态
window.addEventListener('orientationchange', function() {
    // 保存当前篝火状态
    const wasExtinguished = isCampfireExtinguished;
    const wasAccelerated = isNightAccelerated;
    
    // 短暂延迟后恢复状态
    setTimeout(function() {
        // 重新获取营地元素
        const campsite = document.getElementById('campsite');
        const flame = document.getElementById('campfire-flame');
        const hint = document.querySelector('#campsite > div > div:last-child');
        
        if (campsite && flame && hint) {
            // 根据保存的状态恢复篝火
            if (wasExtinguished) {
                // 如果是熄灭状态
                flame.style.display = 'none';
                flame.style.opacity = '0';
                hint.textContent = "篝火已熄灭";
                hint.style.color = "#87CEEB";
                
                // 确保加速状态也恢复
                if (wasAccelerated) {
                    isNightAccelerated = true;
                }
            } else {
                // 如果是点燃状态
                flame.style.display = 'block';
                flame.style.opacity = '1';
                hint.textContent = "点击熄灭篝火";
                hint.style.color = "#FFD700";
            }
            
            // 更新营地可见性
            updateCampsiteVisibility();
        }
    }, 300); // 300ms延迟确保DOM已经更新
});

function restoreCampfireState() {
    const flame = document.getElementById('campfire-flame');
    const hint = document.querySelector('#campsite > div > div:last-child');
    
    if (flame && hint) {
        if (isCampfireExtinguished) {
            flame.style.display = 'none';
            flame.style.opacity = '0';
            hint.textContent = "篝火已熄灭";

}

function handleKeyDown(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    
    // 空格键：切换文本浏览器
    if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        toggleTextBrowser();
        return false;
    }
    
    // 数字键：特殊功能与冲突功能（全部不计入统计）
    if (e.key === '1') {
        generateTwelveThousandPlover(false);

function skipToNight() {

    const savedTimeState = {
        gameTime: gameTime,
        dayNightTimer: dayNightTimer,
        moonPhaseTimer: moonPhaseTimer
    };
    
    // 计算跳过的时间
    const timeToSkip = DAY_NIGHT_CYCLE_DURATION - dayNightTimer;
    
    // 直接切换到夜晚
    isDaytime = false;
    dayNightTimer = 0; // 重置为夜晚开始
    
    // 更新篝火状态
    isCampfireExtinguished = false;
    isNightAccelerated = false;
    
    // 清除白天的鸟类（除了夜间可以出现的）
    for (let i = birds.length - 1; i >= 0; i--) {
        const bird = birds[i];
        // 保留夜鹭、猫头鹰、蝙蝠等夜间鸟类
        const isNocturnal = bird.isOwl || bird.isBat || 
                           bird.name === "小鸮" || 
                           bird.name === "夜鹭" ||
                           bird.name === "雕鸮" ||
                           bird.name === "短耳鸮";
        
        if (!isNocturnal) {
            birds.splice(i, 1);
        }
    }
    
    // 清空白天物体
    nightObjects = [];
    
    // 生成一些夜间鸟类
    if (Math.random() < 0.3) {
        spawnNightOwls();
    }
    
    // 显示提示
    const skippedMinutes = Math.floor(timeToSkip / 60000);
    const skippedSeconds = Math.floor((timeToSkip % 60000) / 1000);
    showSpecialAlert(`跳过了 ${skippedMinutes}分${skippedSeconds}秒，已切换到夜晚`);
    
    // 更新UI
    updateModeToggleButtons();
    updateCampsiteVisibility();
    updateTimeIndicator();
    
    // 播放音效（可选）
    playTimeSkipSound();
    
    // 记录跳过操作（用于调试）
    console.log("跳过白天:", {
        skippedTime: timeToSkip,
        skippedMinutes,
        skippedSeconds,
        previousTimeState: savedTimeState,
        newTimeState: {
            isDaytime: isDaytime,
            dayNightTimer: dayNightTimer
        }
    });
}

function generateHeron(countStats = true) {
    ensureReedZone(); // 确保芦苇区存在（函数见后）
    const heronType = BIRD_TYPES.HERON;
    if (countStats) {
        appearedBirds[heronType.name] = (appearedBirds[heronType.name] || 0) + 1;
        updateTextStats();
        updateAppearedBird(heronType.name);
    }

    const fromLeft = Math.random() > 0.5;
    const groupId = nextGroupId++;
    birdGroupInfo[groupId] = { direction: fromLeft ? 1 : -1, birds: [] };

    let behaviorType = 'standOnTree'; // 默认树上站立
    if (reedZone) {
        const r = Math.random();
        if (r < 0.1) {
            behaviorType = 'fishDive';
        } else if (r < 0.3) {
            behaviorType = 'stonePatrol';
        } else if (r < 0.9) {
            behaviorType = 'reedStand';
        }
    }

    for (let i = 0; i < getRandomGroupSize(heronType); i++) {
        const startX = fromLeft ? -50 : GAME_WIDTH + 50;
        const startY = Math.random() * (GAME_HEIGHT * 0.6) + GAME_HEIGHT * 0.2;

        const bird = createCommonBird(
            heronType, startX, startY, fromLeft, heronType.behavior,
            heronType.stayTime,
            (1.6 + Math.random() * 0.8) * (heronType.speedMultiplier || 1),
            groupId
        );
        bird.longBeak = true;
        bird.beakReducedQuarter = true;
        bird.isNight = (gameMode === 'night' || (gameMode === 'normal' && !isDaytime));
        bird.noStats = !countStats;
        bird.behaviorOverride = behaviorType;

        // 根据行为类型初始化状态和额外属性
        switch (behaviorType) {
            case 'reedStand':
                if (reedZone) {
                    bird.state = 'flyingToReedGround';
                    bird.reedGroundTargetX = reedZone.x + Math.random() * reedZone.width;
                    bird.reedGroundTargetY = reedZone.y + reedZone.height - 5;
                    bird.standDuration = 10000 + Math.random() * 10000;
                    bird.standStartTime = 0;
                } else {
                    bird.state = 'flyingAway';
                    bird.speed = 1.5;
                    bird.direction = Math.random() > 0.5 ? 1 : -1;
                }
                break;
            case 'fishDive':
                if (reedZone) {
                    bird.state = 'flyingToReedTop';
                    bird.targetX = reedZone.x + Math.random() * reedZone.width;
                    bird.targetY = reedZone.y + reedZone.height * 0.5;
                    bird.perchDuration = 3000 + Math.random() * 2000;
                    bird.headAngle = 0;
                    bird.facingDirection = bird.direction;
                    bird.bodyFlipped = (bird.facingDirection === -1);
                    bird.hasCaughtFish = false;
                } else {
                    bird.state = 'flyingAway';
                    bird.speed = 1.5;
                    bird.direction = Math.random() > 0.5 ? 1 : -1;
                }
                break;
            case 'stonePatrol':
                bird.state = 'flyingToStone';
                bird.speed = 1.5;
                break;
            default: // standOnTree
                bird.state = 'flying';
                break;
        }

        birds.push(bird);
        birdGroupInfo[groupId].birds.push(bird);
    }

    if (behaviorType === 'stonePatrol') {
        const sampleBird = birdGroupInfo[groupId].birds[0];
        if (sampleBird) {
            tryEnterWaterfowlPatrolForGroup(groupId, sampleBird.x < GAME_WIDTH / 2, 1);
        }
    }
}

function generateShrike(countStats = true) {
    const shrikeType = BIRD_TYPES.SHRIKE;
    if (countStats) {
        appearedBirds[shrikeType.name] = (appearedBirds[shrikeType.name] || 0) + 1;
        updateTextStats();
        updateAppearedBird(shrikeType.name);
    }

    if (!deadTree) {
        console.warn("伯劳需要枯树，但枯树未初始化");
        return;
    }

    // 获取枯树顶部可用的停靠点
    let perchX, perchY;
    const treeTopY = deadTree.bottomY - deadTree.height;
    
    // 尝试从枯树分支点中获取合适位置
    let availablePoints = [];
    if (deadTree.branchPoints && deadTree.branchPoints.length > 0) {
        // 筛选出靠近顶部的分支点（y 坐标小于树顶 + 树高的 20%）
        const topThreshold = treeTopY + deadTree.height * 0.2;
        availablePoints = deadTree.branchPoints.filter(p => p.y <= topThreshold && p.depth >= 2);
        // 如果有多个，随机打乱
        availablePoints.sort(() => Math.random() - 0.5);
    }
    
    // 检查现有伯劳已占用的位置
    const existingShrikes = birds.filter(b => b.isShrike);
    const takenPoints = existingShrikes.map(s => ({ x: s.targetX, y: s.targetY }));
    
    // 从可用点中选择一个未被占用的
    let selectedPoint = null;
    for (let point of availablePoints) {
        const isTaken = takenPoints.some(t => Math.hypot(t.x - point.x, t.y - point.y) < 15);
        if (!isTaken) {
            selectedPoint = point;
            break;
        }
    }
    
    if (selectedPoint) {
        perchX = selectedPoint.x;
        perchY = selectedPoint.y;
    } else {
        // 没有合适分支点或都被占用，使用树顶加随机偏移
        const offsetX = (Math.random() - 0.5) * 40;
        const offsetY = (Math.random() - 0.5) * 15;
        perchX = deadTree.x + offsetX;
        perchY = treeTopY + offsetY;
        // 如果位置与其他伯劳太近，再微调
        let attempts = 0;
        while (takenPoints.some(t => Math.hypot(t.x - perchX, t.y - perchY) < 20) && attempts < 10) {
            perchX = deadTree.x + (Math.random() - 0.5) * 60;
            perchY = treeTopY + (Math.random() - 0.5) * 20;
            attempts++;
        }
    }

    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -50 : GAME_WIDTH + 50;
    const startY = perchY + (Math.random() * 100 - 50);

    const bird = {
        type: shrikeType,
        name: shrikeType.name,
        x: startX,
        y: startY,
        size: shrikeType.size,
        speed: 1.8 + Math.random() * 0.6,
        direction: fromLeft ? 1 : -1,
        state: 'flyingToTreeTop',
        stateTime: 0,
        targetX: perchX,
        targetY: perchY,
        stayDuration: 15000,
        hasInsect: false,
        insect: null,
        whiteEyeRing: shrikeType.whiteEyeRing || false,
        blackEyeRing: shrikeType.blackEyeRing || false,
        eyeColor: shrikeType.eyeColor,
        beakColor: shrikeType.beakColor,
        bodyColor: shrikeType.bodyColor,
        headColor: shrikeType.headColor,
        wingColor: shrikeType.wingColor,
        tailColor: shrikeType.tailColor,
        noStats: !countStats,
        isNight: !isDaytime,
        isShrike: true,
        isVulnerableToRaptors: shrikeType.isVulnerableToRaptors
    };

    birds.push(bird);

    if (birdingModeActive && !bird.noStats) {
        const birdId = `${bird.name}_${bird.x}_${bird.y}_${Date.now()}`;
        if (!birdingModeRecordedBirds.has(birdId)) {
            birdingModeRecordedBirds.add(birdId);
            birdingObservedSpecies.add(getMergedBirdName(bird.name));
            const appearedCountElement = document.getElementById('appearedCount');
            if (appearedCountElement) appearedCountElement.textContent = birdingObservedSpecies.size;
        }
    }
}

function generateMeteor(countStats = false, summoned = false, intersectionPoint = null, force = false) {
    const isNightMode = gameMode === 'night' || (gameMode === 'normal' && !isDaytime);
    if (!force && !isNightMode) {
        // 非强制且不是夜间模式，不生成
        return;
    }
    
    const meteorType = NIGHT_OBJECTS.METEOR;
    
    let startX, startY, angle;
    
    if (!summoned) {
        if (force) {
            // 手动强制生成：确保流星从屏幕外飞入可见区域
            startX = GAME_WIDTH + 50 + Math.random() * 100;
            startY = Math.random() * GAME_HEIGHT * 0.3;
            const targetX = -100 - Math.random() * 100;
            const targetY = GAME_HEIGHT * 0.8 + Math.random() * 100;
            angle = Math.atan2(targetY - startY, targetX - startX);
        } else {
            // 自然生成逻辑（保留原轨迹）
            const intersectionX = GAME_WIDTH * 0.5 + (Math.random() - 0.5) * GAME_WIDTH * 0.5;
            const intersectionY = -500 - Math.random() * 500;
            startX = intersectionX;
            startY = intersectionY;
            const targetX = -100 + Math.random() * (GAME_WIDTH + 200);
            const targetY = -100 + Math.random() * (GAME_HEIGHT * 0.55 + 100);
            angle = Math.atan2(targetY - startY, targetX - startX);
        }
        
        const meteor = {
            type: meteorType,
            name: meteorType.name,
            x: startX,
            y: startY,
            size: meteorType.size,
            speed: meteorType.speed,
            angle: angle,
            state: 'flying',
            createdAt: gameTime,
            duration: meteorType.duration,
            color: meteorType.color,
            trailLength: meteorType.trailLength,
            trailColor: meteorType.trailColor,
            summonProbability: meteorType.summonProbability,
            hasSummoned: false,
            summoned: summoned,
            isNightObject: true,
            intersectionPoint: intersectionPoint ? { x: intersectionPoint.x, y: intersectionPoint.y } : null,
            targetPoint: null
        };
        nightObjects.push(meteor);
        return meteor;
    } else {
        // 此为被召唤的次级流星（保留原逻辑）
        if (!intersectionPoint) {
            intersectionPoint = { x: -1800 + Math.random() * (GAME_WIDTH + 3600), y: -1800 + Math.random() * (GAME_HEIGHT * 0.55 + 1800) };
        }
        startX = intersectionPoint.x;
        startY = intersectionPoint.y;
        const targetX = -100 + Math.random() * (GAME_WIDTH + 200);
        const targetY = -100 + Math.random() * (GAME_HEIGHT * 0.55 + 100);
        angle = Math.atan2(targetY - startY, targetX - startX);
        const meteor = {
            type: meteorType,
            name: meteorType.name,
            x: startX,
            y: startY,
            size: meteorType.size,
            speed: meteorType.speed,
            angle: angle,
            state: 'flying',
            createdAt: gameTime,
            duration: meteorType.duration,
            color: meteorType.color,
            trailLength: meteorType.trailLength,
            trailColor: meteorType.trailColor,
            summonProbability: meteorType.summonProbability,
            hasSummoned: false,
            summoned: summoned,
            isNightObject: true,
            intersectionPoint: intersectionPoint,
            targetPoint: { x: targetX, y: targetY }
        };
        nightObjects.push(meteor);
        return meteor;
    }
