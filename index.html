function resizeCanvas() {
    const container = document.getElementById('gameContainer');
    const containerWidth = container.clientWidth;
    const containerHeight = container.clientHeight;
    
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    poopCanvas.width = GAME_WIDTH;
    poopCanvas.height = GAME_HEIGHT;
    
    const containerAspect = containerWidth / containerHeight;
    const gameAspect = GAME_WIDTH / GAME_HEIGHT;
    
    let displayWidth, displayHeight;
    if (containerAspect > gameAspect) {
        displayHeight = containerHeight;
        displayWidth = displayHeight * gameAspect;
    } else {
        displayWidth = containerWidth;
        displayHeight = displayWidth / gameAspect;
    }
    
    canvas.style.width = displayWidth + 'px';
    canvas.style.height = displayHeight + 'px';
    poopCanvas.style.width = displayWidth + 'px';
    poopCanvas.style.height = displayHeight + 'px';
    
    const left = (containerWidth - displayWidth) / 2;
    const top = (containerHeight - displayHeight) / 2;
    canvas.style.left = left + 'px';
    canvas.style.top = top + 'px';
    poopCanvas.style.left = left + 'px';
    poopCanvas.style.top = top + 'px';
    
    // ========== 新增：同步 zoomCanvas 的位置 ==========
    const zoomCanvas = document.getElementById('zoomCanvas');
    if (zoomCanvas) {
        zoomCanvas.style.width = displayWidth + 'px';
        zoomCanvas.style.height = displayHeight + 'px';
        zoomCanvas.style.left = left + 'px';
        zoomCanvas.style.top = top + 'px';
    }
    // ========== 同步结束 ==========
    
    console.log("画布重置，枯树状态:", deadTree ? "已存在" : "不存在");
    
    if (!reedZone) {
        initReeds();
    }
    
    if (gameMode === 'normal' && !isDaytime) {
        setTimeout(updateCampfirePosition, 100);
    }
}

function initDeadTree() {
  // 如果已经初始化，直接返回
  if (isDeadTreeInitialized && deadTree) {
    console.log("枯树已初始化，跳过");
    return;
  }
  
  if (!reedZone) {
    console.log("芦苇区域未初始化，延迟枯树初始化");
    setTimeout(initDeadTree, 100);
    return;
  }
  
  console.log("初始化枯树（只执行一次）");
  
  const deadTreeX = reedZone.x + reedZone.width / 3;
  const groundY = reedZone.y + reedZone.height;
  const deadTreeHeight = GAME_HEIGHT * 0.2;
  const deadTreeWidth = 10;
  
  // 分支角度模式（与之前相同）
  const branchPatterns = {};
  const branchAnglePatterns = {};
  
  // 生成7组分支模式（与之前相同）
  for (let i = 0; i < 7; i++) {
    const angle1 = (15 + Math.random() * 10) * Math.PI / 180;
    const angle2 = (40 + Math.random() * 10) * Math.PI / 180;
    const dir1 = Math.random() > 0.5 ? 1 : -1;
    
    branchPatterns[i] = { direction1: dir1, direction2: -dir1 };
    branchAnglePatterns[i] = { angle1: angle1, angle2: angle2 };
  }
  
  deadTree = {
    x: deadTreeX,
    bottomY: groundY,
    height: deadTreeHeight,
    width: deadTreeWidth,
    trunkColor: '#8B928B',
    branchColor: '#5D5B53',
    hasBranches: true,
    branchPatterns: branchPatterns,
    branchAnglePatterns: branchAnglePatterns,
    branchPoints: [] // 初始化为空数组
  };
  
  // 生成分支点
  generateDeadTreeBranchPoints();
  
  isDeadTreeInitialized = true;
  console.log("枯树初始化完成，分叉点数量:", deadTree.branchPoints ? deadTree.branchPoints.length : 0);
}

// 生成枯树的分叉点（只在初始化时调用一次）
function generateDeadTreeBranchPoints() {
  if (!deadTree) return;
  
  const tree = deadTree;
  const groundY = reedZone ? (reedZone.y + reedZone.height) : GAME_HEIGHT * 0.9;
  const trunkBottomY = groundY;
  
  // 清空之前的分叉点
  tree.branchPoints = [];
  
  // 递归生成树枝分叉点
  function generateBranchPoints(startX, startY, length, thickness, angle, depth, branchPattern, anglePatternIndex) {
    if (depth <= 0 || length < 3) return;
    
    // 计算树枝终点
    const endX = startX + Math.cos(angle) * length;
    const endY = startY + Math.sin(angle) * length;
    
    // 当前点是一个分叉点，记录它
    if (depth >= 2 && length > 5) { // 只记录足够长的分叉点
      tree.branchPoints.push({
        x: endX,
        y: endY,
        branchLength: length,
        depth: depth,
        angle: angle
      });
    }
    
    // 计算下一级分支的参数
    const nextLength = length * 0.65; // 每次递归长度减少35%
    const nextThickness = thickness * 0.6; // 每次递归粗细减少40%
    const nextDepth = depth - 1;
    
    if (nextDepth > 0 && nextLength > 3) {
      // 获取当前分叉的角度模式和方向模式
      const pattern = tree.branchPatterns[anglePatternIndex];
      const anglePair = tree.branchAnglePatterns[anglePatternIndex];
      
      if (pattern && anglePair) {
        // 第一个分支：小角度分支 (15-25度)
        const angle1 = angle + pattern.direction1 * anglePair.angle1;
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle1, nextDepth, branchPattern + "A", anglePatternIndex + 1);
        
        // 第二个分支：大角度分支 (40-50度)
        const angle2 = angle + pattern.direction2 * anglePair.angle2;
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle2, nextDepth, branchPattern + "B", anglePatternIndex + 1);
      } else {
        // 如果没有模式，使用默认角度
        const angle1 = angle + (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 10) * Math.PI / 180;
        const angle2 = angle + (Math.random() > 0.5 ? 1 : -1) * (40 + Math.random() * 10) * Math.PI / 180;
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle1, nextDepth, branchPattern + "A", anglePatternIndex + 1);
        generateBranchPoints(endX, endY, nextLength, nextThickness, angle2, nextDepth, branchPattern + "B", anglePatternIndex + 1);
      }
    } else {
      // 到达最小深度，记录为末端点
      if (depth >= 2 && length > 5) { // 只记录足够长的末端分支
        tree.branchPoints.push({
          x: endX,
          y: endY,
          branchLength: length,
          depth: depth,
          angle: angle,
          isEnd: true
        });
      }
    }
  }
  
  // 从树干开始生成分叉点
  generateBranchPoints(tree.x, trunkBottomY, tree.height * 0.8, tree.width, -Math.PI/2, 4, "", 0);
}

// 检查是否是同系列中的最高级成就
function isHighestAchievementInSeries(achievementId) {
    const achievement = ACHIEVEMENTS[achievementId];
    if (!achievement) return false;
    
    // 获取同系列的所有成就
    const seriesAchievements = Object.keys(ACHIEVEMENTS)
        .filter(key => ACHIEVEMENTS[key].series === achievement.series)
        .map(key => ({
            id: key,
            level: ACHIEVEMENTS[key].level,
            achieved: gameSave.achievements[key]?.achieved || false
        }));
    
    // 找到已解锁的最高级成就
    const highestUnlocked = seriesAchievements
        .filter(a => a.achieved)
        .sort((a, b) => b.level - a.level)[0];
    
    return highestUnlocked && highestUnlocked.id === achievementId;
}

// 获取系列名称
function getSeriesName(seriesKey) {
    const seriesNames = {
        'bird_collect': '鸟类收集',
        'bird_photo': '鸟类拍摄',
        'total_time': '观鸟时间',
        'single_time': '单次观鸟',
        'beast': '兽类',
        'astro_meteor': '天文-流星',
        'astro_ufo': '天文-UFO',
        'astro_comet': '天文-彗星',
        'rare_bird': '稀有鸟类'
    };
    return seriesNames[seriesKey] || seriesKey;
}

// 辅助函数：十六进制颜色转RGB
function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? 
        `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : 
        '255, 215, 0';
}

// 获取成就图标
function getAchievementIcon(achievementId) {
    const achievement = ACHIEVEMENTS[achievementId];
    if (!achievement) return '🏆';
    
    switch(achievement.type) {
        case 'collect': return '🐦';
        case 'photo': return '📷';
        case 'time': return '⏱️';
        case 'single': return '🎯';
        case 'beast': return '🦇';
        case 'astro': 
            if (achievementId.includes('METEOR')) return '☄️';
            if (achievementId.includes('UFO')) return '🛸';
            if (achievementId.includes('COMET')) return '🌠';
            return '⭐';
        case 'rare': return '🌟';
        default: return '🏆';
    }
}

function handleMouseClick() {
    if (isTakingPhoto) return;
    isTakingPhoto = true;
    
    const viewfinderSize = getViewfinderSize();
    const actualViewfinderWidth = viewfinderSize.width;
    const actualViewfinderHeight = viewfinderSize.height;
    
    // 取景器在游戏坐标系中的边界
    const viewfinderLeft = mouseX - actualViewfinderWidth / 2;
    const viewfinderTop = mouseY - actualViewfinderHeight / 2;
    const viewfinderRight = viewfinderLeft + actualViewfinderWidth;
    const viewfinderBottom = viewfinderTop + actualViewfinderHeight;
       
    // 确保拍照区域在画布范围内，避免黑边
    // 注意：createPhoto 内部会处理边界剪裁，但如果传入坐标完全在画布外，就会全黑
    // 我们主要保证 mouseX/Y 是正确的逻辑坐标即可
    
    const centerRegionWidth = actualViewfinderWidth * 0.7;
    const centerRegionHeight = actualViewfinderHeight * 0.7;
    const centerRegionLeft = mouseX - centerRegionWidth / 2;
    const centerRegionTop = mouseY - centerRegionHeight / 2;
    const centerRegionRight = centerRegionLeft + centerRegionWidth;
    const centerRegionBottom = centerRegionTop + centerRegionHeight;
    
    let capturedBird = null;
    let capturedNightObject = null;
    let maxSize = 0;
    
    for (const bird of birds) {
      if (bird.diving) continue;   // 跳过下潜中的鸟
        const baseSize = 20;
        const birdSize = baseSize * bird.size;
        let birdDisplayX = bird.x;
        
        const isInCenterRegion = birdDisplayX >= centerRegionLeft && birdDisplayX <= centerRegionRight &&
                                  bird.y >= centerRegionTop && bird.y <= centerRegionBottom;
        
        if (isInCenterRegion) {
            if (birdSize > maxSize) {
                maxSize = birdSize;
                capturedBird = bird;
                capturedNightObject = null;
            }
        }
    }
    
    for (const obj of nightObjects) {
        const baseSize = 20;
        const objSize = baseSize * obj.size;
        
        const isInCenterRegion = obj.x >= centerRegionLeft && obj.x <= centerRegionRight &&
                                  obj.y >= centerRegionTop && obj.y <= centerRegionBottom;
        
        if (isInCenterRegion) {
            if (objSize > maxSize) {
                maxSize = objSize;
                capturedBird = null;
                capturedNightObject = obj;
            }
        }
    }
    
    if (!capturedBird && !capturedNightObject) {
        let fallbackCapturedBird = null;
        let fallbackCapturedNightObject = null;
        let fallbackMaxSize = 0;
        
        for (const bird of birds) {
            const baseSize = 20;
            const birdSize = baseSize * bird.size;
            const birdRadius = birdSize / 2;
            let birdDisplayX = bird.x;
            
            const birdLeft = birdDisplayX - birdRadius;
            const birdRight = birdDisplayX + birdRadius;
            const birdTop = bird.y - birdRadius;
            const birdBottom = bird.y + birdRadius;
            
            const overlapX = birdRight >= viewfinderLeft && birdLeft <= viewfinderRight;
            const overlapY = birdBottom >= viewfinderTop && birdTop <= viewfinderBottom;
            const isInViewfinder = overlapX && overlapY;
            
            if (isInViewfinder) {
                if (birdSize > fallbackMaxSize) {
                    fallbackMaxSize = birdSize;
                    fallbackCapturedBird = bird;
                    fallbackCapturedNightObject = null;
                }
            }
        }
        
        for (const obj of nightObjects) {
            const baseSize = 20;
            const objSize = baseSize * obj.size;
            const objRadius = objSize / 2;
            
            const objLeft = obj.x - objRadius;
            const objRight = obj.x + objRadius;
            const objTop = obj.y - objRadius;
            const objBottom = obj.y + objRadius;
            
            const overlapX = objRight >= viewfinderLeft && objLeft <= viewfinderRight;
            const overlapY = objBottom >= viewfinderTop && objTop <= viewfinderBottom;
            const isInViewfinder = overlapX && overlapY;
            
            if (isInViewfinder) {
                if (objSize > fallbackMaxSize) {
                    fallbackMaxSize = objSize;
                    fallbackCapturedBird = null;
                    fallbackCapturedNightObject = obj;
                }
            }
        }
        
        capturedBird = fallbackCapturedBird;
        capturedNightObject = fallbackCapturedNightObject;
    }
    
    // 直接执行拍照逻辑，不再检查是否点击了营地
    createPhoto(viewfinderLeft, viewfinderTop, actualViewfinderWidth, actualViewfinderHeight, capturedBird, capturedNightObject);
    updateTextStats();
    playCameraSound();
    
    if (capturedBird) {
        showCaptureAlert(`拍摄到${capturedBird.name}！`);
    } else if (capturedNightObject) {
        showCaptureAlert(`拍摄到${capturedNightObject.name}！`);
    }
    
    setTimeout(() => {
        isTakingPhoto = false;
    }, 50);
}

function createPhoto(x, y, width, height, capturedBird, capturedNightObject) {
// 最终照片的固定尺寸（放大2倍）
    const finalWidth = viewfinderBaseWidth * 2;
    const finalHeight = viewfinderBaseHeight * 2;

    // 从主画布截取取景框区域（与原代码相同）
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width;
    tempCanvas.height = height;
    const tempCtx = tempCanvas.getContext('2d');

    let sourceX = Math.max(0, Math.min(x, GAME_WIDTH));
    let sourceY = Math.max(0, Math.min(y, GAME_HEIGHT));
    let drawX = 0, drawY = 0, drawWidth = width, drawHeight = height;

    if (x < 0) {
        drawX = -x;
        drawWidth = width + x;
    }
    if (y < 0) {
        drawY = -y;
        drawHeight = height + y;
    }
    if (x + width > GAME_WIDTH) {
        drawWidth = GAME_WIDTH - x;
    }
    if (y + height > GAME_HEIGHT) {
        drawHeight = GAME_HEIGHT - y;
    }

    sourceX = Math.max(0, sourceX);
    sourceY = Math.max(0, sourceY);
    drawWidth = Math.max(0, drawWidth);
    drawHeight = Math.max(0, drawHeight);

    if (drawWidth > 0 && drawHeight > 0) {
        tempCtx.drawImage(
            canvas,
            sourceX, sourceY, drawWidth, drawHeight,
            drawX, drawY, drawWidth, drawHeight
        );
    }

    // 应用金色滤镜（与原代码相同）
    const goldenFilter = document.getElementById('goldenFilter');
    const filterStyle = window.getComputedStyle(goldenFilter);
    const filterColor = filterStyle.backgroundColor;
    if (!gyroModeActive && filterColor && filterColor !== 'rgba(0,0,0,0)' && filterColor !== 'transparent') {
        tempCtx.fillStyle = filterColor;
        tempCtx.fillRect(0, 0, drawWidth, drawHeight);
    }
    
  // 高质量插值：对 800mm 和 1200mm 镜头应用超采样
const isHighQuality = (currentLens === '800' || currentLens === '1200');
let finalCanvas, finalCtx;
if (isHighQuality) {
    // 降低超采样倍数，800mm 用 1.5 倍，1200mm 用 2 倍
    let oversample = 1;
    if (currentLens === '800') oversample = 1.5;
    if (currentLens === '1200') oversample = 2;
    const interimWidth = finalWidth * oversample;
    const interimHeight = finalHeight * oversample;
    const interimCanvas = document.createElement('canvas');
    interimCanvas.width = interimWidth;
    interimCanvas.height = interimHeight;
    const interimCtx = interimCanvas.getContext('2d');
    interimCtx.imageSmoothingEnabled = true;
    interimCtx.imageSmoothingQuality = 'high';
    interimCtx.drawImage(tempCanvas, 0, 0, width, height, 0, 0, interimWidth, interimHeight);
    
    finalCanvas = document.createElement('canvas');
    finalCanvas.width = finalWidth;
    finalCanvas.height = finalHeight;
    finalCtx = finalCanvas.getContext('2d');
    finalCtx.imageSmoothingEnabled = true;
    finalCtx.imageSmoothingQuality = 'high';
    finalCtx.drawImage(interimCanvas, 0, 0, interimWidth, interimHeight, 0, 0, finalWidth, finalHeight);
} else {
    finalCanvas = document.createElement('canvas');
    finalCanvas.width = finalWidth;
    finalCanvas.height = finalHeight;
    finalCtx = finalCanvas.getContext('2d');
    finalCtx.imageSmoothingEnabled = true;
    finalCtx.imageSmoothingQuality = 'high';
    finalCtx.drawImage(tempCanvas, 0, 0, width, height, 0, 0, finalWidth, finalHeight);
}
   
// 添加边框和文字（文字大小固定，与原版一致）
    finalCtx.strokeStyle = 'rgba(255,255,255,0.8)';
    finalCtx.lineWidth = 2;
    finalCtx.strokeRect(0, 0, finalWidth, finalHeight);
    if (capturedBird) {
        finalCtx.fillStyle = '#FFFFFF';
        finalCtx.font = '12px Arial';
        finalCtx.fillText(capturedBird.name, 5, finalHeight - 5);
    } else if (capturedNightObject) {
        finalCtx.fillStyle = '#87CEEB';
        finalCtx.font = '12px Arial';
        finalCtx.fillText(capturedNightObject.name, 5, finalHeight - 5);
    }

    // 创建照片对象
    const photo = {
        id: photos.length,
        x: x,
        y: y,
        width: width,
        height: height,
        lens: currentLens,
        time: gameTime,
        bird: capturedBird ? capturedBird.name : null,
        birdType: capturedBird ? capturedBird.type : null,
        nightObject: capturedNightObject ? capturedNightObject.name : null,
        nightObjectType: capturedNightObject ? capturedNightObject.type : null,
        imageData: finalCanvas.toDataURL('image/png'),
        isBeast: capturedBird ? capturedBird.isBat : false,
        isAstro: capturedNightObject ? true : false,
        timestamp: Date.now()
    };

    photos.push(photo);
    updatePhotoPreview();
    updateAlbumStats();

    // 更新统计（与原代码相同）
    if (capturedBird && !capturedBird.type.isSpecial && !capturedBird.isBat && capturedBirds[capturedBird.name] !== undefined && !capturedBird.noStats) {
        capturedBirds[capturedBird.name]++;
        updateCapturedBird(capturedBird.name);
        if (birdingModeActive && birdingModeCapturedSpecies) {
            birdingModeCapturedSpecies.add(capturedBird.name);
            const capturedCountElement = document.getElementById('capturedCount');
            if (capturedCountElement) capturedCountElement.textContent = birdingModeCapturedSpecies.size;
        }
    }
    if (capturedNightObject) {
        updateAstroPhoto(capturedNightObject.name);
    }

    setTimeout(() => saveGameData(), 100);
}

function playCameraSound() {
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator1 = audioContext.createOscillator();
        const oscillator2 = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator1.connect(gainNode);
        oscillator2.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator1.frequency.value = 800;
        oscillator1.type = 'sine';
        oscillator2.frequency.value = 1200;
        oscillator2.type = 'sine';
        
        const currentTime = audioContext.currentTime;
        gainNode.gain.setValueAtTime(0, currentTime);
        gainNode.gain.linearRampToValueAtTime(0.5, currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.05);
        gainNode.gain.linearRampToValueAtTime(0, currentTime + 0.1);
        
        oscillator1.start(currentTime);
        oscillator2.start(currentTime);
        oscillator1.stop(currentTime + 0.1);
        oscillator2.stop(currentTime + 0.1);
    } catch (e) {
        console.log("音频上下文不支持，跳过音效");
    }
}

function openAlbum() {
    if (!hasShownAllBirdsAlert && checkIfAllBirdsCollected()) {
        showAllBirdsAlert();
        hasShownAllBirdsAlert = true;
    }
    
    pauseGame();
    
    const albumModal = document.getElementById('albumModal');
    const albumPhotos = document.getElementById('albumPhotos');
    
    // 更新相册标题
    updateAlbumTitle();
    
    albumPhotos.innerHTML = '';
    
    if (photos.length === 0) {
        albumPhotos.innerHTML = '<div style="color: white; font-size: 18px;">暂无照片，快去拍照吧！</div>';
    } else {
        const photosPerRow = Math.ceil(photos.length / 3);
        for (let row = 0; row < 3; row++) {
            const rowStart = row * photosPerRow;
            const rowEnd = Math.min((row + 1) * photosPerRow, photos.length);
            if (rowStart < photos.length) {
                for (let i = rowStart; i < rowEnd; i++) {
                    const photo = photos[i];
                    const photoDiv = document.createElement('div');
                    photoDiv.className = 'albumPhoto';
                    const lensText = photo.lens ? ` (${LENS_SETTINGS[photo.lens].name})` : '';
                    photoDiv.innerHTML = ` 
                        <img src="${photo.imageData}" alt="照片">
                        <div class="photoInfo">
                            ${i + 1}${photo.bird ? ` - ${photo.bird}${lensText}` : photo.nightObject ? ` - ${photo.nightObject}${lensText}` : lensText}
                        </div>
                    `;
                    albumPhotos.appendChild(photoDiv);
                }
            }
        }
    }
    
    updateAlbumStats();
    albumModal.style.display = 'flex';
    
    // 为相册标题添加点击事件
    const albumTitle = document.getElementById('albumTitle');
    if (albumTitle) {
        // 移除之前的事件监听器（避免重复绑定）
        albumTitle.removeEventListener('click', handleAlbumTitleClick);
        albumTitle.addEventListener('click', handleAlbumTitleClick);
    }
}

function handleAlbumTitleClick() {
    editAlbumId();
}

function closeAlbum() {
    resumeGame();
    const albumModal = document.getElementById('albumModal');
    albumModal.style.display = 'none';
    
    // 清理事件监听器

function pauseGame() {
    gamePaused = true;
    pausedTimeState.gameTime = gameTime;
    pausedTimeState.dayNightTimer = dayNightTimer;
    pausedTimeState.moonPhaseTimer = moonPhaseTimer;
    pausedTimeState.dayModeTimeState = dayModeTimeState;
    pausedTimeState.nightModeTimeState = nightModeTimeState;
    pausedTimeState.nightModeMoonPhaseTimer = nightModeMoonPhaseTimer;
    pausedTimeState.lastFrameTime = lastFrameTime;
    pausedTimeState.lastBirdTime = lastBirdTime;
    pausedTimeState.lastRareBirdTime = lastRareBirdTime;
    pausedTimeState.lastLittleOwlTime = lastLittleOwlTime;
    pausedTimeState.lastOwlSpawnTime = lastOwlSpawnTime;
    pausedTimeState.lastDoveSummonCheck = lastDoveSummonCheck;
    pausedTimeState.pauseStartTime = performance.now();
    pausedTimeState.pauseDeltaOffset = 0;
}

function resumeGame() {
    if (!gamePaused) return;
    
    gamePaused = false;
    const pauseEndTime = performance.now();
    const pauseDuration = pauseEndTime - pausedTimeState.pauseStartTime;
    
    gameTime = pausedTimeState.gameTime;
    dayNightTimer = pausedTimeState.dayNightTimer;
    moonPhaseTimer = pausedTimeState.moonPhaseTimer;
    dayModeTimeState = pausedTimeState.dayModeTimeState;
    nightModeTimeState = pausedTimeState.nightModeTimeState;
    nightModeMoonPhaseTimer = pausedTimeState.nightModeMoonPhaseTimer;
    lastBirdTime = pausedTimeState.lastBirdTime;
    lastRareBirdTime = pausedTimeState.lastRareBirdTime;
    lastLittleOwlTime = pausedTimeState.lastLittleOwlTime;
    lastOwlSpawnTime = pausedTimeState.lastOwlSpawnTime;
    lastDoveSummonCheck = pausedTimeState.lastDoveSummonCheck;
    
    lastFrameTime = performance.now() - pauseDuration;
    
    updateTimeIndicator();
    requestAnimationFrame(drawGame);
}

function getRandomGroupSize(birdType) {
    if (Array.isArray(birdType.groupSize)) {
        const [min, max] = birdType.groupSize;
        return min + Math.floor(Math.random() * (max - min + 1));
    } else {
        return birdType.groupSize || 1;
    }
}

function generateBird() {
    if (gamePaused) return;

    const now = Date.now();
    let currentInterval = birdInterval;
    let currentVariation = birdIntervalVariation;

    // 陀螺仪模式下加速生成（缩短一半）
    if (gyroModeActive) {
        currentInterval = Math.max(2000, birdInterval / 2);
        currentVariation = Math.max(500, birdIntervalVariation / 2);
    }

    // 观鸟模式且未开启陀螺仪时，延长间隔（保持原有逻辑）
    if (birdingModeActive && !gyroModeActive) {
        currentInterval = 20001;
        currentVariation = 5000;
    }

    // 如果观鸟模式和陀螺仪同时开启，间隔已在上面的陀螺仪分支中缩短，无需再次延长

    let actualTimePassed = now - lastBirdTime;
    if (actualTimePassed < currentInterval + (Math.random() - 0.5) * currentVariation) {
        return;
    }
    lastBirdTime = now;

    const isNightMode = gameMode === 'night' || (gameMode === 'normal' && !isDaytime);

    // 夜间：优先生成天文现象
    if (isNightMode) {
        const rand = Math.random();
        if (rand < NIGHT_OBJECTS.METEOR.probability) {
            generateMeteor(true);
            return;
        }
        if (rand < NIGHT_OBJECTS.METEOR.probability + NIGHT_OBJECTS.COMET.probability) {
            generateComet(true);
            return;
        }
        if (rand < NIGHT_OBJECTS.METEOR.probability + NIGHT_OBJECTS.COMET.probability + NIGHT_OBJECTS.UFO.probability) {
            generateUFO(true);
            return;
        }
    }

    // 夜间鸟类生成（包括猫头鹰、蝙蝠、夜鹭、丘鹬等）
    if (isNightMode) {
        // 限制定量
        let eagleOwlPresent = false;
        let eagleOwlCount = 0;
        for (const bird of birds) {
            if (bird.name === "雕鸮") {
                eagleOwlPresent = true;
                eagleOwlCount++;
                break;
            }
        }

        if (eagleOwlPresent) {
            for (const bird of birds) {
                if (bird.name === "短耳鸮" && !bird.isFleeing && bird.state !== 'fleeing') {
                    bird.state = 'fleeing';
                    bird.speed = bird.speed * 3;
                    bird.direction = bird.direction === 1 ? -1 : 1;
                    bird.fleeStartTime = gameTime;
                }
            }
        }

        let shortEaredOwlCount = 0;
        let batCount = 0;
        for (const bird of birds) {
            if (bird.name === "短耳鸮") shortEaredOwlCount++;
            if (bird.isBat) batCount++;
        }

        if (batCount < MAX_BAT_COUNT) {
            const batProbability = (gameMode === 'normal' && !isDaytime) ? 0.10 : 0.20;
            if (Math.random() < batProbability) {
                const batType = BIRD_TYPES.BAT;
                const bat = createBat(batType);
                birds.push(bat);
                updateAppearedBird(batType.name);
                return;
            }
        }

        // 夜间鸟类概率累积
        const rand = Math.random();
        let cumulativeProbability = 0;
        let selectedBirdType = null;

        const nocturnalBirds = {};
        for (const key in BIRD_TYPES) {
            if (BIRD_TYPES[key].isOwl || BIRD_TYPES[key].canAppearAtNight || BIRD_TYPES[key].name === "小鸮" || BIRD_TYPES[key].name === "丘鹬") {
                nocturnalBirds[key] = BIRD_TYPES[key];
            }
        }

        const adjustedProbabilities = {};
        for (const key in nocturnalBirds) {
            let probability = nocturnalBirds[key].probability;
            if (gameMode === 'normal' && !isDaytime) probability = probability * 0.5;
            if (nocturnalBirds[key].name === "雕鸮" && eagleOwlCount > 0) probability = 0;
            if (nocturnalBirds[key].name === "短耳鸮" && shortEaredOwlCount >= MAX_SHORT_EARED_OWL_COUNT) probability *= 0.1;
            if (nocturnalBirds[key].name === "夜鹭" && nocturnalBirds[key].nightProbability !== undefined) {
                probability = nocturnalBirds[key].nightProbability;
                if (gameMode === 'normal' && !isDaytime) probability = probability * 0.5;
            }
            adjustedProbabilities[key] = probability;
        }

        let totalAdjustedProbability = 0;
        for (const key in adjustedProbabilities) totalAdjustedProbability += adjustedProbabilities[key];
        if (rand > totalAdjustedProbability) return;

        let normalizedCumulative = 0;
        for (const key in adjustedProbabilities) {
            const normalizedProbability = adjustedProbabilities[key] / totalAdjustedProbability;
            normalizedCumulative += normalizedProbability;
            if (rand <= normalizedCumulative) {
                selectedBirdType = nocturnalBirds[key];
                break;
            }
        }

        if (!selectedBirdType) return;

        // 特殊处理：丘鹬
        if (selectedBirdType.name === "丘鹬") {
            generateWoodcock(true);
            return;
        }

        // 猫头鹰类
        if (selectedBirdType.isOwl || selectedBirdType.name === "小鸮") {
            const fromLeft = Math.random() > 0.5;
            const birdCount = getRandomGroupSize(selectedBirdType);
            const groupId = nextGroupId++;
            birdGroupInfo[groupId] = { direction: fromLeft ? 1 : -1, birds: [] };
            for (let i = 0; i < birdCount; i++) {
                let startX, startY;
                if (selectedBirdType.flyInLowerHalf) {
                    startX = GAME_WIDTH * 0.5 + (Math.random() - 0.5) * 200;
                    startY = GAME_HEIGHT * 0.7 + Math.random() * 100;
                } else {
                    startX = GAME_WIDTH * 0.5 + (Math.random() - 0.5) * 200;
                    startY = -50;
                }
                let baseSpeed = (1.6 + Math.random() * 0.8);
                const speedMultiplier = selectedBirdType.speedMultiplier || 1;
                const finalSpeed = baseSpeed * speedMultiplier;
                const bird = {
                    type: selectedBirdType, name: selectedBirdType.name,
                    x: startX, y: startY,
                    size: selectedBirdType.size, speed: finalSpeed,
                    direction: Math.random() > 0.5 ? 1 : -1,
                    state: 'circling', stateTime: 0, circlingTime: 0,
                    circlingRadius: 150 + Math.random() * 50,
                    circlingAngle: Math.random() * Math.PI * 2,
                    circlingCenterX: selectedBirdType.flyInLowerHalf ? GAME_WIDTH * 0.5 : GAME_WIDTH * 0.5,
                    circlingCenterY: selectedBirdType.flyInLowerHalf ? GAME_HEIGHT * 0.7 : GAME_HEIGHT * 0.3,
                    isOwl: selectedBirdType.isOwl || false,
                    circleTime: selectedBirdType.circleTime || 30000,
                    catchPreyChance: selectedBirdType.catchPreyChance || 0,
                    catchPreyType: selectedBirdType.catchPreyType || null,
                    caughtPrey: null, hasGlided: false, glidingStartY: 0,
                    faceDirection: -1, faceChangeTimer: 0, faceChangeInterval: 10000 + Math.random() * 10000,
                    wingsOpen: true, isFleeing: false, fleeStartTime: 0,
                    isEagleOwl: selectedBirdType.name === "雕鸮",
                    wingOffset: selectedBirdType.wingOffset || 0,
                    isNight: true, groupId: groupId
                };
                birds.push(bird);
                birdGroupInfo[groupId].birds.push(bird);
            }
            return;
        }

        // 其他夜间鸟类（如夜鹭）
        const fromLeft = Math.random() > 0.5;
        const birdCount = getRandomGroupSize(selectedBirdType);
        const groupId = nextGroupId++;
        birdGroupInfo[groupId] = { direction: fromLeft ? 1 : -1, birds: [] };
        for (let i = 0; i < birdCount; i++) {
            let startX = fromLeft ? -50 : GAME_WIDTH + 50;
            let startY = Math.random() * (GAME_HEIGHT * 0.6) + GAME_HEIGHT * 0.2;
            let behavior = selectedBirdType.behavior;
            let stayTime = selectedBirdType.stayTime || 10;
            let baseSpeed = (1.6 + Math.random() * 0.8);
            const speedMultiplier = selectedBirdType.speedMultiplier || 1;
            const finalSpeed = baseSpeed * speedMultiplier;
            const bird = createCommonBird(selectedBirdType, startX, startY, fromLeft, behavior, stayTime, finalSpeed, groupId);
            bird.isNight = true;
            birds.push(bird);
            birdGroupInfo[groupId].birds.push(bird);
        }
        return;
    }

    // ========== 白天鸟类生成 ==========
    // 白尾鹞生成
    let harrierProb = isGoldenFilterActive ? 0.094 : 0.018;
    if (Math.random() < harrierProb) {
        if (!birds.some(b => b.name === "胖虎")) {
            generateWhiteHarrier(true);
        }
        return;
    }

    // 游隼生成
    if (Math.random() < 0.003) {
        if (!birds.some(b => b.name === "胖虎")) {
            generatePeregrine();
        }
        return;
    }
    // 黑翅鸢生成
    if (Math.random() < 0.01) {
        if (!birds.some(b => b.name === "胖虎")) {
            generateBlackWingedKite();
        }
        return;
    }
    // 翠鸟、蓝翡翠
    if (gameMode !== 'night') {
        if (Math.random() < BIRD_TYPES.KINGFISHER.probability) {
            generateKingfisher(true);
            return;
        }
        if (deadTree && Math.random() < BIRD_TYPES.BLUEFISHER.probability) {
            generateBlueKingfisher(true);
            return;
        }
    }

    // ---------- 普通鸟类概率选择（排除夜行性鸟类）----------
    const availableBirds = {};
    for (const key in BIRD_TYPES) {
        // 排除概率为0的鸟
        if (BIRD_TYPES[key].probability === 0) continue;
        // 关键修改：排除夜行性鸟类（isNocturnal为true），避免它们在白天生成
        if (BIRD_TYPES[key].isNocturnal) continue;
        availableBirds[key] = BIRD_TYPES[key];
    }

    const rand = Math.random();
    let cumulativeProbability = 0;
    let selectedBirdType = null;
    for (const key in availableBirds) {
        cumulativeProbability += availableBirds[key].probability;
        if (rand <= cumulativeProbability) {
            selectedBirdType = availableBirds[key];
            break;
        }
    }
    if (!selectedBirdType) return;

    // 更新出现统计（全局）
    appearedBirds[selectedBirdType.name]++;
    updateTextStats();
    updateAppearedBird(selectedBirdType.name);

    // 根据鸟种名称分派到专用生成函数（确保特殊行为）
    const birdName = selectedBirdType.name;
    switch (birdName) {
        case "小pt":
            generateLittlePt(true);
            break;
        case "鸳鸯♂":
        case "鸳鸯♀":
            generateMandarinDuckPair(true);
            break;
        case "胖虎":
            generatePanghu(true);
            break;
        case "赤麻鸭":
            generateRuddyShelduck(true);
            break;
        case "醋鸭":
        case "醋鸭♀":
            generateVinegarDuck(true);
            break;
        case "翠鸟":
            generateKingfisher(true);
            break;
        case "蓝翡翠":
            generateBlueKingfisher(true);
            break;
        case "伯劳":
            generateShrike(true);
            break;
        case "红腹灰雀":
            generateBullfinch(true);
            break;
        case "丝瓜椋鸟":
            generateSilkyStarling(true);
            break;
        case "乌鹟":
            generateFlycatcher(true);
            break;
        case "红胸姬鹟":
            generateRedBreastedFlycatcher(true);
            break;
        case "白冠攀雀":
            generateWhiteCrownedPendulineTit(true);
            break;
        case "寿带":
            generateParadiseFlycatcher(true);
            break;
        case "黄胸鹀":
            generateYellowBreastedBunting(true);
            break;
        case "北红尾鸲":
            generateDaurianRedstart(true);
            break;
        case "宏伟水渠♂":
        case "宏伟水渠♀":
            generateMagnificentStream(true);
            break;
        default:
            // 普通鸟种使用通用生成流程
            const fromLeft = Math.random() > 0.5;
            const birdCount = getRandomGroupSize(selectedBirdType);
            const groupId = nextGroupId++;
            birdGroupInfo[groupId] = { direction: fromLeft ? 1 : -1, birds: [] };
            for (let i = 0; i < birdCount; i++) {
                let startX = fromLeft ? -50 : GAME_WIDTH + 50;
                let startY = Math.random() * (GAME_HEIGHT * 0.6) + GAME_HEIGHT * 0.2;
                let behavior = selectedBirdType.behavior;
                let stayTime = selectedBirdType.stayTime || 10;

                // 部分鸟种的通用覆盖逻辑（保留原增强）
                if (selectedBirdType.name === "白头鹎" && Math.random() < 0.3) {
                    behavior = "landOnTree";
                    stayTime = 15;
                }
                if ((selectedBirdType.name === "麻雀" || selectedBirdType.name === "黄胸鹀") && Math.random() < 0.3) {
                    behavior = "flyToReedsAndStay";
                    stayTime = 15;
                }
                if (selectedBirdType.name === "长尾雀" || selectedBirdType.name === "蜡嘴雀" || selectedBirdType.name === "燕雀") {
                    behavior = "landOnTreeTop";
                    stayTime = 10;
                } else if (selectedBirdType.name === "罗宾") {
                    behavior = "landOnTreeBottom";
                    stayTime = 5;
                }

                let baseSpeed = (1.6 + Math.random() * 0.8);
                if (selectedBirdType.name === "斑鸠") baseSpeed *= 0.8;
                const speedMultiplier = selectedBirdType.speedMultiplier || 1;
                const finalSpeed = baseSpeed * speedMultiplier;

                const bird = createCommonBird(selectedBirdType, startX, startY, fromLeft, behavior, stayTime, finalSpeed, groupId);

                if (selectedBirdType.name === "长尾雀" || selectedBirdType.name === "蜡嘴雀" || selectedBirdType.name === "燕雀" || selectedBirdType.name === "罗宾") {
                    bird.isVulnerableToRaptors = true;
                }
                if (selectedBirdType.name === "蜡嘴雀" || selectedBirdType.name === "燕雀") {
                    bird.eatFruits = true;
                    bird.eatProbability = 0.1;
                    bird.eatDuration = 2000;
                    bird.originalSize = selectedBirdType.size;
                }

                if (behavior === "landOnReeds" && reedZone) {
                    bird.reedTargetX = reedZone.x + Math.random() * reedZone.width;
                    bird.reedTargetY = reedZone.y + reedZone.height - 3;
                    bird.state = 'landingOnReeds';
                    bird.groundDirection = Math.random() > 0.5 ? 1 : -1;
                    bird.isLandingOnReeds = true;
                }

                birds.push(bird);
                birdGroupInfo[groupId].birds.push(bird);
            }
            // 对于有游禽候选标志的鸟种，尝试触发游禽模式
            if (selectedBirdType.isWaterfowlCandidate) {
                tryEnterWaterfowlPatrolForGroup(groupId, fromLeft, selectedBirdType.waterfowlChance);
            }
            break;
    }
}

function mergePanghuIntoMandarinGroup() {
    // 1. 找到所有胖虎鸟
    const panghuBirds = birds.filter(b => b.name === "胖虎");
    if (panghuBirds.length === 0) return;

    // 2. 找到所有包含鸳鸯的游禽组
    const mandarinGroups = waterfowlPatrolGroups.filter(group =>
        group.birds.some(b => b.name === "鸳鸯♂" || b.name === "鸳鸯♀")
    );
    if (mandarinGroups.length === 0) return;

    // 3. 对每一只胖虎进行处理（通常只有一只）
    for (let panghu of panghuBirds) {
        // 检查胖虎是否已经属于某个鸳鸯组
        let alreadyInMandarinGroup = mandarinGroups.some(group => group.birds.includes(panghu));
        if (alreadyInMandarinGroup) continue;

        // 随机选择一个鸳鸯组
        const targetGroup = mandarinGroups[Math.floor(Math.random() * mandarinGroups.length)];
        const oldGroupId = panghu.groupId;

        // 从原组中移除胖虎
        if (oldGroupId && birdGroupInfo[oldGroupId]) {
            const oldBirdGroup = birdGroupInfo[oldGroupId];
            const idx = oldBirdGroup.birds.indexOf(panghu);
            if (idx !== -1) oldBirdGroup.birds.splice(idx, 1);
            // 如果原组空了，可以考虑清理，但不是必须
        }
        // 从原 waterfowlPatrolGroups 中移除
        for (let i = 0; i < waterfowlPatrolGroups.length; i++) {
            const g = waterfowlPatrolGroups[i];
            const idx = g.birds.indexOf(panghu);
            if (idx !== -1) {
                g.birds.splice(idx, 1);
                // 如果该组空了，可选择删除（可选）
                if (g.birds.length === 0) {
                    waterfowlPatrolGroups.splice(i, 1);
                    i--;
                }
                break;
            }
        }

        // 将胖虎加入目标组
        targetGroup.birds.push(panghu);
        panghu.groupId = targetGroup.groupId;

        // 更新 birdGroupInfo
        if (!birdGroupInfo[targetGroup.groupId]) {
            birdGroupInfo[targetGroup.groupId] = { birds: [] };
        }
        if (!birdGroupInfo[targetGroup.groupId].birds.includes(panghu)) {
            birdGroupInfo[targetGroup.groupId].birds.push(panghu);
        }

        // 可选：同步胖虎的状态与组方向（避免方向错乱）
        panghu.direction = targetGroup.direction;
        panghu.state = 'patrolWalk';   // 确保进入游禽模式
        panghu.speed = 0;              // 落地后速度为0，等待组移动

        console.log(`胖虎已加入鸳鸯组 ${targetGroup.groupId}`);
        showSpecialAlert("胖虎加入了鸳鸯的游禽组！");
    }
}

function drawMyna(bird) {
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    const headSize = birdSize * 0.5;
    const bodySize = birdSize;

    ctx.save();

    // 根据方向翻转画布，这样所有坐标都可以按“头朝右”绘制
    if (bird.direction === -1) {
        ctx.translate(bird.x * 2, 0);
        ctx.scale(-1, 1);
    }

    // 翻转后，将 x 坐标统一处理（若方向为 -1，则 x 取负值，因为画布已翻转）
    const x = bird.direction === -1 ? -bird.x : bird.x;
    const y = bird.y;

    // 身体
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(x, y, bodySize/2, 0, Math.PI * 2);
    ctx.fill();

    // 头部
    const headX = x + bodySize/2 - headSize/2;
    const headY = y - bodySize/2 + headSize/2;
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(headX, headY, headSize/2, 0, Math.PI * 2);
    ctx.fill();

    // 嘴（黄色）
    const beakLength = 8;
    const beakHeight = 5;
    const beakStartX = headX + headSize/2;
    const beakStartY = headY;
    ctx.fillStyle = "#FFD700";
    ctx.beginPath();
    ctx.moveTo(beakStartX, beakStartY);
    ctx.lineTo(beakStartX + beakLength, beakStartY);
    ctx.lineTo(beakStartX, beakStartY + beakHeight);
    ctx.closePath();
    ctx.fill();

    // 嘴根部上方黑色发尖
    const eyeRadius = 3;
    const featherX = beakStartX + beakLength * 0.4;
    const featherY = beakStartY - eyeRadius;
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.moveTo(featherX - eyeRadius/2, featherY);
    ctx.lineTo(featherX, featherY - eyeRadius);
    ctx.lineTo(featherX + eyeRadius/2, featherY);
    ctx.fill();

    // 眼睛（黄眼圈 + 黑眼珠）
    const eyeX = headX + headSize/4;
    const eyeY = headY - headSize/6;
    ctx.fillStyle = "#FFFF00";
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeRadius + 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeRadius, 0, Math.PI * 2);
    ctx.fill();

    // 翅膀（黑色，带白斑）
    const wingWidth = bodySize/2;
    const wingHeight = bodySize/3;
    const wingX = x - bodySize/4 - headSize/2;
    const wingY = y - bodySize/2;
    ctx.fillStyle = "#000000";
    ctx.fillRect(wingX, wingY, wingWidth, wingHeight);

    // 翅膀白斑（与北红尾鸲相同，位于翅膀下方）
    const patchWidth = eyeRadius;
    const patchHeight = wingHeight / 2;
    const patchX = wingX + 2;      // 从翅膀左边缘向右2像素
    const patchY = wingY + wingHeight / 2;
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(patchX, patchY, patchWidth, patchHeight);

    // 尾巴
    const tailStartX = x - bodySize/2;
    const tailStartY = y - bodySize/8;
    const tailHeight = bodySize/4;
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.moveTo(tailStartX, tailStartY);
    ctx.lineTo(tailStartX - 8, tailStartY - tailHeight/2);
    ctx.lineTo(tailStartX - 8, tailStartY + tailHeight/2);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function startEatingFruit(bird) {
    let nearestFruit = null;
    let minDistance = Infinity;
    
    for (const fruit of fruits) {
        if (!fruit.isEaten && fruit.treeIndex === treePositions.indexOf(bird.targetTree)) {
            const dx = fruit.x - bird.x;
            const dy = fruit.y - bird.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 50 && distance < minDistance) {
                minDistance = distance;
                nearestFruit = fruit;
            }
        }
    }
    
    if (nearestFruit) {
        bird.isEating = true;
        bird.eatingFruit = nearestFruit;
        bird.eatingTime = 0;
        bird.eatAnimationOffset = 0;
        
        nearestFruit.isEaten = true;
        nearestFruit.eatenBy = bird.name;
        nearestFruit.eatStartTime = gameTime;
        
        if (nearestFruit.color === "red") {
            nearestFruit.color = "#8B0000";
        } else if (nearestFruit.color === "yellow") {
            nearestFruit.color = "#DAA520";
        }
    }
}

function drawNightObject(obj) {
    const baseSize = 20;
    const objSize = baseSize * obj.size;
    
    ctx.save();
    
    switch (obj.type.type) {
        case 'meteor':
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, objSize, 0, Math.PI * 2);
            ctx.fill();
            
            const trailLength = obj.trailLength;
            const trailX = obj.x - Math.cos(obj.angle) * trailLength;
            const trailY = obj.y - Math.sin(obj.angle) * trailLength;
            
            const gradient = ctx.createLinearGradient(trailX, trailY, obj.x, obj.y);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 0)');
            gradient.addColorStop(0.5, obj.trailColor);
            gradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(trailX, trailY);
            ctx.lineTo(obj.x, obj.y);
            ctx.stroke();
            break;
            
        case 'comet':
            const coreRadius = objSize * (1/3);
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, coreRadius, 0, Math.PI * 2);
            ctx.fill();
            
            const tailLength = obj.tailLength * 8;
            const tailX = obj.x - Math.cos(obj.angle) * tailLength;
            const tailY = obj.y - Math.sin(obj.angle) * tailLength;
            const halfTailWidth = tailLength * Math.tan(5 * Math.PI / 180);
            const tailWidth = 2 * halfTailWidth;
            
            const tailGradient = ctx.createRadialGradient(
                obj.x, obj.y, 0,
                tailX, tailY, tailLength * 0.8
            );
            tailGradient.addColorStop(0, "rgba(173, 216, 230, 0.4)");
            tailGradient.addColorStop(0.3, obj.tailColor);
            tailGradient.addColorStop(0.7, "rgba(135, 206, 235, 0.2)");
            tailGradient.addColorStop(1, 'rgba(135, 206, 235, 0)');
            
            ctx.fillStyle = tailGradient;
            ctx.beginPath();
            ctx.moveTo(obj.x, obj.y);
            ctx.lineTo(tailX - halfTailWidth, tailY - tailLength * 0.05);
            ctx.lineTo(tailX + halfTailWidth, tailY + tailLength * 0.05);
            ctx.closePath();
            ctx.fill();
            break;
            
        case 'ufo':
            ctx.fillStyle = obj.color;
            ctx.beginPath();
            ctx.ellipse(obj.x, obj.y, objSize * 1.5, objSize * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#32CD32';
            ctx.beginPath();
            ctx.ellipse(obj.x, obj.y - objSize * 0.5, objSize, objSize * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFFF00';
            for (let i = 0; i < 5; i++) {
                const lightX = obj.x - objSize + i * (objSize / 2);
                ctx.beginPath();
                ctx.arc(lightX, obj.y + objSize * 0.3, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            if (obj.beamActive) {
                const beamPulse = Math.sin(gameTime * 0.005 + obj.beamPhase) * 0.3 + 0.7;
                const beamGradient = ctx.createLinearGradient(
                    obj.x, obj.y + objSize,
                    obj.x, obj.y + obj.beamLength
                );
                beamGradient.addColorStop(0, `rgba(144, 238, 144, ${0.5 * beamPulse})`);
                beamGradient.addColorStop(1, 'rgba(144, 238, 144, 0)');
                
                ctx.fillStyle = beamGradient;
                ctx.beginPath();
                ctx.ellipse(obj.x, obj.y + obj.beamLength * 0.5, objSize * 0.8, obj.beamLength * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            break;
    }
    
    ctx.restore();
}

function updateNightObjects(deltaTime) {
    if (gamePaused) return;
    
    for (let i = nightObjects.length - 1; i >= 0; i--) {
        const obj = nightObjects[i];
        
        if (gameTime - obj.createdAt > obj.duration) {
            nightObjects.splice(i, 1);
            continue;
        }
        
        if (obj.type.type === 'meteor' && !obj.hasSummoned) {
            if (gameTime - obj.createdAt > 500) {
                if (Math.random() < obj.summonProbability) {
                    generateMeteor(false, true, obj.intersectionPoint);
                }
                obj.hasSummoned = true;
            }
        }
        
        switch (obj.type.type) {
            case 'meteor':
                obj.x += Math.cos(obj.angle) * obj.speed;
                obj.y += Math.sin(obj.angle) * obj.speed;
                
                const dx = obj.x - (obj.targetPoint?.x || 0);
                const dy = obj.y - (obj.targetPoint?.y || 0);
                const distanceToTarget = Math.sqrt(dx * dx + dy * dy);
                
                const isOutOfBounds = obj.x < -2000 || obj.x > GAME_WIDTH + 2000 || obj.y < -2000 || obj.y > GAME_HEIGHT + 2000;
                const isBelowMountain = obj.y >= GAME_HEIGHT * 0.55;
                const isNearTarget = distanceToTarget < 50;
                
                if (isOutOfBounds || isBelowMountain || isNearTarget) {
                    nightObjects.splice(i, 1);
                }
                break;
                
            case 'comet':
                obj.x += Math.cos(obj.angle) * obj.speed;
                obj.y += Math.sin(obj.angle) * obj.speed;
                
                if (obj.y > GAME_HEIGHT + 100) {
                    nightObjects.splice(i, 1);
                }
                break;
                
            case 'ufo':
                obj.x += obj.speed * obj.direction * (deltaTime / 1000);
                obj.y += Math.sin(gameTime * 0.001) * 0.5;
                
                if ((obj.direction === -1 && obj.x < -100) || (obj.direction === 1 && obj.x > GAME_WIDTH + 100)) {
                    nightObjects.splice(i, 1);
                }
                break;
        }
    }
}

function drawSunMoon() {
    if (gameMode !== 'normal') {
        return;
    }
    
    const archHeight = 350;
    const t = sunMoonPosition;
    
    const archX = GAME_WIDTH * (1 - t);
    const verticalOffset = GAME_HEIGHT / 3;
    const archY = (GAME_HEIGHT - verticalOffset) - (Math.sin(t * Math.PI) * archHeight);
    
    const minY = 50;
    const finalY = Math.max(minY, archY);
    
    sunMoonX = archX;
    sunMoonY = finalY;
    
    const isNightMode = gameMode === 'normal' && !isDaytime;
    
    if (!isNightMode) {
        const sunGradient = ctx.createRadialGradient(
            archX, finalY, 0,
            archX, finalY, 40
        );
        sunGradient.addColorStop(0, '#FFFF00');
        sunGradient.addColorStop(0.7, '#FFD700');
        sunGradient.addColorStop(1, 'rgba(255, 215, 0, 0.3)');
        
        ctx.fillStyle = sunGradient;
        ctx.beginPath();
        ctx.arc(archX, finalY, 40, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(255, 255, 200, 0.2)';
        ctx.beginPath();
        ctx.arc(archX, finalY, 60, 0, Math.PI * 2);
        ctx.fill();
    } else {
        drawMoon(archX, finalY);
    }
}

function drawMoon(x, y) {
    const moonRadius = 30;
    
    ctx.save();
    
    const phase = (moonPhaseTimer / MOON_PHASE_CYCLE) % 1;
    
    let glowIntensity = 0.15;
    if (phase === 0.5) {
        glowIntensity = 0.25;
    } else if (phase < 0.25 || phase > 0.75) {
        glowIntensity = 0.05;
    }
    
    ctx.fillStyle = `rgba(240, 240, 255, ${glowIntensity})`;
    ctx.beginPath();
    ctx.arc(x, y, 50, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#F0F0F0';
    ctx.beginPath();
    ctx.arc(x, y, moonRadius, 0, Math.PI * 2);
    ctx.fill();
    
    if (phase > 0 && phase < 0.5) {
        const illumination = 0.5 - phase;
        const gradient = ctx.createRadialGradient(
            x + illumination * moonRadius * 2, y, 0,
            x, y, moonRadius
        );
        
        if (phase < 0.25) {
            gradient.addColorStop(0, 'rgba(0, 0, 51, 0.9)');
            gradient.addColorStop(0.3, 'rgba(0, 0, 51, 0.6)');
            gradient.addColorStop(0.6, 'rgba(0, 0, 51, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 51, 0)');
        } else {
            gradient.addColorStop(0, 'rgba(0, 0, 51, 0.7)');
            gradient.addColorStop(0.5, 'rgba(0, 0, 51, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 0, 51, 0)');
        }
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, moonRadius, 0, Math.PI * 2);
        ctx.fill();
        
        const edgeGradient = ctx.createRadialGradient(
            x, y, moonRadius - 2,
            x, y, moonRadius + 5
        );
        edgeGradient.addColorStop(0, 'rgba(240, 240, 255, 0.3)');
        edgeGradient.addColorStop(1, 'rgba(240, 240, 255, 0)');
        
        ctx.fillStyle = edgeGradient;
        ctx.beginPath();
        ctx.arc(x, y, moonRadius + 5, 0, Math.PI * 2);
        ctx.fill();
    } else if (phase > 0.5 && phase < 1) {
        const illumination = phase - 0.5;
        const gradient = ctx.createRadialGradient(
            x - illumination * moonRadius * 2, y, 0,
            x, y, moonRadius
        );
        
        if (phase < 0.75) {
            gradient.addColorStop(0, 'rgba(0, 0, 51, 0.9)');
            gradient.addColorStop(0.3, 'rgba(0, 0, 51, 0.6)');
            gradient.addColorStop(0.6, 'rgba(0, 0, 51, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 51, 0)');
        } else {
            gradient.addColorStop(0, 'rgba(0, 0, 51, 0.7)');
            gradient.addColorStop(0.5, 'rgba(0, 0, 51, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 0, 51, 0)');
        }
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, moonRadius, 0, Math.PI * 2);
        ctx.fill();
        
        const edgeGradient = ctx.createRadialGradient(
            x, y, moonRadius - 2,
            x, y, moonRadius + 5
        );
        edgeGradient.addColorStop(0, 'rgba(240, 240, 255, 0.3)');
        edgeGradient.addColorStop(1, 'rgba(240, 240, 255, 0)');
        
        ctx.fillStyle = edgeGradient;
        ctx.beginPath();
        ctx.arc(x, y, moonRadius + 5, 0, Math.PI * 2);
        ctx.fill();
    } else if (phase === 0 || phase === 1) {
        ctx.fillStyle = 'rgba(0, 0, 51, 0.95)';
        ctx.beginPath();
        ctx.arc(x, y, moonRadius, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(240, 240, 255, 0.05)';
        ctx.beginPath();
        ctx.arc(x, y, moonRadius + 3, 0, Math.PI * 2);
        ctx.fill();
    }
    
    if (phase !== 0 && phase !== 1) {
        let craterBrightness = 0.8;
        if (phase < 0.5) {
            craterBrightness = 0.7 + (phase * 0.6);
        } else {
            craterBrightness = 0.7 + ((1 - phase) * 0.6);
        }
        
        ctx.fillStyle = `rgba(208, 208, 208, ${craterBrightness})`;
        
        if (phase < 0.5) {
            ctx.beginPath();
            ctx.arc(x + 10, y - 5, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 15, y + 10, 8, 0, Math.PI * 2);
            ctx.fill();
        } else if (phase > 0.5) {
            ctx.beginPath();
            ctx.arc(x - 10, y - 5, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 15, y + 10, 8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        if (phase > 0.2 && phase < 0.8) {
            ctx.beginPath();
            ctx.arc(x - 20, y + 15, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 5, y - 15, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 8, y + 18, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 12, y - 10, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    ctx.restore();
}

function drawWallAndHole() {
    if (!wall || !hole) return;
    
    ctx.fillStyle = wall.color;
    ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
    
    ctx.strokeStyle = '#A9A9A9';
    ctx.lineWidth = 2;
    
    for (let i = 0; i < 5; i++) {
        const x = wall.x + (i + 1) * wall.width / 6;
        ctx.beginPath();
        ctx.moveTo(x, wall.y);
        ctx.lineTo(x, wall.y + wall.height);
        ctx.stroke();
    }
    
    for (let i = 0; i < 3; i++) {
        const y = wall.y + (i + 1) * wall.height / 4;
        ctx.beginPath();
        ctx.moveTo(wall.x, y);
        ctx.lineTo(wall.x + wall.width, y);
        ctx.stroke();
    }
    
    ctx.save();
    ctx.beginPath();
    ctx.rect(wall.x, wall.y, wall.width, wall.height);
    ctx.arc(hole.x, hole.y, hole.diameter / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    
    ctx.strokeStyle = '#5D4037';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.diameter / 2, 0, Math.PI * 2);
    ctx.stroke();
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.diameter / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
}

function drawTrees() {
    treePositions.forEach(tree => {
        ctx.fillStyle = '#2F4F4F';
        ctx.fillRect(tree.x + tree.width * 0.4, tree.y + tree.height * 0.7, tree.width * 0.2, tree.height * 0.3);
        
        ctx.fillStyle = '#2E8B57';
        ctx.beginPath();
        ctx.ellipse(tree.x + tree.width/2, tree.y + tree.height * 0.4, tree.width/2, tree.height * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#228B22';
        
        fixedLeaves.forEach(leaf => {
            if (leaf.treeIndex === treePositions.indexOf(tree)) {
                ctx.save();
                ctx.translate(leaf.x + leaf.offsetX, leaf.y + leaf.offsetY);
                ctx.rotate(leaf.rotation);
                
                ctx.fillStyle = leaf.color;
                if (leaf.type === 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, leaf.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#1A6B1A';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -leaf.size/2);
                    ctx.lineTo(0, leaf.size/2);
                    ctx.stroke();
                } else if (leaf.type === 1) {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, leaf.size, leaf.size/1.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#1A6B1A';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(-leaf.size/2, 0);
                    ctx.lineTo(leaf.size/2, 0);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(0, -leaf.size);
                    ctx.lineTo(leaf.size/1.5, 0);
                    ctx.lineTo(0, leaf.size);
                    ctx.lineTo(-leaf.size/1.5, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.strokeStyle = '#1A6B1A';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -leaf.size);
                    ctx.lineTo(0, leaf.size);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        });
    });
    
    drawFruits();
}

// 在 drawTrees() 函数附近添加绘制枯树的函数
function drawDeadTree() {
  if (!deadTree) return;
  
  const tree = deadTree;
  const groundY = reedZone ? (reedZone.y + reedZone.height) : GAME_HEIGHT * 0.9;
  const trunkBottomY = groundY;
  
  ctx.save();
  
  // 注意：这里移除了分支点生成逻辑，只进行绘制
  
  // 递归绘制树枝函数 - 使用固定的分叉模式
  function drawBranch(startX, startY, length, thickness, angle, depth, branchPattern, anglePatternIndex) {
    if (depth <= 0 || length < 3) return;
    
    // 计算树枝终点
    const endX = startX + Math.cos(angle) * length;
    const endY = startY + Math.sin(angle) * length;
    
    // 绘制当前树枝
    ctx.save();
    // 根据深度设置颜色，越细的颜色越浅
    const colorIntensity = Math.max(0.3, 1 - (depth * 0.15));
    const branchColor = `rgb(${Math.floor(139 * colorIntensity)}, ${Math.floor(69 * colorIntensity)}, ${Math.floor(19 * colorIntensity)})`;
    
    ctx.strokeStyle = branchColor;
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.restore();
    
    // 计算下一级分支的参数
    const nextLength = length * 0.65;
    const nextThickness = thickness * 0.6;
    const nextDepth = depth - 1;
    
    if (nextDepth > 0 && nextLength > 3) {
      // 获取当前分叉的角度模式和方向模式
      const pattern = tree.branchPatterns[anglePatternIndex];
      const anglePair = tree.branchAnglePatterns[anglePatternIndex];
      
      if (pattern && anglePair) {
        // 第一个分支：小角度分支 (15-25度)
        const angle1 = angle + pattern.direction1 * anglePair.angle1;
        drawBranch(endX, endY, nextLength, nextThickness, angle1, nextDepth, branchPattern + "A", anglePatternIndex + 1);
        
        // 第二个分支：大角度分支 (40-50度)
        const angle2 = angle + pattern.direction2 * anglePair.angle2;
        drawBranch(endX, endY, nextLength, nextThickness, angle2, nextDepth, branchPattern + "B", anglePatternIndex + 1);
      } else {
        // 如果没有模式，使用默认角度
        const angle1 = angle + (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 10) * Math.PI / 180;
        const angle2 = angle + (Math.random() > 0.5 ? 1 : -1) * (40 + Math.random() * 10) * Math.PI / 180;
        drawBranch(endX, endY, nextLength, nextThickness, angle1, nextDepth, branchPattern + "A", anglePatternIndex + 1);
        drawBranch(endX, endY, nextLength, nextThickness, angle2, nextDepth, branchPattern + "B", anglePatternIndex + 1);
      }
    } else {
      // 到达最小深度，绘制小细枝
      ctx.fillStyle = '#5D5B53';
      ctx.beginPath();
      ctx.arc(endX, endY, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // 绘制树干（主要分支） - 垂直向上
  drawBranch(tree.x, trunkBottomY, tree.height * 0.8, tree.width, -Math.PI/2, 4, "", 0);
  
  // 在树干底部添加地面接触阴影
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.beginPath();
  ctx.ellipse(tree.x, trunkBottomY, tree.width, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 为树干添加纹理
  ctx.strokeStyle = '#939182';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y = trunkBottomY - i * (tree.height * 0.8 / 8);
    ctx.beginPath();
    ctx.moveTo(tree.x - tree.width/2, y);
    ctx.lineTo(tree.x + tree.width/2, y);
    ctx.stroke();
  }
  
  // 在树干底部添加一些地面的小石子
  ctx.fillStyle = '#696969';
  for (let i = 0; i < 5; i++) {
    const stoneX = tree.x - tree.width + Math.random() * tree.width * 2;
    const stoneY = groundY + Math.random() * 3;
    const stoneSize = 2 + Math.random() * 3;
    
    ctx.beginPath();
    ctx.arc(stoneX, stoneY, stoneSize, 0, Math.PI * 2);
    ctx.fill();
  }
    
  ctx.restore();
}

function drawFruits() {
    fruits.forEach(fruit => {
        if (fruit.isEaten) {
            ctx.globalAlpha = 0.6;
        } else {
            ctx.globalAlpha = 1;
        }
        
        if (fruit.color === "red" || fruit.color === "#8B0000") {
            ctx.fillStyle = fruit.isEaten ? "#8B0000" : "#FF4500";
        } else {
            ctx.fillStyle = fruit.isEaten ? "#DAA520" : "#FFD700";
        }
        
        ctx.beginPath();
        ctx.arc(fruit.x, fruit.y, fruit.size, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(fruit.x, fruit.y - fruit.size);
        ctx.lineTo(fruit.x, fruit.y - fruit.size - 4);
        ctx.stroke();
        
        ctx.globalAlpha = 1;
        
        if (fruit.isEaten && fruit.eatenBy) {
            const timeSinceEaten = gameTime - fruit.eatStartTime;
            if (timeSinceEaten < 1000) {
                ctx.fillStyle = 'rgba(255, 255, 200, 0.3)';
                ctx.beginPath();
                ctx.arc(fruit.x, fruit.y, fruit.size * 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    });
}

function drawReeds() {
  if (!reedZone) return;
  
  const reedCount = reedBends.length;
  for (let i = 0; i < reedCount; i++) {
    const reedX = reedZone.x + (i / reedCount) * reedZone.width;
    const reedBend = reedBends[i] || { 
      bendAmount: 0, 
      bendPointRatio: 0.5, 
      topBendAmount: 0, 
      reedType: 0, 
      reedColor: '#8B4513', 
      topColor: '#DAA520', 
      reedWidth: 1.0 
    };
    
    const reedType = reedBend.reedType;
    let reedHeight, reedY;
    
    // 根据芦苇类型决定高度
    switch(reedType) {
      case 0: reedHeight = reedZone.height * (0.5 + ((i % 10) / 25)); break;
      case 1: reedHeight = reedZone.height * (0.6 + ((i % 8) / 20)); break;
      case 2: reedHeight = reedZone.height * (0.7 + ((i % 12) / 30)); break;
      case 3: reedHeight = reedZone.height * (0.4 + ((i % 15) / 35)); break;
      case 4: reedHeight = reedZone.height * (0.3 + ((i % 6) / 15)); break;
      case 5: reedHeight = reedZone.height * (0.5 + ((i % 10) / 22)); break;
      default: reedHeight = reedZone.height * (0.5 + ((i % 10) / 20)); break;
    }
    
    // 芦苇从地面开始生长（y坐标是芦苇底部）
    reedY = GAME_HEIGHT - reedHeight;
    
    const bendAmount = reedBend.bendAmount;
    const bendPoint = reedHeight * reedBend.bendPointRatio;
    const topBendAmount = reedBend.topBendAmount;
    
    // 绘制芦苇茎
    ctx.strokeStyle = reedBend.reedColor;
    ctx.lineWidth = reedBend.reedWidth;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(reedX, reedY + reedHeight); // 从地面开始
    ctx.bezierCurveTo(
      reedX + bendAmount * (reedType === 3 ? 1.5 : 1),
      reedY + reedHeight - bendPoint,
      reedX + topBendAmount * (reedType === 5 ? 1.8 : 1),
      reedY + reedHeight * 0.2,
      reedX,
      reedY
    );
    ctx.stroke();
    
    // 绘制芦苇顶部
    let topSize;
    switch(reedType) {
      case 1: topSize = 4 + ((i % 5) / 1.5); break;
      case 4: topSize = 2 + ((i % 5) / 3); break;
      default: topSize = 3 + ((i % 5) / 2); break;
    }
    
    ctx.fillStyle = reedBend.topColor;
    switch(reedType) {
      case 0:
        ctx.beginPath();
        ctx.ellipse(reedX, reedY, topSize/2, topSize, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 1:
        ctx.beginPath();
        ctx.ellipse(reedX, reedY, topSize/1.5, topSize*1.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#B8860B';
        for (let j = 0; j < 3; j++) {
          const angle = (j / 3) * Math.PI * 2;
          const offsetX = Math.cos(angle) * (topSize/3);
          const offsetY = Math.sin(angle) * (topSize/1.5);
          ctx.beginPath();
          ctx.arc(reedX + offsetX, reedY + offsetY, 1, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case 2:
        ctx.beginPath();
        ctx.ellipse(reedX, reedY, topSize/3, topSize*1.3, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 3:
        ctx.beginPath();
        ctx.ellipse(reedX, reedY, topSize/2, topSize*0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 4:
        ctx.beginPath();
        ctx.arc(reedX, reedY, topSize, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 5:
        ctx.beginPath();
        ctx.ellipse(reedX, reedY, topSize/2, topSize*0.9, topBendAmount * 0.1, 0, Math.PI * 2);
        ctx.fill();
        break;
      default:
        ctx.beginPath();
        ctx.arc(reedX, reedY, topSize, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // 绘制芦苇节
    if (reedType !== 4) {
      const jointCount = 2 + (i % 3);
      for (let j = 1; j <= jointCount; j++) {
        const jointY = reedY + reedHeight * (j / (jointCount + 1));
        const jointSize = reedBend.reedWidth * 0.7;
        ctx.fillStyle = '#654321';
        ctx.beginPath();
        ctx.arc(reedX, jointY, jointSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawMountains() {

    ctx.fillStyle = !isNightMode ? '#4682B4' : '#2F4F4F';

    ctx.beginPath();

    ctx.lineTo(200, GAME_HEIGHT * 0.5);
    ctx.lineTo(450, GAME_HEIGHT * 0.7);
    ctx.lineTo(-50, GAME_HEIGHT * 0.7);
    ctx.fill();
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(300, GAME_HEIGHT * 0.75);
    ctx.lineTo(600, GAME_HEIGHT * 0.55);
    ctx.lineTo(900, GAME_HEIGHT * 0.75);
    ctx.lineTo(300, GAME_HEIGHT * 0.75);
    ctx.fill();
    ctx.stroke();
    
    ctx.beginPath();

function drawClouds() {
    const isNightMode = gameMode === 'night' || (gameMode === 'normal' && !isDaytime);
    if (isNightMode) return;

    for (let cloud of clouds) {
        ctx.save();
        // 主云层：半透明白色
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.shadowBlur = 0;   // 取消阴影，提高性能
        for (let ell of cloud.ellipses) {
            ctx.beginPath();
            ctx.ellipse(cloud.x + ell.x, cloud.y + ell.y, ell.rx, ell.ry, ell.rot, 0, Math.PI * 2);
            ctx.fill();
        }
        // 可选：增加浅色阴影层，使云朵更立体
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        for (let ell of cloud.ellipses) {
            ctx.beginPath();
            ctx.ellipse(cloud.x + ell.x + 2, cloud.y + ell.y + 1, ell.rx * 0.9, ell.ry * 0.9, ell.rot, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

function initClouds() {
    clouds = [];
    for (let i = 0; i < CLOUD_COUNT; i++) {
        const size = 40 + Math.random() * 60;          // 云朵整体大小参考
        const x = Math.random() * GAME_WIDTH;
        const y = Math.random() * (GAME_HEIGHT * 0.3);
        const speedX = (Math.random() - 0.5) * CLOUD_SPEED_VARIATION * 2 + CLOUD_BASE_SPEED;
        clouds.push({
            x: x,
            y: y,
            size: size,
            speed: speedX,
            ellipses: generateCloudEllipses(size)      // 椭圆数组
        });
    }
}

function generateCloudEllipses(baseSize) {
    const count = 2 + Math.floor(Math.random() * 2); // 2 或 3 个椭圆
    const ellipses = [];
    for (let i = 0; i < count; i++) {
        // 相对云朵中心的偏移
        const offsetX = (Math.random() - 0.5) * baseSize * 0.6;
        const offsetY = (Math.random() - 0.5) * baseSize * 0.4;
        // 椭圆半径：长轴约为短轴的 1.2~1.8 倍
        const radiusX = baseSize * (0.5 + Math.random() * 0.3);
        const radiusY = baseSize * (0.3 + Math.random() * 0.25);
        // 随机旋转角度 -30° 到 30°
        const rotation = (Math.random() - 0.5) * Math.PI / 3;
        ellipses.push({ x: offsetX, y: offsetY, rx: radiusX, ry: radiusY, rot: rotation });
    }
    return ellipses;
}
  
// 初始化固定星星
function initStars() {
    stars = [];
    for (let i = 0; i < STARS_COUNT; i++) {
        stars.push({
            x: Math.random() * GAME_WIDTH,
            y: Math.random() * (GAME_HEIGHT * 0.5),
            size: Math.random() * 2 + 0.5,
            alpha: 0.5 + Math.random() * 0.3, // 随机透明度
            twinkleSpeed: 0.5 + Math.random() * 1.5, // 闪烁速度
            twinkleOffset: Math.random() * Math.PI * 2 // 闪烁偏移
        });
    }
}

// 修改后的drawStars函数
function drawStars() {
    const isNightMode = gameMode === 'night' || (gameMode === 'normal' && !isDaytime);
    if (!isNightMode) return;
    
    stars.forEach(star => {
        // 基于时间的闪烁效果
        const twinkle = 0.6 + 0.4 * Math.sin(gameTime * 0.002 * star.twinkleSpeed + star.twinkleOffset);
        
        // 绘制星星主体
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha * twinkle})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        
        // 添加微小的光晕效果（可选）
        if (twinkle > 0.8) {
            ctx.fillStyle = `rgba(255, 255, 255, ${0.2 * (twinkle - 0.8)})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    });
}

function drawLittleOwl(bird) {
    console.log("[绘制] 正在绘制小鸮，坐标：", bird.x, bird.y);
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    
    ctx.save();

    ctx.arc(bird.x, bird.y, birdSize/2, 0, Math.PI * 2);
    ctx.fill();
    
    // 眼圈颜色（昼夜不同）
    let eyeRingColor = "#FFFFFF";
    let eyeColor = "#000000";
    if (bird.isNight) {
        eyeRingColor = "#FFFF99";
        eyeColor = "#FFFF99";
    }
    
    // 绘制左眼圈
    ctx.fillStyle = eyeRingColor;
    ctx.beginPath();
    ctx.arc(bird.x - 8, bird.y - 5, 4.2, 0, Math.PI * 2);
    ctx.fill();
    // 绘制右眼圈
    ctx.beginPath();
    ctx.arc(bird.x + 8, bird.y - 5, 4.2, 0, Math.PI * 2);
    ctx.fill();
    
    // 眼罩（半透明白色，不透明度80%）
    ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
    ctx.beginPath();
    // 左眼圆
    ctx.arc(bird.x - 8, bird.y - 5, 6, 0, Math.PI * 2);
    // 右眼圆
    ctx.arc(bird.x + 8, bird.y - 5, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // 绘制眼珠
    ctx.fillStyle = eyeColor;
    ctx.beginPath();
    ctx.arc(bird.x - 8, bird.y - 5, 2.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bird.x + 8, bird.y - 5, 2.1, 0, Math.PI * 2);
    ctx.fill();
    
    // 嘴部（黄色竖菱形）
    ctx.fillStyle = "#FFD700";
    const centerX = bird.x;
    const centerY = bird.y + 6;
    const halfWidth = 3;
    const halfHeight = 4;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - halfHeight);
    ctx.lineTo(centerX + halfWidth, centerY);
    ctx.lineTo(centerX, centerY + halfHeight);

function drawBat(bird) {
    const baseSize = 20;
    const birdSize = baseSize * bird.size;
    
    ctx.save();
    
    bird.wingFlapTimer += bird.wingFlapSpeed;
    const wingFlapOffset = Math.sin(bird.wingFlapTimer) * 5;
    
    const x = bird.x;
    const y = bird.y;
    
    const bodyWidth = 10;
    const bodyHeight = 6;
    
    ctx.fillStyle = "#333333";
    ctx.beginPath();
    ctx.ellipse(x, y, bodyWidth/2, bodyHeight/2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = "#333333";
    const headSize = 4;
    ctx.beginPath();
    ctx.moveTo(x + bodyWidth/2, y);
    ctx.lineTo(x + bodyWidth/2 + headSize, y - headSize/2);
    ctx.lineTo(x + bodyWidth/2 + headSize, y + headSize/2);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(x + bodyWidth/2 + headSize/2, y - headSize/4, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + bodyWidth/2 + headSize/2, y + headSize/4, 1, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = "#666666";
    const wingLength = 15;
    const wingHeight = 8 + wingFlapOffset;
    
    const leftWingX = x - bodyWidth/2 - wingLength;
    const leftWingY = y - wingHeight/2;
    ctx.fillRect(leftWingX, leftWingY, wingLength, wingHeight);
    
    const rightWingX = x + bodyWidth/2;
    const rightWingY = y - wingHeight/2;
    ctx.fillRect(rightWingX, rightWingY, wingLength, wingHeight);
    
    ctx.restore();
}

function drawOwlBird(bird) {
